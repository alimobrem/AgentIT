name: admission-policies-exist
dimension: compliance
severity: medium
category: policy
type: yaml_kind_exists
# `Policy` (namespaced), not `ClusterPolicy` -- yaml_kind_exists scans the
# target app's own repo (check_engine.py's iter_yaml_files(repo_path)), not
# the live cluster, so this must match what skills/compliance/
# kyverno-policies.md actually generates for that app: a namespaced `Policy`
# (see its `outputs: [Policy]` frontmatter and template `kind: Policy`),
# same namespaced scope skills/compliance/image-registry-policy.md
# deliberately uses too ("Use namespace-scoped Policy, not ClusterPolicy").
# `ClusterPolicy` always false-negatived here since nothing in an app's own
# repo would ever contain a cluster-scoped resource for its own admission
# policy. analyzers/compliance.py's ComplianceAnalyzer already accepts
# `Policy`/`ClusterPolicy`/`ConstraintTemplate` all three for its own
# (separate, complementary) scoring -- this check only needs the one kind
# that's actually produced today.
pattern: Policy
description: No admission policies (Kyverno/OPA/Gatekeeper) found
recommendation: Create Kyverno policies for resource limits, labels, approved base images
