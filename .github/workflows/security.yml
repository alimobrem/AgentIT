name: Security Scan
on:
  push:
    branches: [main]
  pull_request:

# See tests.yml's identical block for why: coalesces concurrent pushes to
# the same ref into one live run instead of running every push to
# completion.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: "1"
      - name: Generate SBOM
        uses: anchore/sbom-action@v0.24.0
        with:
          artifact-name: sbom.cyclonedx.json
