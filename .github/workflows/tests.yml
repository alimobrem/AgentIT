name: Tests
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    # Postgres is the only supported store (see
    # docs/postgres-migration-plan.md) -- nearly the whole suite needs a
    # real instance now, not just an opt-in subset, so CI provisions one as
    # a standard GitHub Actions service container rather than relying on
    # SQLite's zero-infrastructure convenience. tests/conftest.py's
    # `postgres_dsn` fixture picks this up via `AGENTIT_TEST_PG_DSN` (set
    # below) instead of falling back to its own podman/docker-launched
    # throwaway container -- that fallback exists for local dev only.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: agentit_test
          POSTGRES_PASSWORD: agentit_test
          POSTGRES_DB: agentit_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # Documented in CLAUDE.md's "Testing" section: on a machine with a real
      # (even if currently unreachable) kubeconfig, fleet/health routes call
      # kube.list_custom_resources(...) unconditionally, and the Kubernetes
      # client's _request_timeout doesn't bound DNS/TCP-connect time — this
      # can hang pytest for minutes. Point KUBECONFIG at a nonexistent path so
      # those calls fail fast (<300ms) instead of hanging the job.
      KUBECONFIG: /tmp/nonexistent-path
      AGENTIT_TEST_PG_DSN: postgresql://agentit_test:agentit_test@localhost:5432/agentit_test
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Run test suite
        run: |
          uv run python -m pytest tests/ -q --tb=short \
            --ignore=tests/test_real_repos.py \
            --ignore=tests/test_browser.py \
            --ignore=tests/test_live_cluster_e2e.py

  # Builds the real deployed image (same Containerfile the Tekton pipeline's
  # build-image task builds via buildah) and smoke-tests it here too, so a
  # regression is caught on every PR -- not only after it's already merged
  # and reached the live cluster. Each of these checks was, one at a time,
  # only discovered missing from the *deployed* image live: gh, a real .git
  # checkout, pytest, tests/, and chart/ (see Containerfile's own comments
  # for each fix, and chart/templates/tekton/pipeline.yaml's smoke-test-image
  # task for the equivalent gate on the actual promoted-to-Argo-CD tag).
  image-smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - name: Build image
        run: docker build -t agentit-smoke-test:ci -f Containerfile .
      - name: Smoke-test image contents
        run: |
          docker run --rm --entrypoint /bin/sh agentit-smoke-test:ci -c '
            set -eu
            echo "pytest is present:"
            python -m pytest --version
            echo "tests/ exists and is non-empty:"
            test -d tests
            [ -n "$(ls -A tests)" ]
            echo "chart/ exists (needed by capability-scout safety gates):"
            test -d chart
            echo "git and gh CLIs are present:"
            git --version
            gh --version
            echo "/opt/app-root/src is a real, valid git checkout:"
            # Mirror Tekton smoke: runtime UID may not see build-time gitconfig.
            git config --global --add safe.directory /opt/app-root/src
            git -C /opt/app-root/src status
            echo "Image smoke test passed."
          '
