# Red Hat InfoSec / Pattern Distribution Server (PwnedAlert) false-positive handling:
# https://source.redhat.com/departments/strategy_and_operations/it/it_information_security/wiki/pattern_distribution_server#handling-false-positives
#
# PwnedAlert reads ONLY a top-level [allowlist] with paths and/or regexes.
# It ignores [[rules]], [rules.allowlist], and gitleaks v8 [[allowlists]].
# Invalid TOML or regex → the whole file is ignored.
#
# Finding: GitHub Generic Secret on synthetic hex in tests/test_security.py
# (commit ce58beb8 / PR #180 secret-classify cache tests).
# Classification: FALSE POSITIVE — never issued credentials.
# Tip: tests use short EXAMPLE placeholders + # notsecret (wiki options 1 + best practice).
# This allowlist covers historical blobs still in git history (wiki option 2: value regexes).

[allowlist]
description = "Historical synthetic SecurityAnalyzer fixtures (ce58beb8) — not real secrets"
regexes = [
  '''d4c8f1e2b3a4c5d6e7f80123''',
  '''abcdef0123456789''',
]
