# Shared secret checked by verify_internal_token (src/agentit/portal/routes/webhooks.py)
# on the in-cluster-only webhook routes (/api/webhook/{assess,onboard,auto-apply,
# finding,remediate}) -- these are called by Argo Events Sensors via the in-cluster
# Service, never by a browser, so the oauth-proxy sidecar (auth.enabled) doesn't
# protect them. Always created (not gated behind a flag): the app fails open (skips
# the check) if this secret's value isn't present in its env, matching the existing
# GITHUB_WEBHOOK_SECRET convention -- but since this Secret is always templated,
# that fail-open path should only ever be hit in local dev/tests, not real clusters.
#
# `token` is deliberately NOT rendered by Helm at all -- see secret-init-job.yaml,
# the only thing that ever writes it. This used to be guarded by a Helm `lookup`
# meant to preserve the value across re-renders, but Argo CD's repo-server renders
# Helm sources via `helm template` with no destination-cluster credentials at all
# (a well-known, still-open upstream limitation,
# https://github.com/argoproj/argo-cd/issues/5202), so `lookup` always returned
# empty on a real sync and every sync silently minted a brand-new token,
# desyncing every Sensor trigger's `secureHeaders` (which read this Secret
# directly at trigger-fire time, not at Helm-render time) from what the app was
# actually started with -- same root cause, and same fix, as
# postgres-bundled-secret.yaml's bug #1 (see docs/postgres-migration-plan.md).
# Confirmed live on this cluster before this fix: `managedFields` showed
# `argocd-controller` owning `data.token`, meaning it was rewritten fresh on
# every sync.
apiVersion: v1
kind: Secret
metadata:
  name: agentit-internal-webhook-token
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: agentit
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
