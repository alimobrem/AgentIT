# Shared secret checked by verify_internal_token (src/agentit/portal/routes/webhooks.py)
# on the in-cluster-only webhook routes (/api/webhook/{assess,onboard,auto-apply,
# finding,remediate}) -- these are called by Argo Events Sensors via the in-cluster
# Service, never by a browser, so the oauth-proxy sidecar (auth.enabled) doesn't
# protect them. Always created (not gated behind a flag): the app fails open (skips
# the check) if this secret's value isn't present in its env, matching the existing
# GITHUB_WEBHOOK_SECRET convention -- but since this Secret is always templated,
# that fail-open path should only ever be hit in local dev/tests, not real clusters.
#
# `lookup` preserves an existing token across re-renders so the Sensor triggers'
# `secureHeaders` (which read this Secret directly at trigger-fire time, not at
# Helm-render time) always match what the app was actually started with.
{{- $existing := lookup "v1" "Secret" .Release.Namespace "agentit-internal-webhook-token" }}
apiVersion: v1
kind: Secret
metadata:
  name: agentit-internal-webhook-token
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: agentit
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
data:
  {{- if $existing }}
  token: {{ index $existing.data "token" }}
  {{- else }}
  token: {{ randAlphaNum 40 | b64enc }}
  {{- end }}
