{{- if .Values.tektonCI.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: tekton-cleanup
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/component: tekton-cleanup
spec:
  schedule: "17 */2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 300
      template:
        spec:
          restartPolicy: Never
          serviceAccountName: pipeline
          containers:
            - name: cleanup
              image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
              command: [/bin/sh, -c]
              args:
                - |
                  set -eu
                  echo "Cleaning completed/failed pods..."
                  POD_DELETED=0
                  for phase in Succeeded Failed; do
                    for pod in $(oc get pods -n {{ .Release.Namespace }} --field-selector=status.phase=$phase -o name 2>/dev/null); do
                      oc delete "$pod" -n {{ .Release.Namespace }} --wait=false 2>/dev/null && POD_DELETED=$((POD_DELETED+1))
                    done
                  done
                  echo "Deleted $POD_DELETED completed/failed pods"

                  echo "Cleaning PipelineRuns older than 24 hours..."
                  CUTOFF=$(date -u -d '24 hours ago' '+%Y-%m-%dT%H:%M:%SZ' 2>/dev/null || date -u -v-24H '+%Y-%m-%dT%H:%M:%SZ')
                  PR_DELETED=0
                  for pr in $(oc get pipelinerun -n {{ .Release.Namespace }} -o jsonpath='{range .items[?(@.status.completionTime)]}{.metadata.name}{" "}{.status.completionTime}{"\n"}{end}'); do
                    NAME=$(echo "$pr" | awk '{print $1}')
                    COMPLETED=$(echo "$pr" | awk '{print $2}')
                    if [ -z "$NAME" ] || [ -z "$COMPLETED" ]; then continue; fi
                    if [ "$COMPLETED" \< "$CUTOFF" ]; then
                      oc delete pipelinerun "$NAME" -n {{ .Release.Namespace }} --wait=false 2>/dev/null && PR_DELETED=$((PR_DELETED+1))
                    fi
                  done
                  echo "Deleted $PR_DELETED old PipelineRuns"

                  echo "Cleaning orphaned PVCs..."
                  PVC_DELETED=0
                  for pvc in $(oc get pvc -n {{ .Release.Namespace }} -l tekton.dev/pipeline -o jsonpath='{.items[*].metadata.name}'); do
                    PR=$(oc get pvc "$pvc" -n {{ .Release.Namespace }} -o jsonpath='{.metadata.labels.tekton\.dev/pipelineRun}' 2>/dev/null || echo "")
                    if [ -n "$PR" ]; then
                      EXISTS=$(oc get pipelinerun "$PR" -n {{ .Release.Namespace }} -o name 2>/dev/null || echo "")
                      if [ -z "$EXISTS" ]; then
                        oc delete pvc "$pvc" -n {{ .Release.Namespace }} --wait=false 2>/dev/null && PVC_DELETED=$((PVC_DELETED+1))
                      fi
                    fi
                  done
                  echo "Deleted $PVC_DELETED orphaned PVCs"
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
{{- end }}
