{{- if .Values.tektonCI.enabled }}
{{- /*
Requires a Secret named "github-webhook-secret" (key: "secret") in this release's namespace, e.g.:
  oc create secret generic github-webhook-secret --from-literal=secret=<random-value> -n <namespace>
The same value must be configured as the webhook secret on the GitHub repo
(Settings > Webhooks > agentit-ci-webhook Route URL > Secret).
*/}}
apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerTemplate
metadata:
  name: agentit-ci-trigger
  namespace: {{ .Release.Namespace }}
spec:
  params:
    - name: revision
      default: main
  resourcetemplates:
    - apiVersion: tekton.dev/v1
      kind: PipelineRun
      metadata:
        generateName: agentit-ci-
        namespace: {{ .Release.Namespace }}
        labels:
          # Selected by the Pipeline's own supersede-stale-runs task
          # (pipeline.yaml) to find other in-flight agentit-ci PipelineRuns
          # to compare against and, if superseded, cancel -- authored
          # explicitly here rather than relying on Tekton's own automatic
          # tekton.dev/pipeline label so the selector is guaranteed
          # regardless of controller version.
          tekton.dev/pipeline: agentit-ci
      spec:
        pipelineRef:
          name: agentit-ci
        params:
          - name: revision
            value: $(tt.params.revision)
        # build-image (buildah) is capped to the namespace LimitRange default (500m
        # CPU / 512Mi memory) unless overridden here. Measured on this cluster: bumping
        # the step's request modestly (small enough to still schedule under current node
        # pressure) while raising the limit so it can burst when the node has spare
        # capacity cut build-image's real duration roughly in half (151s -> 84s in an
        # A/B test with SKIP_PUSH=true, same commit, same cluster load). A full 1 CPU
        # *request* was tried first and left the pod Pending (ExceededNodeResources) —
        # keep the request modest.
        taskRunSpecs:
          - pipelineTaskName: build-image
            stepSpecs:
              - name: build
                computeResources:
                  requests:
                    cpu: "200m"
                    memory: 256Mi
                  limits:
                    cpu: "1"
                    memory: 1Gi
          # notify-argocd's pod inherits the `source` workspace PVC's node
          # affinity (dynamically-provisioned gp3-csi/EBS volumes bind to a
          # single AWS zone on first mount -- confirmed live: this cluster
          # has exactly 1 schedulable worker per zone, paired with 1
          # control-plane node in that same zone). With only 3 real workers,
          # that one same-zone worker being briefly saturated by concurrent
          # CI pods is enough to leave literally zero schedulable nodes for
          # this task -- the exact "0/6 nodes available: PV node-affinity
          # mismatches + untolerated taints" failure from the 2026-07-17
          # incident. Tolerating the control-plane taint gives this one
          # task a same-zone fallback node. Safe to do narrowly here only:
          # notify-argocd is a single `sed`+`oc apply` (no build/test load,
          # 64Mi/50m request, <2m runtime) -- unlike run-tests/build-image,
          # it adds negligible extra pressure to the already etcd-sensitive
          # control-plane nodes it might land on.
          - pipelineTaskName: notify-argocd
            podTemplate:
              tolerations:
                - key: node-role.kubernetes.io/master
                  operator: Exists
                  effect: NoSchedule
                - key: node-role.kubernetes.io/control-plane
                  operator: Exists
                  effect: NoSchedule
        workspaces:
          - name: source
            volumeClaimTemplate:
              spec:
                accessModes: [ReadWriteOnce]
                resources:
                  requests:
                    storage: 2Gi
---
apiVersion: triggers.tekton.dev/v1beta1
kind: EventListener
metadata:
  name: agentit-ci-listener
  namespace: {{ .Release.Namespace }}
spec:
  serviceAccountName: pipeline
  triggers:
    - name: github-push
      interceptors:
        - ref:
            name: "github"
          params:
            - name: "secretRef"
              value:
                secretName: github-webhook-secret
                secretKey: secret
            - name: "eventTypes"
              value: ["push"]
        - ref:
            name: "cel"
          params:
            - name: "filter"
              value: "body.ref == 'refs/heads/main'"
      bindings:
        - name: revision
          value: $(body.after)
      template:
        ref: agentit-ci-trigger
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: agentit-ci-webhook
  namespace: {{ .Release.Namespace }}
spec:
  to:
    kind: Service
    name: el-agentit-ci-listener
  port:
    targetPort: http-listener
  tls:
    termination: edge
{{- end }}
