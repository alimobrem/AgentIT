{{- if .Values.tektonCI.enabled }}
{{- /*
Requires a Secret named "github-webhook-secret" (key: "secret") in this release's namespace, e.g.:
  oc create secret generic github-webhook-secret --from-literal=secret=<random-value> -n <namespace>
The same value must be configured as the webhook secret on the GitHub repo
(Settings > Webhooks > agentit-ci-webhook Route URL > Secret).
*/}}
apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerTemplate
metadata:
  name: agentit-ci-trigger
  namespace: {{ .Release.Namespace }}
spec:
  params:
    - name: revision
      default: main
  resourcetemplates:
    - apiVersion: tekton.dev/v1
      kind: PipelineRun
      metadata:
        generateName: agentit-ci-
        namespace: {{ .Release.Namespace }}
      spec:
        pipelineRef:
          name: agentit-ci
        params:
          - name: revision
            value: $(tt.params.revision)
        workspaces:
          - name: source
            volumeClaimTemplate:
              spec:
                accessModes: [ReadWriteOnce]
                resources:
                  requests:
                    storage: 2Gi
---
apiVersion: triggers.tekton.dev/v1beta1
kind: EventListener
metadata:
  name: agentit-ci-listener
  namespace: {{ .Release.Namespace }}
spec:
  serviceAccountName: pipeline
  triggers:
    - name: github-push
      interceptors:
        - ref:
            name: "github"
          params:
            - name: "secretRef"
              value:
                secretName: github-webhook-secret
                secretKey: secret
            - name: "eventTypes"
              value: ["push"]
        - ref:
            name: "cel"
          params:
            - name: "filter"
              value: "body.ref == 'refs/heads/main'"
      bindings:
        - name: revision
          value: $(body.after)
      template:
        ref: agentit-ci-trigger
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: agentit-ci-webhook
  namespace: {{ .Release.Namespace }}
spec:
  to:
    kind: Service
    name: el-agentit-ci-listener
  port:
    targetPort: http-listener
  tls:
    termination: edge
{{- end }}
