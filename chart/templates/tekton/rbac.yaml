{{- if .Values.tektonCI.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pipeline
  namespace: {{ .Release.Namespace }}
---
{{- /*
Minimal namespaced permissions for the "pipeline" SA. Of everything that runs as this SA
(CI tasks, the tekton-cleanup CronJob, and the cve-scan/compliance-rescan/dependency-update/
cost-report rescan CronJobs), only tekton-cleanup calls the Kubernetes API — the CI tasks
(git-clone, tests, buildah) and the rescan CronJobs run local repo/DB commands only. The
separate agentit-ci-argocd-patch Role below (in openshift-gitops) covers the notify-argocd
step. Do not widen this back to ClusterRole "edit" without confirming a task actually needs it.
*/}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: agentit-ci-cleanup
  namespace: {{ .Release.Namespace }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "delete"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "delete"]
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["get", "list", "delete"]
  - apiGroups: ["tekton.dev"]
    resources: ["pipelineruns", "taskruns"]
    verbs: ["get", "list", "delete"]
  - apiGroups: ["image.openshift.io"]
    resources: ["imagestreams"]
    verbs: ["get"]
  - apiGroups: ["image.openshift.io"]
    resources: ["imagestreamtags"]
    verbs: ["delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: agentit-ci-cleanup
  namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: agentit-ci-cleanup
subjects:
  - kind: ServiceAccount
    name: pipeline
    namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: agentit-ci-argocd-patch
  namespace: openshift-gitops
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    resourceNames: ["agentit"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: agentit-ci-argocd-patch
  namespace: openshift-gitops
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: agentit-ci-argocd-patch
subjects:
  - kind: ServiceAccount
    name: pipeline
    namespace: {{ .Release.Namespace }}
{{- end }}
