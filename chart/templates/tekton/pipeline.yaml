{{- if .Values.tektonCI.enabled }}
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: agentit-ci
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
spec:
  params:
    - name: repo-url
      type: string
      # No `.git` suffix: this default feeds both `git-clone`'s URL (which
      # accepts either form) AND `register-self-in-fleet`'s webhook body
      # (which does not normalize) -- a `.git`-suffixed default there
      # briefly created a second, duplicate Fleet row for AgentIT itself
      # before `normalize_repo_url()` (store.py) existed to collapse it.
      # Keep this pre-normalized so it matches store.py's canonical form
      # even if a future write path forgets to normalize.
      default: https://github.com/alimobrem/AgentIT
    - name: revision
      type: string
      default: main
    - name: image-ref
      type: string
      default: image-registry.openshift-image-registry.svc:5000/{{ .Release.Namespace }}/agentit
  workspaces:
    - name: source
  tasks:
    # Many agents can push to main in quick succession, and each push gets
    # its own PipelineRun (trigger.yaml). Without this, every one of those
    # runs to completion independently -- piling up retries/queue time and
    # node-resource contention (the exact ExceededNodeResources congestion
    # this task exists to relieve) for commits that are already stale by
    # the time they'd finish. Runs first, before any real work starts:
    # finds other still-active agentit-ci PipelineRuns strictly OLDER than
    # this one (by creationTimestamp, never by listing order/name -- keeps
    # the direction always "newer supersedes older", so two runs created
    # around the same instant can never cancel each other) and cancels
    # them, UNLESS they've already started build-image -- once that task's
    # TaskRun exists, that run may already be building/pushing an image on
    # its way to notify-argocd, and superseding it in favor of a run that
    # hasn't even built yet could cancel the one whose image is about to go
    # live. Deliberately best-effort/fail-safe: every external call is
    # guarded so a transient API error here can never fail the pipeline --
    # only skip the supersede check for that one run.
    - name: supersede-stale-runs
      retries: 1
      timeout: "2m0s"
      taskSpec:
        steps:
          - name: supersede
            image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
            computeResources:
              requests:
                memory: 64Mi
                cpu: 50m
            script: |
              set -euo pipefail
              NS="{{ .Release.Namespace }}"
              SELF="$(context.pipelineRun.name)"
              echo "Checking whether to supersede older in-flight agentit-ci PipelineRuns (self: $SELF)..."

              SELF_CREATED=$(oc get pipelinerun "$SELF" -n "$NS" -o jsonpath='{.metadata.creationTimestamp}' 2>/dev/null || echo "")
              if [ -z "$SELF_CREATED" ]; then
                echo "Could not read own creationTimestamp -- skipping supersede check for this run."
                exit 0
              fi

              CANCELLED=0
              oc get pipelinerun -n "$NS" -l tekton.dev/pipeline=agentit-ci \
                -o jsonpath='{range .items[*]}{.metadata.name}{" "}{.metadata.creationTimestamp}{" "}{.status.completionTime}{"\n"}{end}' \
                > /tmp/agentit-ci-pipelineruns.txt 2>/dev/null || true

              while read -r NAME CREATED COMPLETED; do
                if [ -z "$NAME" ] || [ "$NAME" = "$SELF" ]; then continue; fi
                if [ -n "$COMPLETED" ]; then continue; fi
                if [ -z "$CREATED" ] || ! [ "$CREATED" \< "$SELF_CREATED" ]; then continue; fi

                EXISTING_STATUS=$(oc get pipelinerun "$NAME" -n "$NS" -o jsonpath='{.spec.status}' 2>/dev/null || echo "")
                case "$EXISTING_STATUS" in
                  Cancelled|CancelledRunFinally) continue ;;
                esac

                BUILD_STARTED=$(oc get pipelinerun "$NAME" -n "$NS" -o jsonpath='{.status.childReferences[?(@.pipelineTaskName=="build-image")].pipelineTaskName}' 2>/dev/null || echo "")
                if [ -n "$BUILD_STARTED" ]; then
                  echo "Leaving older PipelineRun $NAME running -- already past build-image."
                  continue
                fi

                if oc patch pipelinerun "$NAME" -n "$NS" --type=merge -p '{"spec":{"status":"Cancelled"}}' 2>/dev/null; then
                  CANCELLED=$((CANCELLED+1))
                  echo "Superseded older PipelineRun $NAME (not yet past build-image)."
                fi
              done < /tmp/agentit-ci-pipelineruns.txt

              echo "Superseded $CANCELLED older PipelineRun(s)."

    - name: git-clone
      retries: 2
      timeout: "5m0s"
      runAfter: [supersede-stale-runs]
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: git-clone
          - name: namespace
            value: openshift-pipelines
      params:
        - name: URL
          value: $(params.repo-url)
        - name: REVISION
          value: $(params.revision)
      workspaces:
        - name: output
          workspace: source

    - name: run-tests
      retries: 1
      timeout: "10m0s"
      runAfter: [git-clone]
      taskSpec:
        workspaces:
          - name: source
        # Postgres is the only supported store (see
        # docs/postgres-migration-plan.md) -- nearly the whole suite needs
        # a real instance now, not just an opt-in subset, so this Task runs
        # one as a Tekton Sidecar (shares the step containers' network
        # namespace/localhost, the standard Tekton pattern for a
        # test-support service) instead of relying on SQLite's
        # zero-infrastructure convenience.
        sidecars:
          - name: postgres
            image: registry.redhat.io/rhel9/postgresql-15@sha256:06aeada2ca417445bc4fb711729e65a02ee78421a09c862cbd136ebdd51d7cfa
            # Tekton's Pipeline API always round-trips sidecars with an
            # explicit empty computeResources object (same webhook-
            # normalization class as taskSpec.metadata/spec below). Emit
            # it here so Argo's desired state matches live and
            # agentit-ci does not stay perpetually OutOfSync.
            computeResources: {}
            env:
              - name: POSTGRESQL_USER
                value: agentit_test
              - name: POSTGRESQL_PASSWORD
                value: agentit_test
              - name: POSTGRESQL_DATABASE
                value: agentit_test
            readinessProbe:
              exec:
                command: ["pg_isready", "-U", "agentit_test"]
              periodSeconds: 3
              failureThreshold: 20
        steps:
          - name: test
            image: registry.access.redhat.com/ubi9/python-312:latest
            workingDir: $(workspaces.source.path)
            env:
              - name: AGENTIT_TEST_PG_DSN
                value: postgresql://agentit_test:agentit_test@localhost:5432/agentit_test
              # Match GHA Tests: hermetic suite must not use in-cluster SA
              # discovery (hangs / flakes). conftest also forces OFFLINE=1;
              # set both explicitly so a missing autouse never reaches the API.
              - name: AGENTIT_OFFLINE
                value: "1"
              - name: KUBECONFIG
                value: /tmp/nonexistent-path
            computeResources:
              requests:
                memory: 256Mi
                cpu: 200m
              limits:
                memory: 1Gi
            script: |
              set -euo pipefail
              pip install --no-cache-dir -e ".[dev]" 2>&1
              # Full Playwright crawl (test_browser.py) and the lean critical
              # journeys (test_browser_critical.py) need Chromium — gated in
              # GitHub Actions' browser-critical job, not this UBI task.
              python -m pytest tests/ -q --tb=short \
                --ignore=tests/test_real_repos.py \
                --ignore=tests/test_browser.py \
                --ignore=tests/test_browser_critical.py \
                --ignore=tests/test_live_cluster_e2e.py
              echo "Tests passed"
      workspaces:
        - name: source
          workspace: source

    - name: build-image
      retries: 1
      timeout: "15m0s"
      runAfter: [run-tests]
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: buildah
          - name: namespace
            value: openshift-pipelines
      params:
        - name: IMAGE
          value: $(params.image-ref):$(params.revision)
        - name: DOCKERFILE
          value: ./Containerfile
        - name: CONTEXT
          value: .
        - name: BUILD_EXTRA_ARGS
          value: "--label git.commit=$(params.revision)"
      workspaces:
        - name: source
          workspace: source

    # Smoke-tests the actual image build-image just produced by running a
    # container from it and checking the exact tools/dirs capability-scout's
    # own safety gates and self-fix flow need at runtime -- git (local
    # working-tree push), a real .git checkout, pytest, tests/, chart/, and
    # docs/. GitHub PR create/list/status use the REST API (GITHUB_TOKEN),
    # not the `gh` CLI. Each of these was previously discovered missing one
    # at a time, live, only when a watcher pod happened to need it (see
    # Containerfile's comments for each fix) -- this task fails the pipeline
    # loudly and immediately instead, before notify-argocd ever promotes the
    # broken tag to the live Rollout.
    - name: smoke-test-image
      retries: 1
      timeout: "5m0s"
      runAfter: [build-image]
      taskSpec:
        params:
          - name: image
            type: string
        steps:
          - name: smoke-test
            image: $(params.image)
            computeResources:
              requests:
                memory: 128Mi
                cpu: 100m
              limits:
                memory: 256Mi
            command: ["/bin/sh", "-c"]
            args:
              - |
                set -eu
                echo "pytest is present:"
                python -m pytest --version
                echo "tests/ exists and is non-empty:"
                test -d tests
                [ -n "$(ls -A tests)" ]
                echo "chart/ exists (capability-scout's safety gates need it):"
                test -d chart
                echo "docs/ exists (capability-scout scan_doc_gaps needs it):"
                test -d docs
                [ -n "$(ls docs/*.md 2>/dev/null)" ]
                echo "git CLI is present (working-tree push; GitHub PRs use REST):"
                git --version
                echo "agentit.kube / github_pr importable (no oc/gh for cluster/PR ops):"
                python -c "from agentit import kube; from agentit.portal import github_pr"
                echo "/opt/app-root/src is a real, valid git checkout:"
                # OpenShift/Tekton run this step as an arbitrary UID; the
                # build-time `git config --global` (USER 1001 home) is not
                # visible, so git's dubious-ownership check rejects .git
                # without a runtime safe.directory for the current user.
                git config --global --add safe.directory /opt/app-root/src
                git -C /opt/app-root/src status
                echo "Image smoke test passed."
      params:
        - name: image
          value: $(params.image-ref):$(params.revision)

    # 2026-07-17 incident: this task's pod sat unschedulable (PV node-affinity
    # + untolerated-taint conflict -- see trigger.yaml's notify-argocd
    # podTemplate.tolerations, the real fix for that) long enough to exceed
    # the old 2m timeout before the scheduling picture improved, and
    # separately hit `etcdserver: request timed out` during Task resolution
    # under control-plane pressure. 5m gives real transient scheduling/etcd
    # delays room to clear on their own. Deliberately NOT raising `retries`
    # above 1: earlier the same session, a *different* task's retry pileup
    # (fresh pod per retry, same resource-starved nodes) turned one hang into
    # a 10-minute cascading failure -- more retries compound exactly the
    # resource pressure that caused the original delay, they don't fix it.
    - name: notify-argocd
      retries: 1
      timeout: "5m0s"
      runAfter: [run-tests, smoke-test-image]
      taskSpec:
        params:
          - name: revision
            type: string
        workspaces:
          - name: source
        steps:
          # Re-apply the committed Application manifest FIRST so any new/changed Helm
          # parameter in argocd/application.yaml lands on the live object as part of
          # the normal deploy flow. Uses openshift/cli `oc apply` (proven with the
          # agentit-ci-argocd-patch Role: get+patch on Application/agentit).
          # #125 switched this to kube.apply_yaml on the just-built image; Argo
          # syncs chart/ from main independently of image.tag, so that tip
          # notify could go live while SSA/RBAC/field-manager issues blocked
          # promote — portal stuck. Keep oc apply until SSA notify is proven
          # live with expanded RBAC. Rewrite image.tag before apply so Argo
          # never briefly sees bootstrap `latest`.
          - name: sync-application-spec
            image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
            workingDir: $(workspaces.source.path)
            env:
              - name: REVISION
                value: $(params.revision)
            computeResources:
              requests:
                memory: 64Mi
                cpu: 50m
            script: |
              set -euo pipefail
              # Replace only the image.tag Helm parameter value (bootstrap is "latest").
              sed -i -E '/name: image\.tag/{n;s/^([[:space:]]*value: ).*/\1'"${REVISION}"'/;}' \
                argocd/application.yaml
              grep -A1 'name: image.tag' argocd/application.yaml
              oc apply -f argocd/application.yaml
              echo "Synced argocd/application.yaml with image.tag=${REVISION}"
      params:
        - name: revision
          value: $(params.revision)
      workspaces:
        - name: source
          workspace: source

  finally:
    - name: self-assess
      timeout: "10m0s"
      taskSpec:
        workspaces:
          - name: source
        steps:
          - name: assess
            image: registry.access.redhat.com/ubi9/python-312:latest
            workingDir: $(workspaces.source.path)
            computeResources:
              requests:
                memory: 256Mi
                cpu: 200m
              limits:
                memory: 1Gi
            script: |
              set -euo pipefail
              pip install --no-cache-dir -e . 2>&1 | tail -1
              echo "Running self-assessment..."
              if RESULT=$(python -m agentit assess . --format json --criticality high 2>&1); then
                SCORE=$(echo "$RESULT" | python3 -c "import sys,json; print(int(json.load(sys.stdin).get('overall_score',0)))" 2>/dev/null || echo 0)
                echo "Self-assessment score: $SCORE/100"
              else
                echo "TOOL_FAILED: self-assessment command exited non-zero"
                echo "Output: $RESULT"
              fi
      workspaces:
        - name: source
          workspace: source

    # Registers AgentIT's own repo into its own fleet (store.get_fleet_data()),
    # via the same /api/webhook/assess entry point Argo Events Sensors use --
    # so the assessment is persisted through the running portal's own store
    # connection instead of a second writer touching the SQLite/Postgres
    # backend directly from a Tekton pod. Once AgentIT is a tracked fleet
    # app, the vuln-watcher watcher (already enabled live) and the
    # cost-report CronJob (chart/templates/workflows/cost-report-cronjob.yaml)
    # automatically start covering it too -- no separate code path needed.
    # Best-effort: failure here never fails the pipeline (self-assess above
    # is the real CI gate).
    - name: register-self-in-fleet
      timeout: "2m0s"
      taskSpec:
        params:
          - name: repo-url
            type: string
        steps:
          - name: register
            # ubi-minimal has curl available -- same image report-status already
            # uses below for its own curl call to the GitHub API.
            image: registry.access.redhat.com/ubi9/ubi-minimal:latest
            env:
              - name: TOKEN
                valueFrom:
                  secretKeyRef:
                    name: agentit-internal-webhook-token
                    key: token
                    optional: true
            computeResources:
              requests:
                memory: 64Mi
                cpu: 50m
            script: |
              set -uo pipefail
              if [ -z "${TOKEN:-}" ]; then
                echo "No internal webhook token available -- skipping fleet self-registration."
                exit 0
              fi
              curl -sf -X POST "http://agentit.agentit.svc:8080/api/webhook/assess" \
                -H "Content-Type: application/json" \
                -H "X-Internal-Webhook-Token: $TOKEN" \
                -d "{\"repo_url\": \"$(params.repo-url)\", \"criticality\": \"high\"}" \
                && echo "AgentIT registered/refreshed in its own fleet." \
                || echo "Fleet self-registration failed (non-fatal)."
      params:
        - name: repo-url
          value: $(params.repo-url)

    - name: report-status
      timeout: "2m0s"
      params:
        - name: aggregateStatus
          value: $(tasks.status)
        - name: revision
          value: $(params.revision)
        - name: repo-url
          value: $(params.repo-url)
      taskSpec:
        params:
          - name: aggregateStatus
            type: string
          - name: revision
            type: string
          - name: repo-url
            type: string
        steps:
          - name: github-status
            image: registry.access.redhat.com/ubi9/ubi-minimal:latest
            computeResources:
              requests:
                memory: 64Mi
                cpu: 50m
            env:
              - name: GITHUB_TOKEN
                valueFrom:
                  secretKeyRef:
                    name: github-token
                    key: token
                    optional: true
            script: |
              STATUS="$(params.aggregateStatus)"
              REVISION="$(params.revision)"
              REPO_URL="$(params.repo-url)"

              if [ "$STATUS" = "Succeeded" ]; then
                GH_STATE="success"
                DESC="CI passed (tests + build + notify-argocd)"
              else
                GH_STATE="failure"
                # Keep under GitHub's ~140-char description limit. Point humans
                # at OpenShift PipelineRuns — status API has no TaskRun logs.
                DESC="CI failed: ${STATUS}. Check agentit-ci PipelineRun (ns agentit); smoke/gh drift = stuck image"
              fi

              echo "Pipeline $GH_STATE for $REVISION"

              if [ -z "${GITHUB_TOKEN:-}" ]; then
                # Non-fatal: a missing token must not undo a successful
                # notify-argocd promote. Log loudly so ops notices drift.
                echo "ERROR: GITHUB_TOKEN unset — cannot post agentit-ci/tekton status for ${REVISION}" >&2
                exit 0
              fi

              OWNER_REPO=$(echo "$REPO_URL" | sed 's|https://github.com/||;s|\.git$||')
              # Console deep-link (best-effort; cluster may differ). Empty
              # target_url was worse than a predictable PipelineRun list URL.
              TARGET_URL="https://console-openshift-console.apps.aws-jb-acsacm-1.dev05.red-chesterfield.com/k8s/ns/agentit/tekton.dev~v1~PipelineRun"
              curl -sfL -X POST \
                -H "Authorization: Bearer $GITHUB_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/${OWNER_REPO}/statuses/${REVISION}" \
                -d "{\"state\":\"${GH_STATE}\",\"description\":\"${DESC}\",\"context\":\"agentit-ci/tekton\",\"target_url\":\"${TARGET_URL}\"}" \
                && echo "Commit status posted" \
                || echo "ERROR: Failed to post commit status for ${REVISION} (non-fatal)" >&2
{{- end }}
