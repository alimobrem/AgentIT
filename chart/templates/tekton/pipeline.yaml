{{- if .Values.tektonCI.enabled }}
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: agentit-ci
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
spec:
  params:
    - name: repo-url
      type: string
      default: https://github.com/alimobrem/AgentIT.git
    - name: revision
      type: string
      default: main
    - name: image-ref
      type: string
      default: image-registry.openshift-image-registry.svc:5000/{{ .Release.Namespace }}/agentit
  workspaces:
    - name: source
  tasks:
    - name: git-clone
      retries: 2
      timeout: "5m"
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: git-clone
          - name: namespace
            value: openshift-pipelines
      params:
        - name: URL
          value: $(params.repo-url)
        - name: REVISION
          value: $(params.revision)
      workspaces:
        - name: output
          workspace: source

    - name: run-tests
      retries: 1
      timeout: "10m"
      runAfter: [git-clone]
      taskSpec:
        workspaces:
          - name: source
        steps:
          - name: test
            image: registry.access.redhat.com/ubi9/python-312:latest
            workingDir: $(workspaces.source.path)
            computeResources:
              requests:
                memory: 256Mi
                cpu: 200m
              limits:
                memory: 1Gi
            script: |
              set -euo pipefail
              pip install --no-cache-dir -e ".[dev]" 2>&1
              python -m pytest tests/ -q --tb=short \
                --ignore=tests/test_real_repos.py \
                --ignore=tests/test_browser.py \
                --ignore=tests/test_live_cluster_e2e.py
              echo "Tests passed"
      workspaces:
        - name: source
          workspace: source

    - name: build-image
      retries: 1
      timeout: "15m"
      runAfter: [git-clone]
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: buildah
          - name: namespace
            value: openshift-pipelines
      params:
        - name: IMAGE
          value: $(params.image-ref):$(params.revision)
        - name: DOCKERFILE
          value: ./Containerfile
        - name: CONTEXT
          value: .
        - name: BUILD_EXTRA_ARGS
          value: "--label git.commit=$(params.revision)"
      workspaces:
        - name: source
          workspace: source

    - name: tag-latest
      retries: 2
      timeout: "2m"
      runAfter: [build-image, run-tests]
      taskSpec:
        params:
          - name: image-ref
            type: string
          - name: revision
            type: string
        steps:
          - name: tag
            image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
            env:
              - name: REVISION
                value: $(params.revision)
            computeResources:
              requests:
                memory: 64Mi
                cpu: 50m
            script: |
              set -euo pipefail
              [[ "${REVISION}" =~ ^[a-zA-Z0-9._-]+$ ]] || { echo "Invalid revision: ${REVISION}"; exit 1; }
              oc tag "{{ .Release.Namespace }}/agentit:${REVISION}" \
                     "{{ .Release.Namespace }}/agentit:latest"
              echo "Tagged :${REVISION} as :latest"
      params:
        - name: image-ref
          value: $(params.image-ref)
        - name: revision
          value: $(params.revision)

    - name: notify-argocd
      retries: 1
      timeout: "2m"
      runAfter: [run-tests, tag-latest]
      taskSpec:
        params:
          - name: revision
            type: string
        steps:
          - name: update-image-tag
            image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
            env:
              - name: REVISION
                value: $(params.revision)
            computeResources:
              requests:
                memory: 64Mi
                cpu: 50m
            script: |
              set -euo pipefail
              TAG_INDEX=$(oc -n openshift-gitops get application agentit \
                -o jsonpath='{range .spec.source.helm.parameters[*]}{.name}{"\n"}{end}' | \
                grep -n '^image.tag$' | cut -d: -f1)
              TAG_INDEX=$((TAG_INDEX - 1))
              oc -n openshift-gitops patch application agentit --type=json \
                -p "[{\"op\":\"replace\",\"path\":\"/spec/source/helm/parameters/${TAG_INDEX}/value\",\"value\":\"${REVISION}\"}]"
              echo "Updated Application image.tag to ${REVISION}"
      params:
        - name: revision
          value: $(params.revision)

    - name: verify-deploy
      retries: 2
      timeout: "3m"
      runAfter: [notify-argocd]
      taskSpec:
        params:
          - name: image-ref
            type: string
          - name: revision
            type: string
        steps:
          - name: verify
            image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
            env:
              - name: REVISION
                value: $(params.revision)
              - name: IMAGE_REF
                value: $(params.image-ref)
            computeResources:
              requests:
                memory: 64Mi
                cpu: 50m
            script: |
              set -euo pipefail
              EXPECTED="${IMAGE_REF}:${REVISION}"
              echo "Expected image: ${EXPECTED}"

              echo "Waiting for rollout..."
              for i in $(seq 1 12); do
                RUNNING=$(oc get pods -n {{ .Release.Namespace }} \
                  -l app.kubernetes.io/name=agentit \
                  -o jsonpath='{.items[0].spec.containers[0].image}' 2>/dev/null)
                if [ "${RUNNING}" = "${EXPECTED}" ]; then
                  echo "Verified: running image matches ${REVISION}"
                  exit 0
                fi
                echo "Attempt $i: running=${RUNNING} expected=${EXPECTED}"
                sleep 10
              done
              echo "WARN: image tag mismatch after 2m"
              exit 1
      params:
        - name: image-ref
          value: $(params.image-ref)
        - name: revision
          value: $(params.revision)

  finally:
    - name: self-assess
      timeout: "10m"
      taskSpec:
        workspaces:
          - name: source
        steps:
          - name: assess
            image: registry.access.redhat.com/ubi9/python-312:latest
            workingDir: $(workspaces.source.path)
            computeResources:
              requests:
                memory: 256Mi
                cpu: 200m
              limits:
                memory: 1Gi
            script: |
              set -euo pipefail
              pip install --no-cache-dir --no-deps -e . 2>&1 | tail -1
              echo "Running self-assessment..."
              if RESULT=$(python -m agentit assess . --format json --criticality high 2>&1); then
                SCORE=$(echo "$RESULT" | python3 -c "import sys,json; print(int(json.load(sys.stdin).get('overall_score',0)))" 2>/dev/null || echo 0)
                echo "Self-assessment score: $SCORE/100"
              else
                echo "TOOL_FAILED: self-assessment command exited non-zero"
                echo "Output: $RESULT"
              fi
      workspaces:
        - name: source
          workspace: source

    - name: report-status
      timeout: "2m"
      params:
        - name: aggregateStatus
          value: $(tasks.status)
        - name: revision
          value: $(params.revision)
        - name: repo-url
          value: $(params.repo-url)
      taskSpec:
        params:
          - name: aggregateStatus
            type: string
          - name: revision
            type: string
          - name: repo-url
            type: string
        steps:
          - name: github-status
            image: registry.access.redhat.com/ubi9/ubi-minimal:latest
            computeResources:
              requests:
                memory: 64Mi
                cpu: 50m
            env:
              - name: GITHUB_TOKEN
                valueFrom:
                  secretKeyRef:
                    name: github-token
                    key: token
                    optional: true
            script: |
              STATUS="$(params.aggregateStatus)"
              REVISION="$(params.revision)"
              REPO_URL="$(params.repo-url)"

              if [ "$STATUS" = "Succeeded" ]; then
                GH_STATE="success"
                DESC="CI passed (tests + build)"
              else
                GH_STATE="failure"
                DESC="CI failed: $STATUS"
              fi

              echo "Pipeline $GH_STATE for $REVISION"

              if [ -z "${GITHUB_TOKEN:-}" ]; then
                echo "GITHUB_TOKEN not set — skipping commit status"
                exit 0
              fi

              OWNER_REPO=$(echo "$REPO_URL" | sed 's|https://github.com/||;s|\.git$||')
              curl -sfL -X POST \
                -H "Authorization: Bearer $GITHUB_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/${OWNER_REPO}/statuses/${REVISION}" \
                -d "{\"state\":\"${GH_STATE}\",\"description\":\"${DESC}\",\"context\":\"agentit-ci/tekton\"}" \
                && echo "Commit status posted" \
                || echo "Failed to post commit status (non-fatal)"
{{- end }}
