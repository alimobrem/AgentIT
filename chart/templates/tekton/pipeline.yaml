{{- if .Values.tektonCI.enabled }}
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: agentit-ci
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
spec:
  params:
    - name: repo-url
      type: string
      default: https://github.com/alimobrem/AgentIT.git
    - name: revision
      type: string
      default: main
    - name: image-ref
      type: string
      default: image-registry.openshift-image-registry.svc:5000/{{ .Release.Namespace }}/agentit:latest
  workspaces:
    - name: source
  tasks:
    - name: git-clone
      retries: 2
      timeout: "5m"
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: git-clone
          - name: namespace
            value: openshift-pipelines
      params:
        - name: URL
          value: $(params.repo-url)
        - name: REVISION
          value: $(params.revision)
      workspaces:
        - name: output
          workspace: source

    - name: run-tests
      retries: 1
      timeout: "10m"
      runAfter: [git-clone]
      taskSpec:
        workspaces:
          - name: source
        steps:
          - name: test
            image: registry.access.redhat.com/ubi9/python-312:latest
            workingDir: $(workspaces.source.path)
            computeResources:
              requests:
                memory: 512Mi
                cpu: 500m
              limits:
                memory: 1Gi
            script: |
              set -euo pipefail
              pip install --no-cache-dir -e ".[dev]" 2>&1
              python -m pytest tests/ -q --tb=short --ignore=tests/test_real_repos.py
              echo "Tests passed"
      workspaces:
        - name: source
          workspace: source

    - name: build-image
      retries: 1
      timeout: "15m"
      runAfter: [run-tests]
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: buildah
          - name: namespace
            value: openshift-pipelines
      params:
        - name: IMAGE
          value: $(params.image-ref)
        - name: DOCKERFILE
          value: ./Containerfile
        - name: CONTEXT
          value: .
      workspaces:
        - name: source
          workspace: source

    - name: restart-rollout
      timeout: "2m"
      runAfter: [build-image]
      taskSpec:
        steps:
          - name: restart
            image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
            computeResources:
              requests:
                memory: 64Mi
                cpu: 50m
            script: |
              set -euo pipefail
              oc delete pod -n {{ .Release.Namespace }} -l app.kubernetes.io/name=agentit --wait=false
              echo "Pod restart triggered — new image will be pulled"

  finally:
    - name: report-status
      timeout: "2m"
      params:
        - name: aggregateStatus
          value: $(tasks.status)
      taskSpec:
        params:
          - name: aggregateStatus
            type: string
        steps:
          - name: report
            image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
            computeResources:
              requests:
                memory: 64Mi
                cpu: 50m
            script: |
              STATUS="$(params.aggregateStatus)"
              if [ "$STATUS" = "Succeeded" ]; then
                echo "Pipeline completed successfully"
              else
                echo "Pipeline finished with status: $STATUS"
                echo "Check: oc get pipelinerun -n {{ .Release.Namespace }}"
              fi
{{- end }}
