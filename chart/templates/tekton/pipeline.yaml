{{- if .Values.tektonCI.enabled }}
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: agentit-ci
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
spec:
  params:
    - name: repo-url
      type: string
      default: https://github.com/alimobrem/AgentIT.git
    - name: revision
      type: string
      default: main
    - name: image-ref
      type: string
      default: image-registry.openshift-image-registry.svc:5000/{{ .Release.Namespace }}/agentit
  workspaces:
    - name: source
  tasks:
    - name: git-clone
      retries: 2
      timeout: "5m"
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: git-clone
          - name: namespace
            value: openshift-pipelines
      params:
        - name: URL
          value: $(params.repo-url)
        - name: REVISION
          value: $(params.revision)
      workspaces:
        - name: output
          workspace: source

    - name: run-tests
      retries: 1
      timeout: "10m"
      runAfter: [git-clone]
      taskSpec:
        workspaces:
          - name: source
        steps:
          - name: test
            image: registry.access.redhat.com/ubi9/python-312:latest
            workingDir: $(workspaces.source.path)
            computeResources:
              requests:
                memory: 256Mi
                cpu: 200m
              limits:
                memory: 1Gi
            script: |
              set -euo pipefail
              pip install --no-cache-dir -e ".[dev]" 2>&1
              python -m pytest tests/ -q --tb=short \
                --ignore=tests/test_real_repos.py \
                --ignore=tests/test_browser.py \
                --ignore=tests/test_live_cluster_e2e.py
              echo "Tests passed"
      workspaces:
        - name: source
          workspace: source

    - name: build-image
      retries: 1
      timeout: "15m"
      runAfter: [run-tests]
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: buildah
          - name: namespace
            value: openshift-pipelines
      params:
        - name: IMAGE
          value: $(params.image-ref):$(params.revision)
        - name: DOCKERFILE
          value: ./Containerfile
        - name: CONTEXT
          value: .
        - name: BUILD_EXTRA_ARGS
          value: "--tag $(params.image-ref):latest"
      workspaces:
        - name: source
          workspace: source

    - name: notify-argocd
      retries: 1
      timeout: "2m"
      runAfter: [build-image]
      taskSpec:
        steps:
          - name: refresh
            image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
            computeResources:
              requests:
                memory: 64Mi
                cpu: 50m
            script: |
              set -euo pipefail
              TIMESTAMP=$(date +%s)
              oc -n {{ .Release.Namespace }} patch rollout agentit --type=merge \
                -p "{\"spec\":{\"template\":{\"metadata\":{\"annotations\":{\"agentit.io/restart\":\"${TIMESTAMP}\"}}}}}" \
                && echo "Rollout restart triggered (${TIMESTAMP})" \
                || echo "Rollout restart failed (non-fatal)"
              oc -n openshift-gitops patch applications.argoproj.io agentit \
                --type=merge -p '{"metadata":{"annotations":{"argocd.argoproj.io/refresh":"hard"}}}' \
                && echo "Argo CD refresh triggered" \
                || echo "Argo CD refresh failed (non-fatal)"

  finally:
    - name: self-assess
      timeout: "10m"
      taskSpec:
        workspaces:
          - name: source
        steps:
          - name: assess
            image: registry.access.redhat.com/ubi9/python-312:latest
            workingDir: $(workspaces.source.path)
            computeResources:
              requests:
                memory: 256Mi
                cpu: 200m
              limits:
                memory: 1Gi
            script: |
              set -uo pipefail
              pip install --no-cache-dir -e . 2>&1 | tail -1
              echo "Running self-assessment..."
              RESULT=$(python -m agentit assess . --format json --criticality high 2>/dev/null || echo '{}')
              SCORE=$(echo "$RESULT" | python3 -c "import sys,json; print(int(json.load(sys.stdin).get('overall_score',0)))" 2>/dev/null || echo 0)
              echo "Self-assessment score: $SCORE/100"
      workspaces:
        - name: source
          workspace: source

    - name: report-status
      timeout: "2m"
      params:
        - name: aggregateStatus
          value: $(tasks.status)
        - name: revision
          value: $(params.revision)
        - name: repo-url
          value: $(params.repo-url)
      taskSpec:
        params:
          - name: aggregateStatus
            type: string
          - name: revision
            type: string
          - name: repo-url
            type: string
        steps:
          - name: github-status
            image: registry.access.redhat.com/ubi9/ubi-minimal:latest
            computeResources:
              requests:
                memory: 64Mi
                cpu: 50m
            env:
              - name: GITHUB_TOKEN
                valueFrom:
                  secretKeyRef:
                    name: github-token
                    key: token
                    optional: true
            script: |
              STATUS="$(params.aggregateStatus)"
              REVISION="$(params.revision)"
              REPO_URL="$(params.repo-url)"

              if [ "$STATUS" = "Succeeded" ]; then
                GH_STATE="success"
                DESC="CI passed (tests + build)"
              else
                GH_STATE="failure"
                DESC="CI failed: $STATUS"
              fi

              echo "Pipeline $GH_STATE for $REVISION"

              if [ -z "${GITHUB_TOKEN:-}" ]; then
                echo "GITHUB_TOKEN not set — skipping commit status"
                exit 0
              fi

              OWNER_REPO=$(echo "$REPO_URL" | sed 's|https://github.com/||;s|\.git$||')
              curl -sfL -X POST \
                -H "Authorization: Bearer $GITHUB_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/${OWNER_REPO}/statuses/${REVISION}" \
                -d "{\"state\":\"${GH_STATE}\",\"description\":\"${DESC}\",\"context\":\"agentit-ci/tekton\"}" \
                && echo "Commit status posted" \
                || echo "Failed to post commit status (non-fatal)"
{{- end }}
