{{- if .Values.tektonCI.enabled }}
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: agentit-ci
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
spec:
  params:
    - name: repo-url
      type: string
      default: https://github.com/alimobrem/AgentIT.git
    - name: revision
      type: string
      default: main
    - name: image-ref
      type: string
      default: image-registry.openshift-image-registry.svc:5000/{{ .Release.Namespace }}/agentit
  workspaces:
    - name: source
  tasks:
    - name: git-clone
      retries: 2
      timeout: "5m0s"
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: git-clone
          - name: namespace
            value: openshift-pipelines
      params:
        - name: URL
          value: $(params.repo-url)
        - name: REVISION
          value: $(params.revision)
      workspaces:
        - name: output
          workspace: source

    - name: run-tests
      retries: 1
      timeout: "10m0s"
      runAfter: [git-clone]
      taskSpec:
        workspaces:
          - name: source
        # Postgres is the only supported store (see
        # docs/postgres-migration-plan.md) -- nearly the whole suite needs
        # a real instance now, not just an opt-in subset, so this Task runs
        # one as a Tekton Sidecar (shares the step containers' network
        # namespace/localhost, the standard Tekton pattern for a
        # test-support service) instead of relying on SQLite's
        # zero-infrastructure convenience.
        sidecars:
          - name: postgres
            image: registry.redhat.io/rhel9/postgresql-15@sha256:06aeada2ca417445bc4fb711729e65a02ee78421a09c862cbd136ebdd51d7cfa
            # Tekton's Pipeline API always round-trips sidecars with an
            # explicit empty computeResources object (same webhook-
            # normalization class as taskSpec.metadata/spec below). Emit
            # it here so Argo's desired state matches live and
            # agentit-ci does not stay perpetually OutOfSync.
            computeResources: {}
            env:
              - name: POSTGRESQL_USER
                value: agentit_test
              - name: POSTGRESQL_PASSWORD
                value: agentit_test
              - name: POSTGRESQL_DATABASE
                value: agentit_test
            readinessProbe:
              exec:
                command: ["pg_isready", "-U", "agentit_test"]
              periodSeconds: 3
              failureThreshold: 20
        steps:
          - name: test
            image: registry.access.redhat.com/ubi9/python-312:latest
            workingDir: $(workspaces.source.path)
            env:
              - name: AGENTIT_TEST_PG_DSN
                value: postgresql://agentit_test:agentit_test@localhost:5432/agentit_test
            computeResources:
              requests:
                memory: 256Mi
                cpu: 200m
              limits:
                memory: 1Gi
            script: |
              set -euo pipefail
              pip install --no-cache-dir -e ".[dev]" 2>&1
              python -m pytest tests/ -q --tb=short \
                --ignore=tests/test_real_repos.py \
                --ignore=tests/test_browser.py \
                --ignore=tests/test_live_cluster_e2e.py
              echo "Tests passed"
      workspaces:
        - name: source
          workspace: source

    - name: build-image
      retries: 1
      timeout: "15m0s"
      runAfter: [run-tests]
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: buildah
          - name: namespace
            value: openshift-pipelines
      params:
        - name: IMAGE
          value: $(params.image-ref):$(params.revision)
        - name: DOCKERFILE
          value: ./Containerfile
        - name: CONTEXT
          value: .
        - name: BUILD_EXTRA_ARGS
          value: "--label git.commit=$(params.revision)"
      workspaces:
        - name: source
          workspace: source

    # Smoke-tests the actual image build-image just produced by running a
    # container from it and checking the exact tools/dirs capability-scout's
    # own safety gates and self-fix flow need at runtime -- gh, a real .git
    # checkout, pytest, tests/, chart/, and docs/. Each of these was previously
    # discovered missing one at a time, live, only when a watcher pod
    # happened to need it (see Containerfile's comments for each fix) --
    # this task fails the pipeline loudly and immediately instead, before
    # notify-argocd ever promotes the broken tag to the live Rollout.
    - name: smoke-test-image
      retries: 1
      timeout: "5m0s"
      runAfter: [build-image]
      taskSpec:
        params:
          - name: image
            type: string
        steps:
          - name: smoke-test
            image: $(params.image)
            computeResources:
              requests:
                memory: 128Mi
                cpu: 100m
              limits:
                memory: 256Mi
            command: ["/bin/sh", "-c"]
            args:
              - |
                set -eu
                echo "pytest is present:"
                python -m pytest --version
                echo "tests/ exists and is non-empty:"
                test -d tests
                [ -n "$(ls -A tests)" ]
                echo "chart/ exists (capability-scout's safety gates need it):"
                test -d chart
                echo "docs/ exists (capability-scout scan_doc_gaps needs it):"
                test -d docs
                [ -n "$(ls docs/*.md 2>/dev/null)" ]
                echo "git and gh CLIs are present:"
                git --version
                gh --version
                echo "/opt/app-root/src is a real, valid git checkout:"
                # OpenShift/Tekton run this step as an arbitrary UID; the
                # build-time `git config --global` (USER 1001 home) is not
                # visible, so git's dubious-ownership check rejects .git
                # without a runtime safe.directory for the current user.
                git config --global --add safe.directory /opt/app-root/src
                git -C /opt/app-root/src status
                echo "Image smoke test passed."
      params:
        - name: image
          value: $(params.image-ref):$(params.revision)

    - name: notify-argocd
      retries: 1
      timeout: "2m0s"
      runAfter: [run-tests, smoke-test-image]
      taskSpec:
        params:
          - name: revision
            type: string
        workspaces:
          - name: source
        steps:
          # Re-apply the committed Application manifest FIRST so any new/changed Helm
          # parameter in argocd/application.yaml (e.g. a new agents.*.enabled flag) lands
          # on the live object as part of the normal deploy flow, instead of requiring a
          # separate manual `oc apply`. This closes the gap where the live Application's
          # spec.source.helm.parameters could silently drift from git until someone
          # noticed and force-applied it by hand (which also used to clobber image.tag —
          # fixed by always running update-image-tag right after, below).
          # Rewrite image.tag in the committed Application manifest to this
          # build's REVISION *before* oc apply, then apply once. Applying the
          # bootstrap `latest` value and patching afterward races Argo
          # selfHeal / concurrent PipelineRuns onto the stale :latest tag
          # (confirmed live: scout CrashLoopBackOff — "No such command
          # 'propose-watch'" from a days-old latest digest).
          - name: sync-application-spec
            image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
            workingDir: $(workspaces.source.path)
            env:
              - name: REVISION
                value: $(params.revision)
            computeResources:
              requests:
                memory: 64Mi
                cpu: 50m
            script: |
              set -euo pipefail
              # Replace only the image.tag Helm parameter value (bootstrap is "latest").
              sed -i -E '/name: image\.tag/{n;s/^([[:space:]]*value: ).*/\1'"${REVISION}"'/;}' \
                argocd/application.yaml
              grep -A1 'name: image.tag' argocd/application.yaml
              oc apply -f argocd/application.yaml
              echo "Synced argocd/application.yaml with image.tag=${REVISION}"
      params:
        - name: revision
          value: $(params.revision)
      workspaces:
        - name: source
          workspace: source

  finally:
    - name: self-assess
      timeout: "10m0s"
      taskSpec:
        workspaces:
          - name: source
        steps:
          - name: assess
            image: registry.access.redhat.com/ubi9/python-312:latest
            workingDir: $(workspaces.source.path)
            computeResources:
              requests:
                memory: 256Mi
                cpu: 200m
              limits:
                memory: 1Gi
            script: |
              set -euo pipefail
              pip install --no-cache-dir -e . 2>&1 | tail -1
              echo "Running self-assessment..."
              if RESULT=$(python -m agentit assess . --format json --criticality high 2>&1); then
                SCORE=$(echo "$RESULT" | python3 -c "import sys,json; print(int(json.load(sys.stdin).get('overall_score',0)))" 2>/dev/null || echo 0)
                echo "Self-assessment score: $SCORE/100"
              else
                echo "TOOL_FAILED: self-assessment command exited non-zero"
                echo "Output: $RESULT"
              fi
      workspaces:
        - name: source
          workspace: source

    # Registers AgentIT's own repo into its own fleet (store.get_fleet_data()),
    # via the same /api/webhook/assess entry point Argo Events Sensors use --
    # so the assessment is persisted through the running portal's own store
    # connection instead of a second writer touching the SQLite/Postgres
    # backend directly from a Tekton pod. Once AgentIT is a tracked fleet
    # app, the vuln-watcher watcher (already enabled live) and the
    # cost-report CronJob (chart/templates/workflows/cost-report-cronjob.yaml)
    # automatically start covering it too -- no separate code path needed.
    # Best-effort: failure here never fails the pipeline (self-assess above
    # is the real CI gate).
    - name: register-self-in-fleet
      timeout: "2m0s"
      taskSpec:
        params:
          - name: repo-url
            type: string
        steps:
          - name: register
            # ubi-minimal has curl available -- same image report-status already
            # uses below for its own curl call to the GitHub API.
            image: registry.access.redhat.com/ubi9/ubi-minimal:latest
            env:
              - name: TOKEN
                valueFrom:
                  secretKeyRef:
                    name: agentit-internal-webhook-token
                    key: token
                    optional: true
            computeResources:
              requests:
                memory: 64Mi
                cpu: 50m
            script: |
              set -uo pipefail
              if [ -z "${TOKEN:-}" ]; then
                echo "No internal webhook token available -- skipping fleet self-registration."
                exit 0
              fi
              curl -sf -X POST "http://agentit.agentit.svc:8080/api/webhook/assess" \
                -H "Content-Type: application/json" \
                -H "X-Internal-Webhook-Token: $TOKEN" \
                -d "{\"repo_url\": \"$(params.repo-url)\", \"criticality\": \"high\"}" \
                && echo "AgentIT registered/refreshed in its own fleet." \
                || echo "Fleet self-registration failed (non-fatal)."
      params:
        - name: repo-url
          value: $(params.repo-url)

    - name: report-status
      timeout: "2m0s"
      params:
        - name: aggregateStatus
          value: $(tasks.status)
        - name: revision
          value: $(params.revision)
        - name: repo-url
          value: $(params.repo-url)
      taskSpec:
        params:
          - name: aggregateStatus
            type: string
          - name: revision
            type: string
          - name: repo-url
            type: string
        steps:
          - name: github-status
            image: registry.access.redhat.com/ubi9/ubi-minimal:latest
            computeResources:
              requests:
                memory: 64Mi
                cpu: 50m
            env:
              - name: GITHUB_TOKEN
                valueFrom:
                  secretKeyRef:
                    name: github-token
                    key: token
                    optional: true
            script: |
              STATUS="$(params.aggregateStatus)"
              REVISION="$(params.revision)"
              REPO_URL="$(params.repo-url)"

              if [ "$STATUS" = "Succeeded" ]; then
                GH_STATE="success"
                DESC="CI passed (tests + build)"
              else
                GH_STATE="failure"
                DESC="CI failed: $STATUS"
              fi

              echo "Pipeline $GH_STATE for $REVISION"

              if [ -z "${GITHUB_TOKEN:-}" ]; then
                echo "GITHUB_TOKEN not set — skipping commit status"
                exit 0
              fi

              OWNER_REPO=$(echo "$REPO_URL" | sed 's|https://github.com/||;s|\.git$||')
              curl -sfL -X POST \
                -H "Authorization: Bearer $GITHUB_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/${OWNER_REPO}/statuses/${REVISION}" \
                -d "{\"state\":\"${GH_STATE}\",\"description\":\"${DESC}\",\"context\":\"agentit-ci/tekton\"}" \
                && echo "Commit status posted" \
                || echo "Failed to post commit status (non-fatal)"
{{- end }}
