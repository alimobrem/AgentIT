apiVersion: v1
kind: ServiceAccount
metadata:
  name: agentit-scanner
  namespace: agentit
  labels:
    app.kubernetes.io/name: agentit
    app.kubernetes.io/component: dependency-scanning
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: agentit-scanner
  namespace: agentit
  labels:
    app.kubernetes.io/name: agentit
    app.kubernetes.io/component: dependency-scanning
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: agentit-scanner
  namespace: agentit
  labels:
    app.kubernetes.io/name: agentit
    app.kubernetes.io/component: dependency-scanning
subjects:
  - kind: ServiceAccount
    name: agentit-scanner
    namespace: agentit
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: agentit-scanner
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: agentit-dependency-scan
  namespace: agentit
  labels:
    app.kubernetes.io/name: agentit
    app.kubernetes.io/component: dependency-scanning
    app.kubernetes.io/part-of: agentit
    app.kubernetes.io/managed-by: platform-engineering
  annotations:
    description: "Weekly vulnerability scan for agentit container images and dependencies (python, javascript)"
    security.agentit/criticality: "high"
    security.agentit/score: "94"
spec:
  schedule: "0 6 * * 1"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 4
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 3600
      template:
        metadata:
          labels:
            app.kubernetes.io/name: agentit
            app.kubernetes.io/component: dependency-scanning
          annotations:
            description: "Dependency scan pod for agentit (python, javascript stacks)"
        spec:
          restartPolicy: OnFailure
          serviceAccountName: agentit-scanner
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            fsGroup: 65534
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: dependency-scan
              image: "aquasec/trivy:latest"
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
              resources:
                requests:
                  cpu: 200m
                  memory: 512Mi
                limits:
                  cpu: "1"
                  memory: 1Gi
              env:
                - name: NAMESPACE
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.namespace
                - name: SCAN_SCOPE
                  value: "images,packages"
                - name: SEVERITY_THRESHOLD
                  value: "HIGH"
                - name: APP_NAME
                  value: "agentit"
                - name: APP_STACKS
                  value: "python,javascript"
                - name: APP_CRITICALITY
                  value: "high"
                - name: TRIVY_CACHE_DIR
                  value: "/tmp/trivy-cache"
                - name: TRIVY_OUTPUT
                  value: "/tmp/scan-results/agentit-scan-report.json"
                - name: TRIVY_FORMAT
                  value: "json"
                - name: TRIVY_EXIT_CODE
                  value: "1"
                - name: TRIVY_SEVERITY
                  value: "HIGH,CRITICAL"
                - name: TRIVY_VULN_TYPE
                  value: "os,library"
                - name: TRIVY_SCANNERS
                  value: "vuln,secret,misconfig"
              volumeMounts:
                - name: scan-results
                  mountPath: /tmp/scan-results
                - name: trivy-cache
                  mountPath: /tmp/trivy-cache
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: scan-results
              emptyDir: {}
            - name: trivy-cache
              emptyDir: {}
            - name: tmp
              emptyDir: {}