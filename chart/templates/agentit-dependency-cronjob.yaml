apiVersion: v1
kind: ServiceAccount
metadata:
  name: agentit-scanner
  namespace: agentit
  labels:
    app.kubernetes.io/name: agentit
    app.kubernetes.io/component: dependency-scanning
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: agentit-scanner
  namespace: agentit
  labels:
    app.kubernetes.io/name: agentit
    app.kubernetes.io/component: dependency-scanning
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
    resourceNames: ["agentit-scanner-registry-creds"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: agentit-scanner
  namespace: agentit
  labels:
    app.kubernetes.io/name: agentit
    app.kubernetes.io/component: dependency-scanning
subjects:
  - kind: ServiceAccount
    name: agentit-scanner
    namespace: agentit
roleRef:
  kind: Role
  name: agentit-scanner
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: agentit-dependency-scan
  namespace: agentit
  labels:
    app.kubernetes.io/name: agentit
    app.kubernetes.io/component: dependency-scanning
    app.kubernetes.io/part-of: agentit
    app.kubernetes.io/managed-by: platform-engineering
    criticality: high
  annotations:
    description: "Weekly vulnerability scan for agentit container images and application dependencies (python, javascript)"
spec:
  schedule: "0 6 * * 1"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 4
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 3600
      template:
        metadata:
          labels:
            app.kubernetes.io/name: agentit
            app.kubernetes.io/component: dependency-scanning
          annotations:
            description: "Trivy-based dependency and image vulnerability scan for agentit"
        spec:
          restartPolicy: OnFailure
          serviceAccountName: agentit-scanner
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            fsGroup: 65534
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: dependency-scan
              image: "aquasec/trivy:0.58.1"
              imagePullPolicy: IfNotPresent
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: false
                capabilities:
                  drop: ["ALL"]
              resources:
                requests:
                  cpu: 200m
                  memory: 512Mi
                limits:
                  cpu: "1"
                  memory: 1Gi
              env:
                - name: NAMESPACE
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.namespace
                - name: SCAN_SCOPE
                  value: "images,packages"
                - name: SEVERITY_THRESHOLD
                  value: "HIGH"
                - name: APP_NAME
                  value: "agentit"
                - name: APP_STACKS
                  value: "python,javascript"
                - name: TRIVY_FORMAT
                  value: "table"
                - name: TRIVY_EXIT_CODE
                  value: "1"
                - name: TRIVY_SEVERITY
                  value: "HIGH,CRITICAL"
                - name: TRIVY_IGNORE_UNFIXED
                  value: "false"
                - name: TRIVY_TIMEOUT
                  value: "30m"
                - name: TRIVY_CACHE_DIR
                  value: "/tmp/trivy-cache"
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  echo "=== agentit Dependency Scan ==="
                  echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
                  echo "Namespace: ${NAMESPACE}"
                  echo "Stacks: ${APP_STACKS}"
                  echo "Severity Threshold: ${SEVERITY_THRESHOLD}"
                  echo ""

                  echo "=== Scanning filesystem for Python dependencies ==="
                  trivy fs \
                    --severity "${TRIVY_SEVERITY}" \
                    --exit-code 0 \
                    --format "${TRIVY_FORMAT}" \
                    --scanners vuln,secret \
                    --skip-dirs /proc,/sys,/dev \
                    / 2>/dev/null || true

                  echo ""
                  echo "=== Scanning for JavaScript/Node.js dependencies ==="
                  trivy fs \
                    --severity "${TRIVY_SEVERITY}" \
                    --exit-code 0 \
                    --format "${TRIVY_FORMAT}" \
                    --scanners vuln \
                    --include-dev-deps \
                    / 2>/dev/null || true

                  echo ""
                  echo "=== Scanning running pod images in namespace ${NAMESPACE} ==="
                  IMAGES=$(kubectl get pods -n "${NAMESPACE}" \
                    -o jsonpath='{range .items[*]}{range .spec.containers[*]}{.image}{"\n"}{end}{end}' \
                    2>/dev/null | sort -u || true)

                  if [ -z "${IMAGES}" ]; then
                    echo "No images found in namespace ${NAMESPACE}"
                  else
                    for IMAGE in ${IMAGES}; do
                      echo ""
                      echo "--- Scanning image: ${IMAGE} ---"
                      trivy image \
                        --severity "${TRIVY_SEVERITY}" \
                        --exit-code 0 \
                        --format "${TRIVY_FORMAT}" \
                        --timeout "${TRIVY_TIMEOUT}" \
                        --cache-dir "${TRIVY_CACHE_DIR}" \
                        "${IMAGE}" || echo "WARNING: Failed to scan image ${IMAGE}"
                    done
                  fi

                  echo ""
                  echo "=== Scan complete for agentit at $(date -u +%Y-%m-%dT%H:%M:%SZ) ==="
              volumeMounts:
                - name: tmp-volume
                  mountPath: /tmp
          volumes:
            - name: tmp-volume
              emptyDir:
                sizeLimit: 2Gi