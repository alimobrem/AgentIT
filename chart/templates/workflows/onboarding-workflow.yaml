{{- if .Values.argoWorkflows.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: agentit-onboarding
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  entrypoint: onboarding-dag
  serviceAccountName: {{ .Release.Name }}-workflow
  templates:
    - name: onboarding-dag
      dag:
        tasks:
          - name: assess
            template: run-agentit
            arguments:
              parameters:
                - name: command
                  value: assess

          - name: harden
            dependencies: [assess]
            template: run-agentit
            arguments:
              parameters:
                - name: command
                  value: harden

          - name: observe
            dependencies: [assess]
            template: run-agentit
            arguments:
              parameters:
                - name: command
                  value: observe

          - name: cicd
            dependencies: [assess]
            template: run-agentit
            arguments:
              parameters:
                - name: command
                  value: cicd

          - name: comply
            dependencies: [assess]
            template: run-agentit
            arguments:
              parameters:
                - name: command
                  value: comply

          - name: release
            dependencies: [assess]
            template: run-agentit
            arguments:
              parameters:
                - name: command
                  value: release

          - name: approve
            dependencies: [harden, observe, cicd, comply, release]
            template: approval-gate

    - name: run-agentit
      inputs:
        parameters:
          - name: command
      container:
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command: [agentit]
        args: ["{{`{{inputs.parameters.command}}`}}"]
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi

    - name: approval-gate
      suspend: {}
{{- end }}
