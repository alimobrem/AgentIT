{{- if .Values.cronJobs.costReport.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: agentit-cost-report
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  schedule: "{{ .Values.cronJobs.costReport.schedule }}"
  concurrencyPolicy: Replace
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 3600
      template:
        metadata:
          labels:
            app.kubernetes.io/name: {{ .Chart.Name }}
            app.kubernetes.io/component: cost-report
        spec:
          restartPolicy: OnFailure
          serviceAccountName: pipeline
          containers:
            - name: cost-report
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              # `watch --cost-report` was never a real CLI flag (`cli.py`'s
              # `watch()` only ever supported `--rescan`/`--dimension`) --
              # this CronJob has presumably never worked. `CostOptimizationAgent`
              # (agents/cost.py) has since been removed entirely (skills-primary
              # simplification, 2026-07-21) -- the cost dimension is skill-only
              # now, same as every other dimension -- so there's still no
              # dedicated equivalent to call; this matches the exact working
              # pattern its two siblings (compliance-rescan, dependency-update)
              # already use: a plain fleet re-assessment pass, scoped to the
              # cost dimension label for the printed per-app summary.
              command: [python, -m, agentit, watch, --rescan, --dimension, cost]
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
              env:
                # Postgres is the only supported store -- always-on, not a
                # flag. `watch --rescan` calls into the store, so this Job
                # needs the same DSN wiring every other component gets.
                - name: PGUSER
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.postgres.bundled.credentials.secretName }}
                      key: username
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.postgres.bundled.credentials.secretName }}
                      key: password
                - name: AGENTIT_DB_DSN
                  value: "postgresql://$(PGUSER):$(PGPASSWORD)@{{ .Release.Name }}-postgres-bundled.{{ .Release.Namespace }}.svc:5432/{{ .Values.postgres.bundled.credentials.database }}"
                {{- range $key, $value := .Values.env }}
                {{- if $value }}
                - name: {{ $key }}
                  value: {{ $value | quote }}
                {{- end }}
                {{- end }}
              volumeMounts:
                - name: data
                  mountPath: /data
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: {{ .Release.Name }}-data
{{- end }}
