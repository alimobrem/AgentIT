{{- if .Values.cronJobs.complianceRescan.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: agentit-compliance-rescan
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  schedule: "{{ .Values.cronJobs.complianceRescan.schedule }}"
  concurrencyPolicy: Replace
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 3600
      template:
        metadata:
          labels:
            app.kubernetes.io/name: {{ .Chart.Name }}
            app.kubernetes.io/component: compliance-rescan
        spec:
          restartPolicy: OnFailure
          serviceAccountName: pipeline
          containers:
            - name: compliance-rescan
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              command: [python, -m, agentit, watch, --rescan, --dimension, compliance]
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
              env:
                {{- range $key, $value := .Values.env }}
                {{- if $value }}
                - name: {{ $key }}
                  value: {{ $value | quote }}
                {{- end }}
                {{- end }}
{{- end }}
