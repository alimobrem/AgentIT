{{- if .Values.postgres.enabled }}
# Requires the CloudNativePG operator installed cluster-wide via OLM — see
# docs/deployment.md for the Subscription prerequisite. Same "assume operator
# X is installed, chart only ships the CR" convention this chart already
# uses for Kafka (chart/templates/kafka/kafka-cluster.yaml + Strimzi).
#
# 3 instances = 1 primary + 2 sync/async replicas: CNPG's built-in
# Kubernetes-native failover (no external DCS like Patroni/etcd) promotes a
# replica automatically if the primary pod/node is lost, satisfying the HA
# requirement without an extra distributed-consensus system to operate.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ .Release.Name }}-postgres
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: postgres
spec:
  instances: {{ .Values.postgres.instances }}
  {{- if .Values.postgres.imageName }}
  imageName: {{ .Values.postgres.imageName }}
  {{- end }}
  primaryUpdateStrategy: unsupervised
  storage:
    size: {{ .Values.postgres.storageSize | quote }}
    {{- if .Values.postgres.storageClassName }}
    storageClass: {{ .Values.postgres.storageClassName }}
    {{- end }}
  bootstrap:
    initdb:
      database: {{ .Values.postgres.credentials.database }}
      owner: {{ .Values.postgres.credentials.username }}
      secret:
        name: {{ .Values.postgres.credentials.secretName }}
  resources:
    {{- toYaml .Values.postgres.resources | nindent 4 }}
  affinity:
    podAntiAffinityType: preferred
    topologyKey: kubernetes.io/hostname
  {{- if .Values.postgres.backup.enabled }}
  backup:
    retentionPolicy: {{ .Values.postgres.backup.retentionPolicy | quote }}
    barmanObjectStore:
      destinationPath: {{ .Values.postgres.backup.destinationPath | quote }}
      s3Credentials:
        accessKeyId:
          name: {{ .Values.postgres.backup.credentialsSecretName | default "agentit-postgres-backup" }}
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: {{ .Values.postgres.backup.credentialsSecretName | default "agentit-postgres-backup" }}
          key: ACCESS_SECRET_KEY
  {{- end }}
{{- end }}
