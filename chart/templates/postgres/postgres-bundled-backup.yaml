{{- if and .Values.postgres.bundled.enabled .Values.postgres.bundled.backup.enabled }}
# pg_dump-based backup for the bundled Postgres instance, mirroring the
# existing SQLite backup pattern (chart/templates/pvc-backup.yaml +
# chart/templates/workflows/db-backup-cronjob.yaml): a dedicated
# ReadWriteOnce PVC holds a rotating set of dump files, written by a CronJob
# on a schedule, oldest dumps pruned once the retention count is exceeded.
# See docs/postgres-migration-plan.md for why this exists and what it does
# NOT cover (point-in-time recovery, off-cluster storage).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-postgres-bundled-backups
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: postgres-bundled-backup
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.postgres.bundled.backup.storageSize | default "2Gi" }}
  {{- if .Values.postgres.bundled.backup.storageClassName }}
  storageClassName: {{ .Values.postgres.bundled.backup.storageClassName }}
  {{- end }}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Release.Name }}-postgres-bundled-backup
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: postgres-bundled-backup
spec:
  schedule: {{ .Values.postgres.bundled.backup.schedule | default "23 */6 * * *" | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 300
      template:
        spec:
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: pg-backup
              image: {{ .Values.postgres.bundled.image | quote }}
              command: [/bin/sh, -c]
              args:
                - |
                  set -u
                  BACKUP_DIR=/backups
                  STAMP=$(date +%Y%m%d-%H%M%S)
                  OUT="$BACKUP_DIR/agentit-postgres-$STAMP.sql.gz"
                  STATUS="ok"
                  DETAIL=""
                  if pg_dump -h {{ .Release.Name }}-postgres-bundled -p 5432 -U "$POSTGRESQL_USER" -d "$POSTGRESQL_DATABASE" --no-owner | gzip > "$OUT"; then
                    KEEP={{ .Values.postgres.bundled.backup.retentionCount | default 8 }}
                    ls -t $BACKUP_DIR/agentit-postgres-*.sql.gz 2>/dev/null | tail -n +$((KEEP + 1)) | xargs rm -f 2>/dev/null || true
                    COUNT=$(ls $BACKUP_DIR/agentit-postgres-*.sql.gz 2>/dev/null | wc -l)
                    DETAIL="Backup $STAMP done ($COUNT retained)"
                    echo "$DETAIL"
                  else
                    STATUS="fail"
                    DETAIL="pg_dump failed for $STAMP"
                    rm -f "$OUT" 2>/dev/null || true
                    echo "$DETAIL"
                  fi

                  # Best-effort report -- see db-backup-cronjob.yaml's identical pattern
                  # for the SQLite backup. This image (rhel9/postgresql-15) isn't
                  # guaranteed to ship curl, hence the command -v guard.
                  if command -v curl >/dev/null 2>&1 && [ -n "${WEBHOOK_TOKEN:-}" ]; then
                    curl -sf -X POST "http://{{ .Release.Name }}.{{ .Release.Namespace }}.svc:8080/api/webhook/backup-status" \
                      -H "Content-Type: application/json" \
                      -H "X-Internal-Webhook-Token: $WEBHOOK_TOKEN" \
                      -d "{\"target\": \"postgres\", \"status\": \"$STATUS\", \"detail\": \"$DETAIL\"}" \
                      || echo "Failed to report backup status to portal (non-fatal)."
                  fi
                  [ "$STATUS" = "ok" ]
              env:
                - name: POSTGRESQL_USER
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.postgres.bundled.credentials.secretName }}
                      key: username
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.postgres.bundled.credentials.secretName }}
                      key: password
                - name: POSTGRESQL_DATABASE
                  value: {{ .Values.postgres.bundled.credentials.database | quote }}
                - name: WEBHOOK_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: agentit-internal-webhook-token
                      key: token
                      optional: true
              volumeMounts:
                - name: backups
                  mountPath: /backups
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: false
                capabilities:
                  drop:
                    - ALL
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 256Mi
          volumes:
            - name: backups
              persistentVolumeClaim:
                claimName: {{ .Release.Name }}-postgres-bundled-backups

---
# WaitForFirstConsumer storage classes leave a new PVC Pending until a pod
# mounts it. Argo CD treats Pending PVCs as Progressing and will not run
# PostSync hooks (or finish a sync that waits for healthy) until Bound --
# which on a CronJob-only consumer can mean hours. This one-shot Sync hook
# mounts the claim immediately so the PVC binds during the same sync.
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-postgres-bundled-backup-pvc-bind
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: postgres-bundled-backup
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/sync-wave: "0"
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  backoffLimit: 2
  activeDeadlineSeconds: 180
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: postgres-bundled-backup
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: bind
          image: registry.access.redhat.com/ubi9/ubi-minimal:latest
          command: [/bin/sh, -c, "echo PVC bind probe OK; ls /backups >/dev/null"]
          volumeMounts:
            - name: backups
              mountPath: /backups
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
      volumes:
        - name: backups
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-postgres-bundled-backups

{{- end }}
