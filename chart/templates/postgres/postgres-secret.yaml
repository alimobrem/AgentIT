{{- if .Values.postgres.enabled }}
# App-user credentials for the CloudNativePG cluster below. CNPG reads this
# Secret via spec.bootstrap.initdb.secret and will happily manage its own
# auto-generated Secret instead if this one is absent — but we template one
# here so the name is stable and predictable for future app wiring (the same
# secretKeyRef/optional:true pattern app.py currently uses for GITHUB_TOKEN).
#
# `lookup` preserves an already-existing password across `helm template`/
# `helm upgrade` re-renders so Argo CD doesn't see a spurious diff (and
# doesn't rotate the running app's credentials) on every sync. Only
# generates fresh random creds the first time this Secret is created.
{{- $existing := lookup "v1" "Secret" .Release.Namespace .Values.postgres.credentials.secretName }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.postgres.credentials.secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: postgres
type: kubernetes.io/basic-auth
data:
  {{- if $existing }}
  username: {{ index $existing.data "username" }}
  password: {{ index $existing.data "password" }}
  {{- else }}
  username: {{ .Values.postgres.credentials.username | b64enc }}
  password: {{ randAlphaNum 32 | b64enc }}
  {{- end }}
{{- end }}
