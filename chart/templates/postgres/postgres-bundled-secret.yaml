{{- if .Values.postgres.bundled.enabled }}
# App-user credentials for the bundled (non-operator) Postgres Deployment in
# postgres-bundled.yaml.
#
# This Secret's `data` deliberately contains ONLY `username` -- a fixed value
# from values.yaml, safe to re-render identically on every sync. `password`
# is intentionally NOT rendered by Helm at all (see
# postgres-bundled-secret-init-job.yaml, which is the only thing that ever
# writes it).
#
# History/why: this used to also render `password` via `randAlphaNum` guarded
# by a Helm `lookup` meant to preserve an already-generated value across
# re-renders. That never worked under real Argo CD syncs -- Argo CD's
# repo-server renders Helm sources via `helm template` with no cluster
# credentials at all (a well-known, still-open upstream limitation,
# https://github.com/argoproj/argo-cd/issues/5202), so `lookup` always
# returned empty and every sync silently regenerated a brand-new random
# password, desyncing the Secret from the live Postgres role's actual
# password (see docs/postgres-migration-plan.md, "real cutover attempted and
# rolled back", bug #1). `ignoreDifferences` + `RespectIgnoreDifferences` on
# the Argo CD Application was also tried as a follow-up fix and *also* did
# not reliably stop this cluster's Argo CD (Server-Side Apply) from
# re-applying the field -- confirmed live, twice, not just suspected. Moving
# `password` out of the Helm-rendered manifest entirely sidesteps the whole
# problem: Kubernetes Server-Side Apply tracks ownership of `Secret.data` per
# key (it's a granular map, not atomic), so a key Argo CD's applied manifest
# never mentions is never claimed, and therefore never touched, by Argo CD's
# reconciliation -- durable regardless of `lookup`/`ignoreDifferences`
# support in any given Argo CD version.
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.postgres.bundled.credentials.secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: postgres-bundled
type: kubernetes.io/basic-auth
data:
  username: {{ .Values.postgres.bundled.credentials.username | b64enc }}
{{- end }}
