{{- if .Values.postgres.bundled.enabled }}
# App-user credentials for the bundled (non-operator) Postgres Deployment in
# postgres-bundled.yaml. `lookup` preserves an already-existing password
# across `helm template`/`helm upgrade` re-renders so Argo CD doesn't see a
# spurious diff (or rotate live credentials) on every sync. Only generates
# fresh random creds the first time this Secret is created.
{{- $existing := lookup "v1" "Secret" .Release.Namespace .Values.postgres.bundled.credentials.secretName }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.postgres.bundled.credentials.secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: postgres-bundled
type: kubernetes.io/basic-auth
data:
  {{- if $existing }}
  username: {{ index $existing.data "username" }}
  password: {{ index $existing.data "password" }}
  {{- else }}
  username: {{ .Values.postgres.bundled.credentials.username | b64enc }}
  password: {{ randAlphaNum 32 | b64enc }}
  {{- end }}
{{- end }}
