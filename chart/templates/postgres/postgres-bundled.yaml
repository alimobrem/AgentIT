{{- if .Values.postgres.bundled.enabled }}
# Standalone (non-operator) Postgres that AgentIT deploys and maintains
# itself — no OLM operator, no Subscription. Uses the RHEL9-based image
# OpenShift's own `postgresql` ImageStream in the `openshift` namespace ships
# (registry.redhat.io/rhel9/postgresql-15), already pullable via this
# cluster's global pull secret. This is a single-instance, non-HA Deployment
# so AgentIT has a real, reachable Postgres to eventually point at once
# AGENTIT_DB_BACKEND is wired up — see docs/postgres-migration-plan.md for
# the full plan (including why an earlier CloudNativePG-operator design was
# tried and abandoned) and the upgrade path if HA is ever needed.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-postgres-bundled-data
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: postgres-bundled
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.postgres.bundled.storageSize | quote }}
  {{- if .Values.postgres.bundled.storageClassName }}
  storageClassName: {{ .Values.postgres.bundled.storageClassName }}
  {{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-postgres-bundled
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: postgres-bundled
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: postgres-bundled
  strategy:
    # Single ReadWriteOnce PVC — the old pod must release the volume before
    # the new one can mount it.
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: postgres-bundled
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-postgres-bundled-data
      containers:
        - name: postgresql
          image: {{ .Values.postgres.bundled.image | quote }}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRESQL_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.bundled.credentials.secretName }}
                  key: username
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.bundled.credentials.secretName }}
                  key: password
            - name: POSTGRESQL_DATABASE
              value: {{ .Values.postgres.bundled.credentials.database | quote }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/pgsql/data
          readinessProbe:
            exec:
              command:
                - /usr/bin/sh
                - -c
                - pg_isready -h 127.0.0.1 -p 5432 -U ${POSTGRESQL_USER}
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.postgres.bundled.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-postgres-bundled
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: postgres-bundled
spec:
  type: ClusterIP
  ports:
    - name: postgresql
      port: 5432
      targetPort: 5432
      protocol: TCP
  selector:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: postgres-bundled
{{- end }}
