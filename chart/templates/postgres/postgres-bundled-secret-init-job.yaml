{{- if .Values.postgres.bundled.enabled }}
# One-time bootstrap for the bundled Postgres app-user Secret's `password`
# key -- see postgres-bundled-secret.yaml for why Helm itself never renders
# this field. Runs as an Argo CD PostSync hook (after the Secret and the
# Postgres Deployment exist, on every sync) but is idempotent: it only ever
# writes the key the first time it's missing, then no-ops forever after.
# Fixed name + hook-delete-policy: Argo CD deletes and recreates this exact
# Job on every sync, same as any other Argo CD hook resource.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-postgres-secret-init
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: postgres-bundled
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-postgres-secret-init
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: postgres-bundled
rules:
  # Scoped to only the one named Secret this Job is allowed to touch -- not a
  # blanket grant over all Secrets in the namespace.
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["{{ .Values.postgres.bundled.credentials.secretName }}"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-postgres-secret-init
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: postgres-bundled
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Release.Name }}-postgres-secret-init
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}-postgres-secret-init
    namespace: {{ .Release.Namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-postgres-secret-init
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: postgres-bundled
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 120
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: postgres-bundled
    spec:
      restartPolicy: Never
      serviceAccountName: {{ .Release.Name }}-postgres-secret-init
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: init-password
          image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
          command: [/bin/sh, -c]
          args:
            - |
              set -eu
              SECRET="{{ .Values.postgres.bundled.credentials.secretName }}"
              NS="{{ .Release.Namespace }}"
              EXISTING=$(oc get secret "$SECRET" -n "$NS" -o jsonpath='{.data.password}' 2>/dev/null || true)
              if [ -n "$EXISTING" ]; then
                echo "Secret $SECRET already has a password -- leaving it untouched."
                exit 0
              fi
              echo "Secret $SECRET has no password yet -- generating one."
              # /dev/urandom bytes only land in [A-Za-z0-9] ~24% of the time
              # after filtering, so reading just 32-64 raw bytes reliably
              # under-fills a 32-char password; over-read generously.
              PASS=$(head -c 512 /dev/urandom | tr -dc 'A-Za-z0-9' | head -c 32)
              ENCODED=$(printf '%s' "$PASS" | base64 | tr -d '\n')
              oc patch secret "$SECRET" -n "$NS" --type=merge -p "{\"data\":{\"password\":\"$ENCODED\"}}"
              echo "Password generated and stored."
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
{{- end }}
