apiVersion: batch/v1
kind: Job
metadata:
  name: "{{ .Release.Name }}-data-archive"
  namespace: "{{ .Release.Namespace }}"
  labels:
    app.kubernetes.io/name: agentit
    app.kubernetes.io/component: data-archive
    app.kubernetes.io/instance: "{{ .Release.Name }}"
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 3600
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agentit
        app.kubernetes.io/component: data-archive
        app.kubernetes.io/instance: "{{ .Release.Name }}"
    spec:
      restartPolicy: OnFailure
      containers:
        - name: archive
          image: registry.access.redhat.com/rhel9/postgresql-15:latest
          env:
            - name: PGHOST
              valueFrom:
                secretKeyRef:
                  name: "{{ .Release.Name }}-db-credentials"
                  key: host
            - name: PGPORT
              valueFrom:
                secretKeyRef:
                  name: "{{ .Release.Name }}-db-credentials"
                  key: port
                  optional: true
            - name: PGDATABASE
              valueFrom:
                secretKeyRef:
                  name: "{{ .Release.Name }}-db-credentials"
                  key: database
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: "{{ .Release.Name }}-db-credentials"
                  key: username
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: "{{ .Release.Name }}-db-credentials"
                  key: password
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              TIMESTAMP=$(date +%Y%m%d-%H%M%S)
              ARCHIVE_DIR="/archive/agentit"
              mkdir -p "$ARCHIVE_DIR"

              echo "=== Data Archive for agentit ==="
              echo "Started: $(date -u)"

              if command -v pg_dump &>/dev/null && [ -n "${PGHOST:-}" ]; then
                echo "PostgreSQL detected — running pg_dump"
                pg_dump \
                  --format=custom \
                  --compress=9 \
                  --verbose \
                  --file="$ARCHIVE_DIR/agentit-${TIMESTAMP}.dump"
                echo "Database archived: $ARCHIVE_DIR/agentit-${TIMESTAMP}.dump"
                pg_dump \
                  --schema-only \
                  --file="$ARCHIVE_DIR/agentit-schema-${TIMESTAMP}.sql"
                echo "Schema archived: $ARCHIVE_DIR/agentit-schema-${TIMESTAMP}.sql"
              else
                echo "No PostgreSQL detected — running generic export"
                echo "Archiving PVC data"
                tar czf "$ARCHIVE_DIR/agentit-data-${TIMESTAMP}.tar.gz" \
                  /data/ 2>/dev/null || echo "No /data directory found"
              fi

              echo "=== Archive manifest ==="
              ls -lah "$ARCHIVE_DIR/"
              echo "Completed: $(date -u)"
          volumeMounts:
            - name: archive-storage
              mountPath: /archive
            - name: app-data
              mountPath: /data
              readOnly: true
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: archive-storage
          persistentVolumeClaim:
            claimName: "{{ .Release.Name }}-archive-pvc"
        - name: app-data
          persistentVolumeClaim:
            claimName: "{{ .Release.Name }}-data"
            readOnly: true