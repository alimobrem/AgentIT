apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: agentit
    app.kubernetes.io/instance: {{ .Release.Name }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-edit
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: agentit
    app.kubernetes.io/instance: {{ .Release.Name }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: edit
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}
    namespace: {{ .Release.Namespace }}
{{- if .Values.rbac.clusterWideApply }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-cluster-apply
  labels:
    app.kubernetes.io/name: agentit
    app.kubernetes.io/instance: {{ .Release.Name }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: edit
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}
    namespace: {{ .Release.Namespace }}
{{- end }}
{{- if .Values.rbac.operatorInstall }}
---
# Minimal permissions for the "Install Operator" button (cluster_apply.install_operator):
# creating a dedicated namespace + OperatorGroup for OwnNamespace-only operators (VPA,
# ODF, RHBK/Keycloak), and a Subscription in the existing openshift-operators namespace
# for AllNamespaces-capable ones. Namespace create is NOT covered by the "edit" ClusterRole
# above even when clusterWideApply is on ("edit" only grants get/list/watch on namespaces),
# so OwnNamespace installs still need this narrower, purpose-built grant either way.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-operator-installer
  labels:
    app.kubernetes.io/name: agentit
    app.kubernetes.io/instance: {{ .Release.Name }}
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "create"]
  - apiGroups: ["operators.coreos.com"]
    resources: ["operatorgroups"]
    verbs: ["get", "list", "create"]
  - apiGroups: ["operators.coreos.com"]
    resources: ["subscriptions"]
    verbs: ["get", "list", "create", "update", "patch"]
  - apiGroups: ["operators.coreos.com"]
    resources: ["clusterserviceversions"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-operator-installer
  labels:
    app.kubernetes.io/name: agentit
    app.kubernetes.io/instance: {{ .Release.Name }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Release.Name }}-operator-installer
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}
    namespace: {{ .Release.Namespace }}
{{- end }}
---
# Read-only visibility into Argo CD's own Applications, which live in the
# openshift-gitops namespace — a namespace-scoped Role in {{ .Release.Namespace }}
# (like the -agent-apply Role below) can't reach them. Without this, the
# Health page's "Argo synced" check has no RBAC to query and always shows
# "No Argo CD access", which also keeps the platform status stuck at
# "Partial" even when everything else is healthy.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-argocd-read
  namespace: openshift-gitops
  labels:
    app.kubernetes.io/name: agentit
    app.kubernetes.io/instance: {{ .Release.Name }}
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-argocd-read
  namespace: openshift-gitops
  labels:
    app.kubernetes.io/name: agentit
    app.kubernetes.io/instance: {{ .Release.Name }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Release.Name }}-argocd-read
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}
    namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-agent-apply
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: agentit
    app.kubernetes.io/instance: {{ .Release.Name }}
rules:
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  - apiGroups: ["monitoring.coreos.com"]
    resources: ["prometheusrules", "servicemonitors", "podmonitors"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  - apiGroups: ["kyverno.io"]
    resources: ["policies"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  - apiGroups: ["tekton.dev"]
    resources: ["tasks", "pipelines", "pipelineruns"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  - apiGroups: ["argoproj.io"]
    resources: ["applications", "rollouts", "analysistemplates"]
    verbs: ["get", "list", "create", "update", "patch"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-agent-apply
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: agentit
    app.kubernetes.io/instance: {{ .Release.Name }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Release.Name }}-agent-apply
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}
    namespace: {{ .Release.Namespace }}
  - kind: ServiceAccount
    name: pipeline
    namespace: {{ .Release.Namespace }}
