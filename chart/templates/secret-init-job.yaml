# One-time bootstrap for the random-value keys of the 2 Secrets that don't
# have their own dedicated init Job:
#   - agentit-internal-webhook-token (`token`, always created)
#   - {{ .Release.Name }}-proxy-session (`session_secret`, only when
#     auth.enabled)
# See oauth-proxy-secret.yaml and internal-webhook-token-secret.yaml for why
# Helm itself never renders these fields. Runs as an Argo CD PostSync hook
# (after the Secrets exist, on every sync) but is idempotent: it only ever
# writes a key the first time it's missing, then no-ops forever after. Fixed
# name + hook-delete-policy: Argo CD deletes and recreates this exact Job on
# every sync, same as any other Argo CD hook resource.
#
# One shared, parameterized Job handles both -- they need the identical
# get/patch-one-key-if-missing treatment, so 2 near-duplicate Job files
# would just be copy-paste. The bundled Postgres Secret keeps its own
# dedicated Job (postgres-bundled-secret-init-job.yaml) rather than being
# folded in here: it's gated behind a different flag
# (postgres.bundled.enabled) with its own independent lifecycle, and its RBAC
# is already scoped+shipped+verified live -- not worth re-touching a proven
# fix to chase file-count symmetry.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-secret-init
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: secret-init
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-secret-init
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: secret-init
rules:
  # Scoped to only the named Secrets this Job is allowed to touch -- not a
  # blanket grant over all Secrets in the namespace.
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      - agentit-internal-webhook-token
      {{- if .Values.auth.enabled }}
      - {{ .Release.Name }}-proxy-session
      {{- end }}
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-secret-init
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: secret-init
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Release.Name }}-secret-init
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}-secret-init
    namespace: {{ .Release.Namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-secret-init
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: secret-init
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 120
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: secret-init
    spec:
      restartPolicy: Never
      serviceAccountName: {{ .Release.Name }}-secret-init
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: init-secrets
          image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
          command: [/bin/sh, -c]
          args:
            - |
              set -eu
              NS="{{ .Release.Namespace }}"

              init_secret_key() {
                secret="$1"; key="$2"; length="$3"
                existing=$(oc get secret "$secret" -n "$NS" -o jsonpath="{.data.$key}" 2>/dev/null || true)
                if [ -n "$existing" ]; then
                  echo "Secret $secret already has $key -- leaving it untouched."
                  return 0
                fi
                echo "Secret $secret has no $key yet -- generating one."
                # /dev/urandom bytes only land in [A-Za-z0-9] ~24% of the time
                # after filtering, so reading just length*2 raw bytes reliably
                # under-fills the target length; over-read generously.
                value=$(head -c 512 /dev/urandom | tr -dc 'A-Za-z0-9' | head -c "$length")
                encoded=$(printf '%s' "$value" | base64 | tr -d '\n')
                oc patch secret "$secret" -n "$NS" --type=merge -p "{\"data\":{\"$key\":\"$encoded\"}}"
                echo "$key generated and stored for $secret."
              }

              init_secret_key "agentit-internal-webhook-token" "token" 40
              {{- if .Values.auth.enabled }}
              init_secret_key "{{ .Release.Name }}-proxy-session" "session_secret" 24
              {{- end }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
