---
{{- if .Values.agents.skillLearner.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-skill-learner
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}-skill-learner
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  podSelector:
    matchLabels:
      app: {{ .Release.Name }}-skill-learner
  policyTypes:
    - Ingress
    - Egress
  ingress: []
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - ports:
        - protocol: TCP
          port: 6443
    # research_cves() calls the LLM (Anthropic direct API or Vertex AI), both
    # reachable only over the public internet — not selectable via
    # podSelector/namespaceSelector, so this is scoped by port only.
    - ports:
        - protocol: TCP
          port: 443
    {{- if .Values.kafka.enabled }}
    - to:
        - podSelector:
            matchLabels:
              strimzi.io/cluster: agentit-kafka
      ports:
        - protocol: TCP
          port: 9092
    {{- end }}
{{- end }}
