# NetworkPolicies for the watcher Deployments (chart/templates/agents/*.yaml).
#
# These are background pollers, not servers — they expose no port and no other
# workload is expected to talk to them, so ingress is denied outright. Egress
# is scoped to exactly what each watcher needs: DNS, the Kubernetes API server
# (patch/read via kube.py), the portal Service, and Kafka/Postgres when those
# are enabled. This closes the gap flagged in docs/code-review-2026-07-12.md
# (#5): unlike the main portal Deployment, these had no NetworkPolicy at all.
#
# The Kubernetes API server is typically reachable on node IPs outside the pod
# network rather than via a selectable Pod/Service, so — per the standard
# NetworkPolicy pattern for this case — that egress rule has no `to` selector
# and is scoped only by port.

{{- if .Values.agents.vulnWatcher.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-vuln-watcher
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}-vuln-watcher
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  podSelector:
    matchLabels:
      app: {{ .Release.Name }}-vuln-watcher
  policyTypes:
    - Ingress
    - Egress
  ingress: []
  egress:
    # NOTE: this rule intentionally has NO `ports` restriction. Empirically
    # confirmed on this cluster (OVN-Kubernetes): a namespaceSelector peer
    # combined with a `ports` restriction never matches traffic to the DNS
    # ClusterIP Service (dns-default) -- true for both port 53 (the Service
    # port) and port 5353 (the actual CoreDNS container port the Service
    # forwards to). A peer selector with no `ports` field (allow-all-ports to
    # the peer) is the only structure that demonstrably worked in testing; see
    # docs/postgres-migration-plan.md for the full investigation. Scoping the
    # peer to the openshift-dns namespace (instead of an unrestricted `{}`,
    # which matches every namespace) keeps this from being a blanket allow-all.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-dns
    - ports:
        - protocol: TCP
          port: 6443
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: {{ .Chart.Name }}
      ports:
        - protocol: TCP
          port: 8080
    {{- if .Values.kafka.enabled }}
    - to:
        - podSelector:
            matchLabels:
              strimzi.io/cluster: agentit-kafka
      ports:
        - protocol: TCP
          port: 9092
    {{- end }}
    {{- if .Values.postgres.bundled.enabled }}
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/instance: {{ .Release.Name }}
              app.kubernetes.io/component: postgres-bundled
      ports:
        - protocol: TCP
          port: 5432
    {{- end }}
{{- end }}
---
