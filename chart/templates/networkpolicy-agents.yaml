{{- if .Values.agents.skillLearner.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-skill-learner
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}-skill-learner
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  podSelector:
    matchLabels:
      app: {{ .Release.Name }}-skill-learner
  policyTypes:
    - Ingress
    - Egress
  ingress: []
  egress:
    # NOTE: this rule intentionally has NO `ports` restriction. Empirically
    # confirmed on this cluster (OVN-Kubernetes): a namespaceSelector peer
    # combined with a `ports` restriction never matches traffic to the DNS
    # ClusterIP Service (dns-default) -- true for both port 53 (the Service
    # port) and port 5353 (the actual CoreDNS container port the Service
    # forwards to). A peer selector with no `ports` field (allow-all-ports to
    # the peer) is the only structure that demonstrably worked in testing; see
    # docs/postgres-migration-plan.md for the full investigation. Scoping the
    # peer to the openshift-dns namespace (instead of an unrestricted `{}`,
    # which matches every namespace) keeps this from being a blanket allow-all.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-dns
    - ports:
        - protocol: TCP
          port: 6443
    # research_cves() calls the LLM (Anthropic direct API or Vertex AI), both
    # reachable only over the public internet — not selectable via
    # podSelector/namespaceSelector, so this is scoped by port only.
    - ports:
        - protocol: TCP
          port: 443
    # _submit_draft_to_portal() (watchers/skill_learner.py) pushes each
    # drafted skill to the portal's own process (POST /api/webhook/skill-draft)
    # so it's visible on the Capabilities page without shared storage --
    # same rule the other 3 watchers already have for their own
    # AGENTIT_PORTAL_URL callbacks.
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: {{ .Chart.Name }}
      ports:
        - protocol: TCP
          port: 8080
    {{- if .Values.kafka.enabled }}
    - to:
        - podSelector:
            matchLabels:
              strimzi.io/cluster: agentit-kafka
      ports:
        - protocol: TCP
          port: 9092
    {{- end }}
    {{- if .Values.postgres.bundled.enabled }}
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/instance: {{ .Release.Name }}
              app.kubernetes.io/component: postgres-bundled
      ports:
        - protocol: TCP
          port: 5432
    {{- end }}
{{- end }}
---
{{- if .Values.agents.capabilityScout.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-capability-scout
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}-capability-scout
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  podSelector:
    matchLabels:
      app: {{ .Release.Name }}-capability-scout
  policyTypes:
    - Ingress
    - Egress
  ingress: []
  egress:
    # NOTE: this rule intentionally has NO `ports` restriction -- see the
    # identical rule on the other 4 watchers above for the DNS-resolution
    # rationale (empirically confirmed on this cluster's OVN-Kubernetes).
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-dns
    # propose_capability_improvement() calls the LLM (Anthropic direct API
    # or Vertex AI), and git_pr.py's push/`gh pr create` calls GitHub -- both
    # reachable only over the public internet, not selectable via
    # podSelector/namespaceSelector, so this is scoped by port only. Unlike
    # the other 4 watchers, this one does NOT need egress to the portal
    # Service (no cross-pod draft-push mechanism here -- it opens a PR
    # directly against the git remote) or to the Kubernetes API server (it
    # never calls kube.py).
    - ports:
        - protocol: TCP
          port: 443
    {{- if .Values.postgres.bundled.enabled }}
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/instance: {{ .Release.Name }}
              app.kubernetes.io/component: postgres-bundled
      ports:
        - protocol: TCP
          port: 5432
    {{- end }}
{{- end }}
---
{{- if .Values.agents.reassessScheduler.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-reassess-scheduler
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}-reassess-scheduler
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  podSelector:
    matchLabels:
      app: {{ .Release.Name }}-reassess-scheduler
  policyTypes:
    - Ingress
    - Egress
  ingress: []
  egress:
    # NOTE: this rule intentionally has NO `ports` restriction -- see the
    # identical rule on the other watchers above for the DNS-resolution
    # rationale (empirically confirmed on this cluster's OVN-Kubernetes).
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-dns
    # check_due_apps() only ever calls back into the portal's own
    # /api/webhook/assess -- unlike vuln-watcher/slo-tracker/drift-detector
    # this watcher never calls kube.py (no Kubernetes API server egress
    # needed) and unlike skill-learner/capability-scout it never calls an
    # LLM or GitHub directly (no public-internet port-443 egress needed).
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: {{ .Chart.Name }}
      ports:
        - protocol: TCP
          port: 8080
    {{- if .Values.postgres.bundled.enabled }}
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/instance: {{ .Release.Name }}
              app.kubernetes.io/component: postgres-bundled
      ports:
        - protocol: TCP
          port: 5432
    {{- end }}
{{- end }}
---
{{- if .Values.agents.selfHealthCheck.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-self-health-check
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}-self-health-check
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  podSelector:
    matchLabels:
      app: {{ .Release.Name }}-self-health-check
  policyTypes:
    - Ingress
    - Egress
  ingress: []
  egress:
    # NOTE: this rule intentionally has NO `ports` restriction -- see the
    # identical rule on the other watchers above for the DNS-resolution
    # rationale (empirically confirmed on this cluster's OVN-Kubernetes).
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-dns
    # Like vuln-watcher/slo-tracker/drift-detector, every check here reads
    # kube.py (Tekton PipelineRuns/CronJobs/Pods, Argo Applications) --
    # needs the Kubernetes API server. Like capability-scout, the
    # webhook-reachability check calls the GitHub API directly (public
    # internet, not selectable via podSelector/namespaceSelector) -- needs
    # port 443. Unlike reassess-scheduler/skill-learner, this watcher
    # never calls back into the portal Service -- no port-8080 rule.
    - ports:
        - protocol: TCP
          port: 6443
    - ports:
        - protocol: TCP
          port: 443
    {{- if .Values.kafka.enabled }}
    - to:
        - podSelector:
            matchLabels:
              strimzi.io/cluster: agentit-kafka
      ports:
        - protocol: TCP
          port: 9092
    {{- end }}
    {{- if .Values.postgres.bundled.enabled }}
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/instance: {{ .Release.Name }}
              app.kubernetes.io/component: postgres-bundled
      ports:
        - protocol: TCP
          port: 5432
    {{- end }}
{{- end }}
