{{- if .Values.monitoring.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: monitoring
spec:
  groups:
    - name: agentit.rules
      rules:
        - alert: AgentITHighErrorRate
          expr: |
            sum(rate(http_requests_total{job="{{ .Release.Name }}", status=~"5.."}[5m]))
            /
            sum(rate(http_requests_total{job="{{ .Release.Name }}"}[5m]))
            > 0.05
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "AgentIT error rate exceeds 5%"
            description: >-
              More than 5% of HTTP requests to {{ .Release.Name }} are returning
              5xx status codes for the last 5 minutes.

        - alert: AgentITHighLatency
          expr: |
            histogram_quantile(0.99,
              sum(rate(http_request_duration_seconds_bucket{job="{{ .Release.Name }}"}[5m])) by (le)
            ) > 2
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "AgentIT p99 latency exceeds 2s"
            description: >-
              The 99th percentile request latency for {{ .Release.Name }} has been
              above 2 seconds for 5 minutes.

        - alert: AgentITPodCrashLooping
          expr: |
            increase(kube_pod_container_status_restarts_total{namespace="{{ .Release.Namespace }}", pod=~"{{ .Release.Name }}.*"}[10m]) > 3
          labels:
            severity: critical
          annotations:
            summary: "AgentIT pod is crash-looping"
            description: >-
              Pod {{ "{{" }} $labels.pod {{ "}}" }} in namespace {{ .Release.Namespace }}
              has restarted more than 3 times in the last 10 minutes.

        # Watcher staleness — fires if a long-lived watcher hasn't completed a
        # successful tick in more than 2x its expected interval, which usually
        # means the pod is stuck, crashed without restarting cleanly, or the
        # loop is blocked on a downstream dependency (Kafka, cluster API, LLM).
        - alert: AgentITWatcherStale
          expr: |
            (time() - agentit_watcher_last_success_timestamp{watcher="vuln-watcher"}) > 43200
          labels:
            severity: warning
          annotations:
            summary: "vuln-watcher has not completed a tick in over 12 hours"
            description: >-
              vuln-watcher's expected interval is 6h; no successful tick has
              been recorded in over 2x that interval.

        - alert: AgentITWatcherStale
          expr: |
            (time() - agentit_watcher_last_success_timestamp{watcher="slo-tracker"}) > 600
          labels:
            severity: warning
          annotations:
            summary: "slo-tracker has not completed a tick in over 10 minutes"
            description: >-
              slo-tracker's expected interval is 5m; no successful tick has
              been recorded in over 2x that interval.

        - alert: AgentITWatcherStale
          expr: |
            (time() - agentit_watcher_last_success_timestamp{watcher="drift-detector"}) > 1200
          labels:
            severity: warning
          annotations:
            summary: "drift-detector has not completed a tick in over 20 minutes"
            description: >-
              drift-detector's expected interval is 10m; no successful tick
              has been recorded in over 2x that interval.

        - alert: AgentITWatcherStale
          expr: |
            (time() - agentit_watcher_last_success_timestamp{watcher="skill-learner"}) > 172800
          labels:
            severity: warning
          annotations:
            summary: "skill-learner has not completed a tick in over 48 hours"
            description: >-
              skill-learner's expected interval is 24h; no successful tick
              has been recorded in over 2x that interval.

        {{- if .Values.syntheticProbe.enabled }}
        # External synthetic uptime probe + TLS cert-expiry watch --
        # see synthetic-probe-cronjob.yaml. Catches Route/router-layer
        # failures kubelet's own liveness/readiness probes can't see.
        - alert: AgentITSyntheticProbeDown
          expr: |
            agentit_synthetic_probe_up == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "External synthetic probe against the public Route is failing"
            description: >-
              The agentit-synthetic-probe CronJob's last run against the
              public Route did not return a healthy response.

        - alert: AgentITSyntheticProbeStale
          expr: |
            (time() - agentit_synthetic_probe_last_run_timestamp) > 900
          labels:
            severity: warning
          annotations:
            summary: "Synthetic probe has not reported in over 15 minutes"
            description: >-
              agentit-synthetic-probe's schedule is {{ .Values.syntheticProbe.schedule }};
              no report has been received in over 15 minutes -- the CronJob
              may have stopped running.

        - alert: AgentITCertExpiringCritical
          expr: |
            agentit_route_cert_expiry_days < 7
          labels:
            severity: critical
          annotations:
            summary: "AgentIT's Route TLS certificate expires in under 7 days"
            description: "agentit_route_cert_expiry_days is {{ "{{" }} $value {{ "}}" }}."

        - alert: AgentITCertExpiringWarning
          expr: |
            agentit_route_cert_expiry_days < 14
          labels:
            severity: warning
          annotations:
            summary: "AgentIT's Route TLS certificate expires in under 14 days"
            description: "agentit_route_cert_expiry_days is {{ "{{" }} $value {{ "}}" }}."

        - alert: AgentITCertExpiringInfo
          expr: |
            agentit_route_cert_expiry_days < 30
          labels:
            severity: info
          annotations:
            summary: "AgentIT's Route TLS certificate expires in under 30 days"
            description: "agentit_route_cert_expiry_days is {{ "{{" }} $value {{ "}}" }}."
        {{- end }}

        {{- /* SQLite backup alerts removed — store is Postgres-only.
             Match postgres-bundled-backup.yaml's enable gate. */}}
        {{- if and .Values.postgres.bundled.enabled .Values.postgres.bundled.backup.enabled }}
        - alert: AgentITBackupFailed
          expr: |
            agentit_backup_last_status{target="postgres"} == 0
          labels:
            severity: warning
          annotations:
            summary: "The last Postgres backup job reported failure"
            description: >-
              agentit_backup_last_status{target="postgres"} is 0 -- see the
              agentit-postgres-bundled-backup CronJob's most recent Job logs.

        - alert: AgentITBackupStale
          expr: |
            (time() - agentit_backup_last_success_timestamp{target="postgres"}) > 43200
          labels:
            severity: warning
          annotations:
            summary: "No successful Postgres backup reported in over 12 hours"
            description: >-
              agentit-postgres-bundled-backup's schedule is
              {{ .Values.postgres.bundled.backup.schedule }}; no successful
              backup has been reported in over 12 hours.
        {{- end }}

        {{- if .Values.secretRotation.enabled }}
        - alert: AgentITSecretMissing
          expr: |
            agentit_secret_check_status{secret="github-webhook-secret"} == 0
          labels:
            severity: critical
          annotations:
            summary: "github-webhook-secret is missing from the cluster"
            description: >-
              This is the exact root cause of the 2026-07-13 EventListener
              outage (docs/deployment.md) -- recreate it with
              `oc create secret generic github-webhook-secret -n agentit
              --from-literal=secret=<value matching GitHub's webhook config>`.
        {{- end }}

        {{- if .Values.argoEvents.enabled }}
        # Confirmed real Argo Events Sensor metric (argo_events_action_failed_total,
        # labeled sensor_name/trigger_name -- see
        # https://argoproj.github.io/argo-events/metrics/#argo_events_action_failed_total)
        # for the exact CLASS of silent failure the 2026-07-13 retryStrategy.factor
        # incident caused: a Sensor whose HTTP trigger can never fire stays
        # Running/Ready at the Kubernetes level, so nothing about the Sensor
        # pod itself looks unhealthy -- see docs/deployment.md's postmortem.
        #
        # NOT YET SCRAPED: this alert can only fire once the Sensor pods' own
        # /metrics (container port "metrics", 7777 -- see argo-events'
        # pkg/reconciler/sensor/resource.go) are actually scraped into this
        # cluster's Prometheus. This chart's ServiceMonitor (servicemonitor.yaml)
        # only covers the agentit app's own Service, not the Deployments Argo
        # Events creates for each Sensor. Wiring that needs a PodMonitor
        # selecting those Sensor pods -- deliberately left out here rather
        # than guessed, since the exact pod-label selector the installed Argo
        # Events version applies isn't something this chart controls, and a
        # wrong guess would silently match zero pods (worse than no
        # PodMonitor at all, and exactly the kind of silent failure this
        # alert exists to catch).
        - alert: AgentITSensorTriggerFailing
          expr: |
            increase(argo_events_action_failed_total{namespace="{{ .Release.Namespace }}"}[15m]) > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "An AgentIT Argo Events Sensor trigger is failing to fire"
            description: >-
              argo_events_action_failed_total has increased for sensor
              {{ "{{" }} $labels.sensor_name {{ "}}" }}, trigger
              {{ "{{" }} $labels.trigger_name {{ "}}" }} in the last 15
              minutes -- the same class of silent failure the 2026-07-13
              retryStrategy.factor incident caused (docs/deployment.md).
        {{- end }}
{{- end }}
