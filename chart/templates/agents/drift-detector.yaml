{{- if .Values.agents.driftDetector.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-drift-detector
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}-drift-detector
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-drift-detector
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-drift-detector
        app.kubernetes.io/component: agent
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: drift-detector
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: [python, -m, agentit, drift-detect]
          args:
            - --interval
            - "{{ .Values.agents.driftDetector.interval }}"
          env:
            {{- if .Values.kafka.enabled }}
            - name: AGENTIT_KAFKA_BOOTSTRAP
              value: {{ .Values.kafka.bootstrapServers }}
            {{- end }}
            - name: AGENTIT_DB_PATH
              value: /data/agentit.db
            - name: AGENTIT_DB_BACKEND
              value: {{ .Values.postgres.backend | default "sqlite" | quote }}
            {{- if eq (.Values.postgres.backend | default "sqlite") "postgres" }}
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.bundled.credentials.secretName }}
                  key: username
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.bundled.credentials.secretName }}
                  key: password
            - name: AGENTIT_DB_DSN
              value: "postgresql://$(PGUSER):$(PGPASSWORD)@{{ .Release.Name }}-postgres-bundled.{{ .Release.Namespace }}.svc:5432/{{ .Values.postgres.bundled.credentials.database }}"
            {{- end }}
            - name: AGENTIT_PORTAL_URL
              value: http://{{ .Release.Name }}.{{ .Release.Namespace }}.svc:8080
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            exec:
              command: [sh, -c, "test -f /tmp/heartbeat && test $(($(date +%s) - $(stat -c %Y /tmp/heartbeat 2>/dev/null || echo 0))) -lt 900"]
            initialDelaySeconds: 60
            periodSeconds: 120
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-data
{{- end }}
