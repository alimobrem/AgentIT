{{- if .Values.agents.driftDetector.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-drift-detector
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}-drift-detector
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-drift-detector
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-drift-detector
        app.kubernetes.io/component: agent
    spec:
      # Without this, the pod runs as the namespace's bare `default` SA
      # (no custom RBAC at all) instead of the `{{ .Release.Name }}` SA
      # that rbac.yaml's -argocd-read Role actually grants read access to
      # Argo CD Applications in openshift-gitops to.
      serviceAccountName: {{ .Release.Name }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: drift-detector
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: [python, -m, agentit, drift-detect]
          args:
            - --interval
            - "{{ .Values.agents.driftDetector.interval }}"
          env:
            # Same source of truth as the image ref above / portal Rollout.
            - name: AGENTIT_GIT_COMMIT
              value: {{ .Values.image.tag | quote }}
            - name: AGENTIT_IMAGE_TAG
              value: {{ .Values.image.tag | quote }}
            {{- if .Values.kafka.enabled }}
            - name: AGENTIT_KAFKA_BOOTSTRAP
              value: {{ .Values.kafka.bootstrapServers }}
            {{- end }}
            # Postgres is the only supported store -- always-on, not a flag.
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.bundled.credentials.secretName }}
                  key: username
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.bundled.credentials.secretName }}
                  key: password
            - name: AGENTIT_DB_DSN
              value: "postgresql://$(PGUSER):$(PGPASSWORD)@{{ .Release.Name }}-postgres-bundled.{{ .Release.Namespace }}.svc:5432/{{ .Values.postgres.bundled.credentials.database }}"
            - name: AGENTIT_PORTAL_URL
              value: http://{{ .Release.Name }}.{{ .Release.Namespace }}.svc:8080
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            exec:
              command: [sh, -c, "test -f /tmp/heartbeat && test $(($(date +%s) - $(stat -c %Y /tmp/heartbeat 2>/dev/null || echo 0))) -lt 900"]
            initialDelaySeconds: 60
            periodSeconds: 120
            failureThreshold: 3
          # Raised memory (values default 512Mi-1Gi): drift-detect loads
          # fleet assessments + kube lists; 128/256 OOMed under larger fleets.
          # Keep in sync with agents.driftDetector.resources in values.yaml.
          # CPU request stays modest for tip CI scheduling.
          resources:
            requests:
              cpu: 50m
              memory: 512Mi
            limits:
              cpu: 250m
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-data
{{- end }}
