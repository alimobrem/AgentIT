{{- if and .Values.agents.skillLearner.enabled .Values.agents.skillLearner.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-skill-learner-data
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}-skill-learner
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: agent
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.agents.skillLearner.persistence.size | default "256Mi" }}
  {{- if .Values.agents.skillLearner.persistence.storageClassName }}
  storageClassName: {{ .Values.agents.skillLearner.persistence.storageClassName }}
  {{- end }}
{{- end }}
