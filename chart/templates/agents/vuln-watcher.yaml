{{- if .Values.agents.vulnWatcher.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-vuln-watcher
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}-vuln-watcher
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-vuln-watcher
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-vuln-watcher
        app.kubernetes.io/component: agent
    spec:
      # Without this, the pod runs as the namespace's bare `default` SA
      # (no custom RBAC at all) instead of the `{{ .Release.Name }}` SA
      # that rbac.yaml actually grants fleet-wide/cluster read access to.
      serviceAccountName: {{ .Release.Name }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: vuln-watcher
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: [python, -m, agentit, vuln-watch]
          args:
            - --interval
            - "{{ .Values.agents.vulnWatcher.interval }}"
          env:
            # Same source of truth as the image ref above / portal Rollout.
            - name: AGENTIT_GIT_COMMIT
              value: {{ .Values.image.tag | quote }}
            - name: AGENTIT_IMAGE_TAG
              value: {{ .Values.image.tag | quote }}
            {{- if .Values.kafka.enabled }}
            - name: AGENTIT_KAFKA_BOOTSTRAP
              value: {{ .Values.kafka.bootstrapServers }}
            {{- end }}
            # Postgres is the only supported store -- always-on, not a flag.
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.bundled.credentials.secretName }}
                  key: username
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.bundled.credentials.secretName }}
                  key: password
            - name: AGENTIT_DB_DSN
              value: "postgresql://$(PGUSER):$(PGPASSWORD)@{{ .Release.Name }}-postgres-bundled.{{ .Release.Namespace }}.svc:5432/{{ .Values.postgres.bundled.credentials.database }}"
            - name: AGENTIT_PORTAL_URL
              value: http://{{ .Release.Name }}.{{ .Release.Namespace }}.svc:8080
            # RemediationLoop (remediation_loop.py) calls back into the
            # portal's verify_internal_token-gated /api/webhook/* routes
            # from this pod -- same pattern as skill-learner.yaml below.
            # This was missing entirely, so every _assess() call 401'd
            # once the portal started enforcing the token.
            - name: AGENTIT_INTERNAL_WEBHOOK_TOKEN
              valueFrom:
                secretKeyRef:
                  name: agentit-internal-webhook-token
                  key: token
                  optional: true
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            exec:
              command: [sh, -c, "test -f /tmp/heartbeat && test $(($(date +%s) - $(stat -c %Y /tmp/heartbeat 2>/dev/null || echo 0))) -lt 900"]
            initialDelaySeconds: 60
            periodSeconds: 120
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-data
{{- end }}
