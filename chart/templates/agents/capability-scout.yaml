{{- if .Values.agents.capabilityScout.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-capability-scout
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}-capability-scout
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-capability-scout
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-capability-scout
        app.kubernetes.io/component: agent
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      volumes:
        {{- if .Values.gcp.credentialsSecret }}
        - name: gcp-credentials
          secret:
            secretName: {{ .Values.gcp.credentialsSecret }}
        {{- end }}
      containers:
        - name: capability-scout
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: [python, -m, agentit, propose-watch]
          args:
            - --interval
            - "{{ .Values.agents.capabilityScout.interval }}"
            - --max-open-prs
            - "{{ .Values.agents.capabilityScout.maxOpenPRs }}"
            - --mode
            - "{{ .Values.agents.capabilityScout.mode | default "docs" }}"
          env:
            # Same source of truth as the image ref above and the portal
            # Rollout (`.Values.image.tag`). Live dogfood once left orphan
            # AGENTIT_IMAGE_TAG/GIT_REVISION env values from an older
            # manual/SSA write that Argo never owned, so the container
            # image advanced while these env vars stayed pinned to a
            # stale SHA -- reclaim them here so every sync updates them.
            - name: AGENTIT_GIT_COMMIT
              value: {{ .Values.image.tag | quote }}
            - name: AGENTIT_IMAGE_TAG
              value: {{ .Values.image.tag | quote }}
            - name: GIT_REVISION
              value: {{ .Values.image.tag | quote }}
            # Reads AgentIT's own fleet data via the same store every other
            # watcher uses -- no shared/RWX storage needed (this watcher is
            # deliberately stateless: it opens PRs against AgentIT's own
            # git remote instead of writing anything to a local PVC). See
            # docs/self-improvement-for-agentit.md.
            # Postgres is the only supported store -- always-on, not a flag.
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.bundled.credentials.secretName }}
                  key: username
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.bundled.credentials.secretName }}
                  key: password
            - name: AGENTIT_DB_DSN
              value: "postgresql://$(PGUSER):$(PGPASSWORD)@{{ .Release.Name }}-postgres-bundled.{{ .Release.Namespace }}.svc:5432/{{ .Values.postgres.bundled.credentials.database }}"
            - name: ANTHROPIC_VERTEX_PROJECT_ID
              value: {{ .Values.env.ANTHROPIC_VERTEX_PROJECT_ID | default "" | quote }}
            - name: CLOUD_ML_REGION
              value: {{ .Values.env.CLOUD_ML_REGION | default "" | quote }}
            {{- if .Values.gcp.credentialsSecret }}
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /var/secrets/gcp/credentials.json
            {{- end }}
            # Required to push a branch and open a draft PR via `gh` --
            # same Secret the main portal Deployment already reads for
            # github_pr.py's REST calls (optional here: if unset, this
            # watcher's gate-blocked/no-PR path logs a clean event instead
            # of failing the tick).
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: github-token
                  key: token
                  optional: true
          volumeMounts:
            {{- if .Values.gcp.credentialsSecret }}
            - name: gcp-credentials
              mountPath: /var/secrets/gcp
              readOnly: true
            {{- end }}
          livenessProbe:
            exec:
              command: [sh, -c, "test -f /tmp/heartbeat && test $(($(date +%s) - $(stat -c %Y /tmp/heartbeat 2>/dev/null || echo 0))) -lt 172800"]
            initialDelaySeconds: 60
            periodSeconds: 300
            failureThreshold: 3
          resources:
            # The tests-pass safety gate (capability_scout.py's
            # run_test_suite()) shells out to `python -m pytest tests/ ...`
            # as a *subprocess of this same container* -- momentarily
            # doubling up the interpreter + every import (fastapi,
            # anthropic, kubernetes client, uvicorn, ...) on top of the
            # long-running watcher process itself, and running the full
            # ~1900-test suite for real minutes at a time. At 250m CPU /
            # 1Gi memory this still OOMKilled the pod after ~15 minutes
            # (confirmed live: the same run that takes ~3 minutes
            # unconstrained stretched out long enough under CPU throttling
            # for RSS to climb past 1Gi before finishing). This gate only
            # ever runs briefly (once per watcher tick, default every 24h,
            # or on manual trigger) so a generous temporary ceiling here
            # costs nothing at steady state. The portal Rollout, which can
            # also trigger this same gate via the manual-run route, already
            # runs at 512Mi for comparable reasons.
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 2Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
{{- end }}
