{{- if .Values.agents.skillLearner.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-skill-learner
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}-skill-learner
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-skill-learner
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-skill-learner
        app.kubernetes.io/component: agent
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      volumes:
        {{- if .Values.agents.skillLearner.persistence.enabled }}
        - name: skill-learner-data
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-skill-learner-data
        {{- end }}
        {{- if .Values.gcp.credentialsSecret }}
        - name: gcp-credentials
          secret:
            secretName: {{ .Values.gcp.credentialsSecret }}
        {{- end }}
      containers:
        - name: skill-learner
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: [python, -m, agentit, learn-watch]
          args:
            - --interval
            - "{{ .Values.agents.skillLearner.interval }}"
            - --limit
            - "{{ .Values.agents.skillLearner.limit }}"
          env:
            # Drafts are primarily pushed to the portal via an internal API
            # call (POST /api/webhook/skill-draft) so they're visible on the
            # Capabilities page immediately -- no shared/RWX storage needed
            # (none is available on this cluster: only gp2-csi/gp3-csi,
            # both EBS-backed ReadWriteOnce). See watchers/skill_learner.py's
            # module docstring for the full mechanism.
            - name: AGENTIT_PORTAL_URL
              value: http://{{ .Release.Name }}.{{ .Release.Namespace }}.svc:8080
            - name: AGENTIT_INTERNAL_WEBHOOK_TOKEN
              valueFrom:
                secretKeyRef:
                  name: agentit-internal-webhook-token
                  key: token
                  optional: true
            {{- if .Values.agents.skillLearner.persistence.enabled }}
            # Fallback-only: if the portal can't be reached this cycle, the
            # draft lands here instead of the image's own (per-pod,
            # ephemeral) `skills/` tree, so it survives THIS pod's own
            # restarts while awaiting manual recovery. Not the normal path --
            # see watchers/skill_learner.py's module docstring.
            - name: AGENTIT_SKILLS_DIR
              value: /data/skills
            {{- end }}
            {{- if .Values.kafka.enabled }}
            - name: AGENTIT_KAFKA_BOOTSTRAP
              value: {{ .Values.kafka.bootstrapServers }}
            {{- end }}
            # Postgres is the only supported store -- always-on, not a flag.
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.bundled.credentials.secretName }}
                  key: username
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.bundled.credentials.secretName }}
                  key: password
            - name: AGENTIT_DB_DSN
              value: "postgresql://$(PGUSER):$(PGPASSWORD)@{{ .Release.Name }}-postgres-bundled.{{ .Release.Namespace }}.svc:5432/{{ .Values.postgres.bundled.credentials.database }}"
            - name: ANTHROPIC_VERTEX_PROJECT_ID
              value: {{ .Values.env.ANTHROPIC_VERTEX_PROJECT_ID | default "" | quote }}
            - name: CLOUD_ML_REGION
              value: {{ .Values.env.CLOUD_ML_REGION | default "" | quote }}
            {{- if .Values.gcp.credentialsSecret }}
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /var/secrets/gcp/credentials.json
            {{- end }}
          volumeMounts:
            {{- if .Values.agents.skillLearner.persistence.enabled }}
            - name: skill-learner-data
              mountPath: /data/skills
            {{- end }}
            {{- if .Values.gcp.credentialsSecret }}
            - name: gcp-credentials
              mountPath: /var/secrets/gcp
              readOnly: true
            {{- end }}
          livenessProbe:
            # 900s (15min), matching vuln-watcher.yaml -- watchers/skill_learner.py's
            # run() loop now sleeps via watchers.sleep_with_heartbeat, which touches
            # /tmp/heartbeat every HEARTBEAT_REFRESH_SECONDS (300s) instead of only
            # once per full --interval (24h). Previously loosened to 172800s (48h)
            # as a stopgap for the restart-loop this real fix now resolves properly --
            # see docs/postgres-migration-plan.md and watchers/__init__.py's
            # sleep_with_heartbeat docstring for the full incident history.
            exec:
              command: [sh, -c, "test -f /tmp/heartbeat && test $(($(date +%s) - $(stat -c %Y /tmp/heartbeat 2>/dev/null || echo 0))) -lt 900"]
            initialDelaySeconds: 60
            periodSeconds: 120
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
{{- end }}
