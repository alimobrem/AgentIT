{{- if .Values.auth.enabled }}
# Cookie secret for the oauth-proxy sidecar (deployment.yaml). Must be 16, 24,
# or 32 bytes -- randAlphaNum 24 produces exactly 24 ASCII bytes, valid as-is
# (no need to further base64-encode the raw value, only the Secret's own
# `data` field per the usual K8s Secret convention).
#
# `lookup` preserves an already-generated secret across `helm template`/
# `helm upgrade` re-renders, same rationale as postgres-secret.yaml: avoids a
# spurious Argo CD diff and avoids invalidating every logged-in user's
# session cookie on every sync.
{{- $existing := lookup "v1" "Secret" .Release.Namespace (printf "%s-proxy-session" .Release.Name) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-proxy-session
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: agentit
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
data:
  {{- if $existing }}
  session_secret: {{ index $existing.data "session_secret" }}
  {{- else }}
  session_secret: {{ randAlphaNum 24 | b64enc }}
  {{- end }}
{{- end }}
