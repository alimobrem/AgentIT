{{- if .Values.auth.enabled }}
# Cookie secret for the oauth-proxy sidecar (deployment.yaml). Must be 16, 24,
# or 32 bytes -- 24 random alphanumeric characters are exactly 24 ASCII
# bytes, valid as-is (no need to further base64-encode the raw value, only
# the Secret's own `data` field per the usual K8s Secret convention).
#
# `session_secret` is deliberately NOT rendered by Helm at all -- see
# secret-init-job.yaml, the only thing that ever writes it. This used to be
# guarded by a Helm `lookup` meant to preserve the value across re-renders,
# but Argo CD's repo-server renders Helm sources via `helm template` with no
# destination-cluster credentials at all (a well-known, still-open upstream
# limitation, https://github.com/argoproj/argo-cd/issues/5202), so `lookup`
# always returned empty on a real sync and every sync silently minted a
# brand-new cookie secret, invalidating every logged-in user's session on
# every sync -- same root cause, and same fix, as
# postgres-bundled-secret.yaml's bug #1 (see docs/postgres-migration-plan.md).
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-proxy-session
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: agentit
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
{{- end }}
