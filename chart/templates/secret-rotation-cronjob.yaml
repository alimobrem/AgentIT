# Two related jobs, one CronJob:
#
# 1. Rotate agentit-internal-webhook-token, then restart every workload that
#    holds a copy in its env (env vars from secretKeyRef don't live-reload --
#    see internal-webhook-token-secret.yaml's own comment on why this Secret
#    is deliberately never Helm-managed for its value). Safe to fully
#    automate: this chart owns both the Secret and every one of its
#    consumers (the Argo Events Sensors re-resolve it at trigger-fire time
#    already; only the Deployments/Rollout need a restart).
#
# 2. Check (not rotate) that github-webhook-secret still exists on-cluster.
#    That Secret is intentionally NOT auto-generated here: its value must
#    match what's configured on GitHub's webhook, which this chart has no
#    credential to read or write (doing so would need a GitHub token with
#    webhook-admin scope, a materially bigger credential to hold than
#    anything else in this chart). Auto-regenerating a random value on
#    "missing" would silently desync from GitHub the same way the real
#    2026-07-13 incident happened (docs/deployment.md) -- so this only
#    reports existence via /api/webhook/secret-check, closing the "nothing
#    noticed for 8.5 hours" gap without pretending to fix the underlying
#    manual bootstrap step.
#
# Split into an initContainer (`cli` image, for `oc`) + main container
# (`ubi-minimal`, for `curl`) for the same reason synthetic-probe-cronjob.yaml
# is split: `cli` doesn't reliably ship curl (see that file's own comment).
{{- if .Values.secretRotation.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-secret-rotation
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}-secret-rotation
    app.kubernetes.io/instance: {{ .Release.Name }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-secret-rotation
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}-secret-rotation
    app.kubernetes.io/instance: {{ .Release.Name }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      - agentit-internal-webhook-token
      - github-webhook-secret
    # "patch" only needed for the internal-webhook-token rotation; github-webhook-secret
    # is get-only (existence check) but RBAC rules can't split verbs per resourceName
    # within one rule, so this rule grants patch on both -- the script itself never
    # calls patch on github-webhook-secret.
    verbs: ["get", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    resourceNames:
      - {{ .Release.Name }}-vuln-watcher
      - {{ .Release.Name }}-slo-tracker
      - {{ .Release.Name }}-drift-detector
      - {{ .Release.Name }}-skill-learner
      {{- if not .Values.rollout.enabled }}
      - {{ .Release.Name }}
      {{- end }}
    verbs: ["get", "patch"]
  {{- if .Values.rollout.enabled }}
  - apiGroups: ["argoproj.io"]
    resources: ["rollouts"]
    resourceNames:
      - {{ .Release.Name }}
    verbs: ["get", "patch"]
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-secret-rotation
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}-secret-rotation
    app.kubernetes.io/instance: {{ .Release.Name }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Release.Name }}-secret-rotation
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}-secret-rotation
    namespace: {{ .Release.Namespace }}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Release.Name }}-secret-rotation
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: secret-rotation
spec:
  schedule: "{{ .Values.secretRotation.schedule }}"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 300
      template:
        metadata:
          labels:
            app: {{ .Release.Name }}-secret-rotation
            app.kubernetes.io/component: secret-rotation
        spec:
          restartPolicy: Never
          serviceAccountName: {{ .Release.Name }}-secret-rotation
          securityContext:
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          initContainers:
            - name: rotate
              image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
              command: [/bin/sh, -c]
              args:
                - |
                  set -uo pipefail
                  NS="{{ .Release.Namespace }}"

                  echo "--- Rotating agentit-internal-webhook-token ---"
                  NEW_VALUE=$(head -c 512 /dev/urandom | tr -dc 'A-Za-z0-9' | head -c 40)
                  ENCODED=$(printf '%s' "$NEW_VALUE" | base64 | tr -d '\n')
                  if oc patch secret agentit-internal-webhook-token -n "$NS" --type=merge -p "{\"data\":{\"token\":\"$ENCODED\"}}"; then
                    echo "Rotated. Restarting consumers so they pick up the new value..."
                    {{- if .Values.rollout.enabled }}
                    oc patch rollout {{ .Release.Name }} -n "$NS" --type=merge \
                      -p "{\"spec\":{\"restartAt\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}}" \
                      || echo "Failed to restart Rollout {{ .Release.Name }} (non-fatal)."
                    {{- else }}
                    oc rollout restart deployment/{{ .Release.Name }} -n "$NS" \
                      || echo "Failed to restart Deployment {{ .Release.Name }} (non-fatal)."
                    {{- end }}
                    for dep in {{ .Release.Name }}-vuln-watcher {{ .Release.Name }}-slo-tracker {{ .Release.Name }}-drift-detector {{ .Release.Name }}-skill-learner; do
                      oc rollout restart deployment/"$dep" -n "$NS" 2>/dev/null \
                        || echo "Skipped/failed restart of $dep (may be disabled -- non-fatal)."
                    done
                  else
                    echo "Failed to rotate agentit-internal-webhook-token."
                  fi

                  echo "--- Checking github-webhook-secret exists ---"
                  if oc get secret github-webhook-secret -n "$NS" >/dev/null 2>&1; then
                    echo -n "true" > /shared/github-secret-exists
                    echo "github-webhook-secret present."
                  else
                    echo -n "false" > /shared/github-secret-exists
                    echo "github-webhook-secret is MISSING -- this caused a real 8.5h outage on 2026-07-13, see docs/deployment.md."
                  fi
              volumeMounts:
                - name: shared
                  mountPath: /shared
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: [ALL]
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
          containers:
            - name: report
              image: registry.access.redhat.com/ubi9/ubi-minimal:latest
              env:
                - name: WEBHOOK_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: agentit-internal-webhook-token
                      key: token
                      optional: true
              command: [/bin/sh, -c]
              args:
                - |
                  set -uo pipefail
                  EXISTS=$(cat /shared/github-secret-exists 2>/dev/null || echo "false")
                  if [ -z "${WEBHOOK_TOKEN:-}" ]; then
                    echo "No internal webhook token available -- skipping report."
                    exit 0
                  fi
                  # WEBHOOK_TOKEN was just rotated by the initContainer above, so this
                  # container's env (resolved at pod-start, before the rotation ran) may
                  # already be stale -- best-effort only, a failed report here just means
                  # this cycle's result doesn't show on the Health page, nothing else.
                  curl -sf -X POST "http://{{ .Release.Name }}.{{ .Release.Namespace }}.svc:8080/api/webhook/secret-check" \
                    -H "Content-Type: application/json" \
                    -H "X-Internal-Webhook-Token: $WEBHOOK_TOKEN" \
                    -d "{\"secret\": \"github-webhook-secret\", \"exists\": $EXISTS}" \
                    || echo "Failed to report secret-check result to portal (non-fatal)."
              volumeMounts:
                - name: shared
                  mountPath: /shared
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: [ALL]
              resources:
                requests:
                  cpu: 25m
                  memory: 32Mi
                limits:
                  cpu: 100m
                  memory: 64Mi
          volumes:
            - name: shared
              emptyDir: {}
{{- end }}
