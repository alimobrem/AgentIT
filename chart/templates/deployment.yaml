{{- if .Values.rollout.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Rollout
{{- else }}
apiVersion: apps/v1
kind: Deployment
{{- end }}
metadata:
  name: {{ .Release.Name }}
  labels:
    app.kubernetes.io/name: agentit
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: agentit
      app.kubernetes.io/instance: {{ .Release.Name }}
  {{- if .Values.rollout.enabled }}
  strategy:
    canary:
      steps:
        {{- range .Values.rollout.steps }}
        {{- toYaml (list .) | nindent 8 }}
        {{- /* Real health-check gate before the final promotion, not just a
        fixed pause -- see docs/deployment.md's incident postmortem and
        analysistemplate.yaml. Opt-in via rollout.analysisEnabled (default
        false) so existing deployments' behavior is unchanged unless this is
        explicitly turned on. Inserted right after setWeight:50 specifically,
        so it gates the 50%->100% promotion. */}}
        {{- if and $.Values.rollout.analysisEnabled (hasKey . "setWeight") (eq (.setWeight | int) 50) }}
        - analysis:
            templates:
              - templateName: {{ $.Release.Name }}-canary-analysis
            args:
              - name: service-name
                value: {{ $.Release.Name }}
        {{- end }}
        {{- end }}
      canaryService: {{ .Release.Name }}-canary
      stableService: {{ .Release.Name }}
  {{- end }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agentit
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: {{ .Chart.Name }}
                topologyKey: kubernetes.io/hostname
      serviceAccountName: {{ .Release.Name }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-data
        {{- if .Values.gcp.credentialsSecret }}
        - name: gcp-credentials
          secret:
            secretName: {{ .Values.gcp.credentialsSecret }}
        {{- end }}
        {{- if .Values.auth.enabled }}
        - name: proxy-tls
          secret:
            secretName: {{ .Release.Name }}-proxy-tls
        - name: proxy-session
          secret:
            secretName: {{ .Release.Name }}-proxy-session
        {{- end }}
      containers:
        - name: agentit
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            # Same value as the image ref above (`.Values.image.tag`) --
            # the CI pipeline pins both the built image tag and this Helm
            # parameter to the commit SHA (see tekton/pipeline.yaml's
            # `notify-argocd` task), so this is real "what commit is this
            # instance actually running" data for `agentit_build`/the
            # deploy-status indicator, not a placeholder.
            - name: AGENTIT_GIT_COMMIT
              value: {{ .Values.image.tag | quote }}
            - name: AGENTIT_IMAGE_TAG
              value: {{ .Values.image.tag | quote }}
            # Postgres is the only supported store -- always-on, not a
            # flag. See docs/postgres-migration-plan.md for the history of
            # how this cutover happened (that doc is now marked
            # historically-complete/superseded).
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.bundled.credentials.secretName }}
                  key: username
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.bundled.credentials.secretName }}
                  key: password
            - name: AGENTIT_DB_DSN
              value: "postgresql://$(PGUSER):$(PGPASSWORD)@{{ .Release.Name }}-postgres-bundled.{{ .Release.Namespace }}.svc:5432/{{ .Values.postgres.bundled.credentials.database }}"
            - name: ANTHROPIC_VERTEX_PROJECT_ID
              value: {{ .Values.env.ANTHROPIC_VERTEX_PROJECT_ID | default "" | quote }}
            - name: CLOUD_ML_REGION
              value: {{ .Values.env.CLOUD_ML_REGION | default "" | quote }}
            {{- if .Values.gcp.credentialsSecret }}
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /var/secrets/gcp/credentials.json
            {{- end }}
            {{- if .Values.kafka.enabled }}
            - name: AGENTIT_KAFKA_BOOTSTRAP
              value: {{ .Values.kafka.bootstrapServers | quote }}
            {{- end }}
            - name: AGENTIT_LOG_FORMAT
              value: json
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: github-token
                  key: token
                  optional: true
            - name: GITHUB_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: github-webhook-secret
                  key: secret
                  optional: true
            - name: AGENTIT_INTERNAL_WEBHOOK_TOKEN
              valueFrom:
                secretKeyRef:
                  name: agentit-internal-webhook-token
                  key: token
                  optional: true
            - name: AGENTIT_RATE_LIMIT_ENABLED
              value: {{ .Values.rateLimit.enabled | default false | quote }}
            - name: AGENTIT_RATE_LIMIT_WEBHOOK_PER_MIN
              value: {{ .Values.rateLimit.webhookPerMinute | default 30 | quote }}
            - name: AGENTIT_RATE_LIMIT_DEFAULT_PER_MIN
              value: {{ .Values.rateLimit.defaultPerMinute | default 120 | quote }}
          volumeMounts:
            - name: data
              mountPath: /data
            {{- if .Values.gcp.credentialsSecret }}
            - name: gcp-credentials
              mountPath: /var/secrets/gcp
              readOnly: true
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
        {{- if .Values.auth.enabled }}
        # Standard OpenShift oauth-proxy sidecar: terminates the cluster OAuth
        # login flow, then proxies authenticated requests to the app's real
        # port on localhost. It's in the same pod as `agentit` above, so this
        # reaches it over loopback -- no NetworkPolicy rule is needed (or
        # possible) to express "only the proxy can reach it" for that hop.
        # What NetworkPolicy *does* still need to restrict is anyone else in
        # the cluster reaching port 8080 directly instead of going through
        # this proxy on the Route's external path -- see networkpolicy.yaml.
        - name: oauth-proxy
          image: "{{ .Values.auth.image }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8443
              name: proxy-https
              protocol: TCP
          args:
            - --https-address=:8443
            - --provider=openshift
            - --openshift-service-account={{ .Values.auth.serviceAccount | default .Release.Name }}
            - --upstream=http://localhost:8080
            - --tls-cert=/etc/tls/private/tls.crt
            - --tls-key=/etc/tls/private/tls.key
            - --cookie-secret-file=/etc/proxy/secrets/session_secret
            - --cookie-secure=true
            - --pass-user-headers=true
            {{- $sar := dict "namespace" .Release.Namespace "resource" (.Values.auth.sarResource | default "namespaces") "verb" (.Values.auth.sarVerb | default "get") "resourceName" (.Values.auth.sarResourceName | default .Release.Namespace) }}
            {{- if .Values.auth.sarApiGroup }}
            {{- $_ := set $sar "group" .Values.auth.sarApiGroup }}
            {{- end }}
            - --openshift-sar={{ $sar | toJson }}
            - --skip-provider-button=true
          volumeMounts:
            - name: proxy-tls
              mountPath: /etc/tls/private
              readOnly: true
            - name: proxy-session
              mountPath: /etc/proxy/secrets
              readOnly: true
          resources:
            {{- toYaml .Values.auth.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
        {{- end }}
