{{- if .Values.rollout.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Rollout
{{- else }}
apiVersion: apps/v1
kind: Deployment
{{- end }}
metadata:
  name: {{ .Release.Name }}
  labels:
    app.kubernetes.io/name: agentit
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: agentit
      app.kubernetes.io/instance: {{ .Release.Name }}
  {{- if .Values.rollout.enabled }}
  strategy:
    canary:
      steps:
        - setWeight: 5
        - pause: { duration: 60s }
        - setWeight: 25
        - pause: { duration: 60s }
        - setWeight: 50
        - pause: { duration: 60s }
        - setWeight: 100
      canaryService: {{ .Release.Name }}-canary
      stableService: {{ .Release.Name }}
  {{- end }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agentit
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-data
        {{- if .Values.gcp.credentialsSecret }}
        - name: gcp-credentials
          secret:
            secretName: {{ .Values.gcp.credentialsSecret }}
        {{- end }}
      containers:
        - name: agentit
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: AGENTIT_DB_PATH
              value: /data/agentit.db
            - name: ANTHROPIC_VERTEX_PROJECT_ID
              value: {{ .Values.env.ANTHROPIC_VERTEX_PROJECT_ID | default "" | quote }}
            - name: CLOUD_ML_REGION
              value: {{ .Values.env.CLOUD_ML_REGION | default "" | quote }}
            {{- if .Values.gcp.credentialsSecret }}
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /var/secrets/gcp/credentials.json
            {{- end }}
            {{- if .Values.kafka.enabled }}
            - name: AGENTIT_KAFKA_BOOTSTRAP
              value: {{ .Values.kafka.bootstrapServers | quote }}
            {{- end }}
          volumeMounts:
            - name: data
              mountPath: /data
            {{- if .Values.gcp.credentialsSecret }}
            - name: gcp-credentials
              mountPath: /var/secrets/gcp
              readOnly: true
            {{- end }}
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
