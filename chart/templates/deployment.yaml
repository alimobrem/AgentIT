{{- if .Values.rollout.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Rollout
{{- else }}
apiVersion: apps/v1
kind: Deployment
{{- end }}
metadata:
  name: {{ .Release.Name }}
  labels:
    app.kubernetes.io/name: agentit
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: agentit
      app.kubernetes.io/instance: {{ .Release.Name }}
  {{- if .Values.rollout.enabled }}
  strategy:
    canary:
      steps:
        {{- toYaml .Values.rollout.steps | nindent 8 }}
      canaryService: {{ .Release.Name }}-canary
      stableService: {{ .Release.Name }}
  {{- end }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agentit
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: {{ .Chart.Name }}
                topologyKey: kubernetes.io/hostname
      serviceAccountName: {{ .Release.Name }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-data
        {{- if .Values.gcp.credentialsSecret }}
        - name: gcp-credentials
          secret:
            secretName: {{ .Values.gcp.credentialsSecret }}
        {{- end }}
      containers:
        - name: agentit
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: AGENTIT_DB_PATH
              value: /data/agentit.db
            - name: ANTHROPIC_VERTEX_PROJECT_ID
              value: {{ .Values.env.ANTHROPIC_VERTEX_PROJECT_ID | default "" | quote }}
            - name: CLOUD_ML_REGION
              value: {{ .Values.env.CLOUD_ML_REGION | default "" | quote }}
            {{- if .Values.gcp.credentialsSecret }}
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /var/secrets/gcp/credentials.json
            {{- end }}
            {{- if .Values.kafka.enabled }}
            - name: AGENTIT_KAFKA_BOOTSTRAP
              value: {{ .Values.kafka.bootstrapServers | quote }}
            {{- end }}
            - name: AGENTIT_LOG_FORMAT
              value: json
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: github-token
                  key: token
                  optional: true
            - name: GITHUB_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: github-webhook-secret
                  key: secret
                  optional: true
          volumeMounts:
            - name: data
              mountPath: /data
            {{- if .Values.gcp.credentialsSecret }}
            - name: gcp-credentials
              mountPath: /var/secrets/gcp
              readOnly: true
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
