{{- if .Values.rollout.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Rollout
{{- else }}
apiVersion: apps/v1
kind: Deployment
{{- end }}
metadata:
  name: {{ .Release.Name }}
  labels:
    app.kubernetes.io/name: agentit
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: agentit
      app.kubernetes.io/instance: {{ .Release.Name }}
  {{- if .Values.rollout.enabled }}
  strategy:
    canary:
      steps:
        {{- toYaml .Values.rollout.steps | nindent 8 }}
      canaryService: {{ .Release.Name }}-canary
      stableService: {{ .Release.Name }}
  {{- end }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agentit
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: {{ .Chart.Name }}
                topologyKey: kubernetes.io/hostname
      serviceAccountName: {{ .Release.Name }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-data
        {{- if .Values.gcp.credentialsSecret }}
        - name: gcp-credentials
          secret:
            secretName: {{ .Values.gcp.credentialsSecret }}
        {{- end }}
        {{- if .Values.auth.enabled }}
        - name: proxy-tls
          secret:
            secretName: {{ .Release.Name }}-proxy-tls
        - name: proxy-session
          secret:
            secretName: {{ .Release.Name }}-proxy-session
        {{- end }}
      containers:
        - name: agentit
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: AGENTIT_DB_PATH
              value: /data/agentit.db
            - name: ANTHROPIC_VERTEX_PROJECT_ID
              value: {{ .Values.env.ANTHROPIC_VERTEX_PROJECT_ID | default "" | quote }}
            - name: CLOUD_ML_REGION
              value: {{ .Values.env.CLOUD_ML_REGION | default "" | quote }}
            {{- if .Values.gcp.credentialsSecret }}
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /var/secrets/gcp/credentials.json
            {{- end }}
            {{- if .Values.kafka.enabled }}
            - name: AGENTIT_KAFKA_BOOTSTRAP
              value: {{ .Values.kafka.bootstrapServers | quote }}
            {{- end }}
            - name: AGENTIT_LOG_FORMAT
              value: json
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: github-token
                  key: token
                  optional: true
            - name: GITHUB_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: github-webhook-secret
                  key: secret
                  optional: true
            - name: AGENTIT_INTERNAL_WEBHOOK_TOKEN
              valueFrom:
                secretKeyRef:
                  name: agentit-internal-webhook-token
                  key: token
                  optional: true
          volumeMounts:
            - name: data
              mountPath: /data
            {{- if .Values.gcp.credentialsSecret }}
            - name: gcp-credentials
              mountPath: /var/secrets/gcp
              readOnly: true
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
        {{- if .Values.auth.enabled }}
        # Standard OpenShift oauth-proxy sidecar: terminates the cluster OAuth
        # login flow, then proxies authenticated requests to the app's real
        # port on localhost. It's in the same pod as `agentit` above, so this
        # reaches it over loopback -- no NetworkPolicy rule is needed (or
        # possible) to express "only the proxy can reach it" for that hop.
        # What NetworkPolicy *does* still need to restrict is anyone else in
        # the cluster reaching port 8080 directly instead of going through
        # this proxy on the Route's external path -- see networkpolicy.yaml.
        - name: oauth-proxy
          image: "{{ .Values.auth.image }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8443
              name: proxy-https
              protocol: TCP
          args:
            - --https-address=:8443
            - --provider=openshift
            - --openshift-service-account={{ .Values.auth.serviceAccount | default .Release.Name }}
            - --upstream=http://localhost:8080
            - --tls-cert=/etc/tls/private/tls.crt
            - --tls-key=/etc/tls/private/tls.key
            - --cookie-secret-file=/etc/proxy/secrets/session_secret
            - --cookie-secure=true
            - --pass-user-headers=true
            - --openshift-sar={"resource":"namespaces","verb":"get","resourceName":"{{ .Release.Namespace }}","namespace":"{{ .Release.Namespace }}"}
            - --skip-provider-button=true
          volumeMounts:
            - name: proxy-tls
              mountPath: /etc/tls/private
              readOnly: true
            - name: proxy-session
              mountPath: /etc/proxy/secrets
              readOnly: true
          resources:
            {{- toYaml .Values.auth.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
        {{- end }}
