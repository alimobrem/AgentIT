apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Left unrestricted-by-source (matches pre-auth.enabled behavior) since
    # port 8080 is never reachable from outside the cluster regardless --
    # only the Route (which now targets the proxy port below when
    # auth.enabled) is internet-facing. Narrowing this further would risk
    # breaking same-namespace consumers this change didn't audit for (e.g.
    # ServiceMonitor scraping /metrics on this same port from a monitoring
    # namespace).
    - ports:
        - protocol: TCP
          port: 8080
    {{- if .Values.auth.enabled }}
    # The router (openshift-ingress) is the only thing reaching the Route,
    # which now targets the oauth-proxy sidecar's HTTPS port -- see route.yaml
    # and deployment.yaml. `network.openshift.io/policy-group: ingress` is the
    # label OpenShift's SDN/OVN-Kubernetes automatically applies to the
    # default router's namespace for exactly this purpose.
    - from:
        - namespaceSelector:
            matchLabels:
              network.openshift.io/policy-group: ingress
      ports:
        - protocol: TCP
          port: 8443
    {{- end }}
  egress:
    # Allow-all today: portal needs kube API (private), DNS, Postgres/Kafka,
    # LLM HTTPS, and git HTTPS. Denying RFC1918 here would break the
    # apiserver. Residual clone SSRF TOCTOU is handled in-process
    # (resolve + re-resolve; https-only) — see docs/adr/0005-ssrf-clone.md.
    # Prefer an OVN EgressFirewall / egress proxy for git host allowlists
    # rather than pinning clone IPs (TLS SAN mismatch).
    - {}
