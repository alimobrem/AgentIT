{{- if .Values.kafka.enabled }}
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: agentit-events
  namespace: {{ .Release.Namespace }}
  labels:
    strimzi.io/cluster: agentit-kafka
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  partitions: 3
  replicas: 1
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: agentit-assessments
  namespace: {{ .Release.Namespace }}
  labels:
    strimzi.io/cluster: agentit-kafka
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  partitions: 3
  replicas: 1
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: agentit-gates
  namespace: {{ .Release.Namespace }}
  labels:
    strimzi.io/cluster: agentit-kafka
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  partitions: 1
  replicas: 1
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: agentit-decisions
  namespace: {{ .Release.Namespace }}
  labels:
    strimzi.io/cluster: agentit-kafka
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  partitions: 1
  replicas: 1
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: agentit-alerts
  namespace: {{ .Release.Namespace }}
  labels:
    strimzi.io/cluster: agentit-kafka
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  partitions: 3
  replicas: 1
{{- end }}
