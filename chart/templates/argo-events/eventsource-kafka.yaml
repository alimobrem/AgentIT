{{- if .Values.argoEvents.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: EventSource
metadata:
  name: agentit-kafka
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  kafka:
    agentit-events:
      url: agentit-kafka-kafka-bootstrap:9092
      topic: agentit-events
      consumerGroup:
        groupName: agentit-argo-events
        rebalanceStrategy: range
      jsonBody: true
      version: "4.1.0"
    agentit-assessments:
      url: agentit-kafka-kafka-bootstrap:9092
      topic: agentit-assessments
      consumerGroup:
        groupName: agentit-argo-assessments
        rebalanceStrategy: range
      jsonBody: true
      version: "4.1.0"
    agentit-alerts:
      url: agentit-kafka-kafka-bootstrap:9092
      topic: agentit-alerts
      consumerGroup:
        groupName: agentit-argo-alerts
        rebalanceStrategy: range
      jsonBody: true
      version: "4.1.0"
{{- end }}
