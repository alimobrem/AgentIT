{{- if .Values.argoEvents.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Sensor
metadata:
  name: agentit-finding-remediate
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  dependencies:
    - name: finding-alert
      eventSourceName: agentit-kafka
      eventName: agentit-alerts
      filters:
        data:
          - path: body.action
            type: string
            value:
              - "image-cve-found"
              - "drift-detected"
              - "slo-breach"
              - "compliance-violation"
              - "finding-received"
  triggers:
    - template:
        name: remediate-finding
        http:
          url: http://agentit:8080/api/webhook/finding
          method: POST
          # Verified by verify_internal_token (src/agentit/portal/routes/webhooks.py).
          # Read directly from the Secret at trigger-fire time, so it's always the
          # current value even though Helm can't know it at render time (the Secret
          # is populated by chart/templates/internal-webhook-token-secret.yaml).
          secureHeaders:
            - name: X-Internal-Webhook-Token
              valueFrom:
                secretKeyRef:
                  name: agentit-internal-webhook-token
                  key: token
          payload:
            - src:
                dependencyName: finding-alert
                dataKey: body.targetApp
              dest: app_name
            - src:
                dependencyName: finding-alert
                dataKey: body.action
              dest: category
            - src:
                dependencyName: finding-alert
                dataKey: body.result.summary
              dest: description
            - src:
                dependencyName: finding-alert
                dataKey: body.severity
              dest: severity
            - src:
                dependencyName: finding-alert
                dataKey: body.agentId
              dest: source
      retryStrategy:
        steps: 3
        duration: "30s"
        factor: 2.0
{{- end }}
