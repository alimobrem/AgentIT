{{- if .Values.argoEvents.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Sensor
metadata:
  name: agentit-onboard
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  eventBusName: default
  dependencies:
    - name: assessment-complete
      eventSourceName: agentit-kafka
      eventName: agentit-assessments
      filters:
        data:
          - path: body.action
            type: string
            value:
              - assessment-complete
          - path: body.result.details.score
            type: number
            comparator: "<"
            value:
              - "70"
  triggers:
    - retryStrategy:
        steps: 3
        duration: "30s"
        factor:
          value: 2.0
      template:
        name: trigger-onboarding
        http:
          url: http://agentit.{{ .Release.Namespace }}.svc:8080/api/webhook/onboard
          method: POST
          headers:
            Content-Type: application/json
          payload:
            - src:
                dependencyName: assessment-complete
                dataKey: body
              dest: body
          timeout: 120
{{- end }}
