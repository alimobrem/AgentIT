{{- if .Values.argoEvents.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Sensor
metadata:
  name: agentit-auto-apply
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  eventBusName: default
  dependencies:
    - name: onboarding-complete
      eventSourceName: agentit-kafka
      eventName: agentit-events
      filters:
        data:
          - path: body.action
            type: string
            value:
              - onboarding-complete
  triggers:
    - retryStrategy:
        steps: 3
        duration: "30s"
        factor:
          value: 2.0
      template:
        name: trigger-auto-apply
        http:
          url: http://agentit.{{ .Release.Namespace }}.svc:8080/api/webhook/auto-apply
          method: POST
          headers:
            Content-Type: application/json
          # Verified by verify_internal_token (src/agentit/portal/routes/webhooks.py).
          # Read directly from the Secret at trigger-fire time, so it's always the
          # current value even though Helm can't know it at render time (the Secret
          # is populated by chart/templates/internal-webhook-token-secret.yaml).
          secureHeaders:
            - name: X-Internal-Webhook-Token
              valueFrom:
                secretKeyRef:
                  name: agentit-internal-webhook-token
                  key: token
          payload:
            - src:
                dependencyName: onboarding-complete
                dataKey: body.correlationId
              dest: assessment_id
            - src:
                dependencyName: onboarding-complete
                dataKey: body.targetApp
              dest: namespace
          timeout: 300
{{- end }}
