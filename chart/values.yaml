replicaCount: 1

image:
  repository: quay.io/amobrem/agentit
  tag: latest
  pullPolicy: IfNotPresent

service:
  port: 8080

route:
  enabled: true

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

env:
  ANTHROPIC_VERTEX_PROJECT_ID: ""
  CLOUD_ML_REGION: ""
