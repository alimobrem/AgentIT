replicaCount: 2

image:
  repository: quay.io/amobrem/agentit
  tag: latest
  pullPolicy: IfNotPresent

service:
  port: 8080

route:
  enabled: true

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

env:
  ANTHROPIC_VERTEX_PROJECT_ID: ""
  CLOUD_ML_REGION: ""

rollout:
  enabled: true
  steps:
    - setWeight: 10
    - pause: {duration: 30s}
    - setWeight: 50
    - pause: {duration: 30s}
    - setWeight: 100
  # Real AnalysisTemplate promotion gate (chart/templates/analysistemplate.yaml)
  # between the setWeight:50 and setWeight:100 steps above, backed by a real
  # Prometheus error-rate query -- see docs/deployment.md's incident
  # postmortem: today's steps are fixed time pauses only, and a real rollout
  # advanced 10%->100% faster than a human can realistically watch-and-intervene
  # on. Default false so this doesn't change live behavior until explicitly
  # turned on.
  analysisEnabled: false

gcp:
  credentialsSecret: ""

cronJobs:
  cveScan:
    enabled: false
    schedule: "0 6 * * 1"
  complianceRescan:
    enabled: false
    schedule: "0 3 1 * *"
  dependencyUpdate:
    enabled: false
    schedule: "0 4 * * 1"
  costReport:
    enabled: false
    schedule: "0 6 * * 1"

kafka:
  enabled: false
  bootstrapServers: agentit-kafka-kafka-bootstrap.agentit.svc:9092
  # TLS + SASL/SCRAM-SHA-512 hardening (docs/kafka-hardening-plan.md).
  # Additive: adds a second listener (tlsPort, tls: true, SASL/SCRAM auth) to
  # the Kafka CR alongside the existing plaintext listener, one KafkaUser
  # (Strimzi auto-provisions a Secret) per real producer/consumer identity
  # this app has (portal + the 4 watchers that actually touch Kafka --
  # vuln-watcher, slo-tracker, drift-detector, skill-learner; capability-scout
  # never sets AGENTIT_KAFKA_BOOTSTRAP so it's excluded), and a NetworkPolicy
  # scoping broker pod ingress to this app's own pods (+ Strimzi's own
  # in-cluster components, so entity-operator/replication keep working).
  # Default OFF -- does not change the existing plaintext listener/behavior
  # for anyone not opting in; the plaintext listener is never removed by this
  # flag alone. `src/agentit/events.py`'s `EventPublisher` and
  # `src/agentit/consumer.py`'s `EventConsumer` only add SASL_SSL kwargs to
  # the kafka-python client when AGENTIT_KAFKA_SASL_USERNAME/_PASSWORD are
  # actually set in the pod's env -- this flag alone does NOT wire those env
  # vars into any Deployment template (that's the still-pending Phase 3 "flip
  # the switch" work — see docs/kafka-hardening-plan.md). Turning this on for
  # real needs a coordinated cutover, same shape as
  # docs/postgres-migration-plan.md §7: existing plaintext producers/
  # consumers and the new SASL_SSL ones can't both be "the" bootstrap at
  # once without either a dual-listener transition window or a single
  # all-Deployments-at-once switch.
  auth:
    enabled: false
    tlsPort: 9093
    # SASL/SCRAM-SHA-512 bootstrap address (the TLS listener above), separate
    # from `bootstrapServers` (the existing plaintext one) so both can be
    # wired independently during a transition.
    bootstrapServers: agentit-kafka-kafka-bootstrap.agentit.svc:9093

# Postgres is the ONLY supported store -- not a backend option among
# several, not a flag on the app side. Every Deployment/CronJob that talks
# to the store gets AGENTIT_DB_DSN unconditionally (see deployment.yaml,
# agents/*.yaml, workflows/*.yaml) -- there is no more SQLite code path,
# `AGENTIT_DB_PATH` env var, or `postgres.backend` selector to flip. See
# docs/postgres-migration-plan.md for the full history of how this cutover
# happened (that doc is now marked historically-complete/superseded).
#
# `bundled.enabled` (default true) is a genuinely separate, still-real
# choice: whether THIS chart deploys its own single-instance, non-operator
# Postgres (a Deployment+PVC+Service+Secret using the RHEL9-based image
# OpenShift's own `postgresql` ImageStream ships --
# registry.redhat.io/rhel9/postgresql-15, already pullable via this
# cluster's global pull secret, no operator/OLM Subscription/extra
# entitlements needed -- an earlier CloudNativePG-operator-based HA design
# was tried and abandoned, blocked on paid EDB/Red Hat Marketplace
# entitlements that were never provisioned; see docs/postgres-migration-
# plan.md for that history) versus pointing every component at an
# externally-managed Postgres instead. Setting this to `false` does NOT
# make Postgres optional for the app -- it only stops this chart from
# standing up its own instance; you must then pre-create a Secret named
# `bundled.credentials.secretName` (same `username`/`password` keys) in
# this namespace, pointing at whatever Postgres you're bringing yourself,
# and this chart's Deployments will use it exactly the same way.
postgres:
  bundled:
    enabled: true
    image: registry.redhat.io/rhel9/postgresql-15@sha256:06aeada2ca417445bc4fb711729e65a02ee78421a09c862cbd136ebdd51d7cfa
    storageSize: 10Gi
    # storageClassName: gp3-csi
    credentials:
      secretName: agentit-postgres-bundled-app
      username: agentit
      database: agentit
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi
    # pg_dump-based backup CronJob for the bundled instance. Disabled by
    # default — see docs/postgres-migration-plan.md's "Backup/retention"
    # section for what's covered and what isn't.
    backup:
      enabled: false
      schedule: "23 */6 * * *"
      retentionCount: 8
      storageSize: 2Gi
      # storageClassName: gp3-csi

argoEvents:
  enabled: false

tektonCI:
  enabled: false

agents:
  vulnWatcher:
    enabled: false
    interval: 21600   # 6 hours
  sloTracker:
    enabled: false
    interval: 300     # 5 minutes
  driftDetector:
    enabled: false
    interval: 600     # 10 minutes
  skillLearner:
    enabled: false
    interval: 86400   # 24 hours
    limit: 3          # max CVEs researched per cycle
    persistence:
      # Dedicated PVC (single-consumer, this Deployment only -- never shared
      # with the main portal Deployment, so no ReadWriteOnce multi-attach
      # risk). Fallback-only: drafts are primarily pushed to the portal via
      # an internal API call (AGENTIT_PORTAL_URL) so they're visible on the
      # Capabilities page immediately with no shared/RWX storage needed --
      # see README's Self-improvement loop section and
      # watchers/skill_learner.py's module docstring. This PVC only matters
      # if the portal can't be reached that cycle, so a draft still survives
      # THIS pod's own restart instead of being lost outright.
      enabled: true
      size: 256Mi
      # storageClassName: gp3-csi
  # capability-scout: proposes small, evidence-grounded changes to AgentIT's
  # own codebase (not the skills catalog) as a draft PR -- see
  # docs/self-improvement-for-agentit.md. Deliberately opt-in and off by
  # default like every other agent flag: this writes to AgentIT's own
  # source tree and opens real PRs against AgentIT's own repo, materially
  # higher-risk than drafting a skill file. Stateless -- no persistence
  # PVC, unlike skillLearner -- it opens PRs against the git remote
  # instead of writing anything to local disk.
  capabilityScout:
    enabled: false
    interval: 86400   # 24 hours
    maxOpenPRs: 1      # only open a new proposal PR if fewer than this many agentit/self-improve/* PRs are already open
    # Diff mode for propose-watch: docs (proposal markdown only), source
    # (skills/checks/tests file edits when targets allow), auto (pick source
    # when eligible else docs). Chart default stays docs; dogfood sets auto
    # via argocd/application.yaml.
    mode: docs

rbac:
  # Cross-namespace apply is the core "Apply to Cluster" feature: onboarding a
  # new app creates a namespace that doesn't exist yet (e.g. `pinky`), and the
  # namespace-scoped -edit RoleBinding below can't grant a cluster-scoped check
  # or create on an as-yet-nonexistent Namespace object. Without this, every
  # apply against a brand-new namespace 403s in kube.namespace_exists() before
  # it even reaches manifest application, surfacing as "Cluster apply failed —
  # check server logs". Apply-into-an-existing-namespace (e.g. this app's own
  # self-assessment) doesn't hit this, which is why that path partially works.
  clusterWideApply: true
  # Grants the minimal OLM permissions needed for the "Install Operator" button
  # to actually succeed (create Namespace/OperatorGroup/Subscription — see
  # chart/templates/rbac.yaml). Separate from clusterWideApply above: the
  # default "edit" ClusterRole only grants get/list/watch on namespaces, not
  # create, so even with clusterWideApply on, OwnNamespace operator installs
  # (VPA, ODF, RHBK) would still 403 without this.
  operatorInstall: true

monitoring:
  enabled: false
  # Routes the alerts already defined in prometheusrule.yaml to a real Slack
  # channel via an AlertmanagerConfig CR (chart/templates/alertmanager-config.yaml).
  # Disabled by default because it needs a real incoming-webhook URL, which
  # this chart never generates or hardcodes -- create it on-cluster first
  # (matching the gcp-credentials/postgres-secret pattern):
  #   oc create secret generic agentit-slack-webhook -n agentit \
  #     --from-literal=url=https://hooks.slack.com/services/...
  # then set slack.enabled: true and slack.secretName if you used a different name.
  slack:
    enabled: false
    secretName: agentit-slack-webhook
    secretKey: url
    channel: "#agentit-alerts"

# External synthetic uptime probe + TLS cert-expiry watch against the public
# Route -- see chart/templates/synthetic-probe-cronjob.yaml.
syntheticProbe:
  enabled: false
  schedule: "*/5 * * * *"

# Rotates agentit-internal-webhook-token on a schedule (and restarts the
# Deployments/Rollout that hold a stale copy in their env), plus a read-only
# existence check for github-webhook-secret (see
# chart/templates/secret-rotation-cronjob.yaml for why that one is a drift
# check, not a rotation).
secretRotation:
  enabled: false
  schedule: "0 5 1 * *"   # monthly, 1st at 05:00

# Basic in-memory rate limiting on the portal's own routes (app.py). Not a
# substitute for a real API gateway, but cheap insurance against a runaway
# or replayed webhook loop given auto-mode can apply changes to a live
# cluster -- see docs/deployment.md.
rateLimit:
  enabled: false
  webhookPerMinute: 30
  defaultPerMinute: 120

# OpenShift oauth-proxy sidecar in front of the portal UI. Disabled by default
# so merging this doesn't change behavior on any existing deployment -- flip
# on deliberately once the Route/SA prerequisites below are in place (see
# docs/deployment.md "Authentication" section).
auth:
  enabled: false
  # oauth-proxy image. The `openshift/oauth-proxy` upstream is unmaintained;
  # registry.redhat.io/openshift4/ose-oauth-proxy is the supported OCP build.
  image: registry.redhat.io/openshift4/ose-oauth-proxy:latest
  # --openshift-service-account: which SA's OAuthClient the proxy authenticates
  # against. Defaults to this release's own SA (see rbac.yaml) -- only
  # override if you need to share one OAuthClient across multiple Routes.
  serviceAccount: ""
  # --openshift-sar restricts access to identities who can "get" this
  # namespace (i.e. anyone with any role binding here) rather than merely
  # "any authenticated cluster user". Tighten further (e.g. to a specific
  # group) if a narrower audience is needed.
  #
  # sarResource/sarVerb/sarResourceName/sarApiGroup let an operator narrow
  # that SAR to a real RBAC check against a specific resource this app's own
  # Role actually grants -- e.g. sarResource: rollouts, sarApiGroup:
  # argoproj.io, sarVerb: get (a resource the -edit RoleBinding in rbac.yaml
  # covers), instead of the blanket "can get this namespace" check every
  # authenticated user with *any* role binding here already passes. Defaults
  # below reproduce today's exact existing check -- unset, this is a no-op.
  sarResource: namespaces
  sarVerb: get
  # Defaults to this release's own namespace (matching today's behavior) --
  # only override if the tightened resource above needs a different name.
  sarResourceName: ""
  # Core API group ("") by default -- set e.g. "argoproj.io" when sarResource
  # is a non-core-group resource like "rollouts".
  sarApiGroup: ""
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
