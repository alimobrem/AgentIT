replicaCount: 2

image:
  repository: quay.io/amobrem/agentit
  tag: latest
  pullPolicy: IfNotPresent

service:
  port: 8080

route:
  enabled: true

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

env:
  ANTHROPIC_VERTEX_PROJECT_ID: ""
  CLOUD_ML_REGION: ""

rollout:
  enabled: true
  steps:
    - setWeight: 10
    - pause: {duration: 30s}
    - setWeight: 50
    - pause: {duration: 30s}
    - setWeight: 100

gcp:
  credentialsSecret: ""

cronJobs:
  cveScan:
    enabled: false
    schedule: "0 6 * * 1"
  complianceRescan:
    enabled: false
    schedule: "0 3 1 * *"
  dependencyUpdate:
    enabled: false
    schedule: "0 4 * * 1"
  costReport:
    enabled: false
    schedule: "0 6 * * 1"

kafka:
  enabled: false
  bootstrapServers: agentit-kafka-kafka-bootstrap.agentit.svc:9092

# HA Postgres via the CloudNativePG operator (assumed pre-installed via OLM,
# same convention as Kafka/Strimzi above — see docs/deployment.md). Disabled
# by default: store.py is still SQLite today, this just prepares the cluster.
postgres:
  enabled: false
  instances: 3
  storageSize: 10Gi
  # storageClassName: gp3-csi
  # imageName: ""   # override CNPG's default PostgreSQL image if needed
  credentials:
    secretName: agentit-postgres-app
    username: agentit
    database: agentit
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  backup:
    enabled: false
    # destinationPath: s3://my-bucket/agentit-postgres
    # credentialsSecretName: agentit-postgres-backup
    retentionPolicy: "30d"

argoEvents:
  enabled: false

tektonCI:
  enabled: false

agents:
  vulnWatcher:
    enabled: false
    interval: 21600   # 6 hours
  sloTracker:
    enabled: false
    interval: 300     # 5 minutes
  driftDetector:
    enabled: false
    interval: 600     # 10 minutes
  skillLearner:
    enabled: false
    interval: 86400   # 24 hours
    limit: 3          # max CVEs researched per cycle

backup:
  enabled: false
  storageSize: 2Gi
  # storageClassName: gp3-csi

rbac:
  clusterWideApply: false

monitoring:
  enabled: false
