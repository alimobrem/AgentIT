replicaCount: 2

image:
  repository: quay.io/amobrem/agentit
  tag: latest
  pullPolicy: IfNotPresent

service:
  port: 8080

route:
  enabled: true

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

env:
  ANTHROPIC_VERTEX_PROJECT_ID: ""
  CLOUD_ML_REGION: ""

rollout:
  enabled: true
  steps:
    - setWeight: 10
    - pause: {duration: 30s}
    - setWeight: 50
    - pause: {duration: 30s}
    - setWeight: 100

gcp:
  credentialsSecret: ""

cronJobs:
  cveScan:
    enabled: false
    schedule: "0 6 * * 1"
  complianceRescan:
    enabled: false
    schedule: "0 3 1 * *"
  dependencyUpdate:
    enabled: false
    schedule: "0 4 * * 1"
  costReport:
    enabled: false
    schedule: "0 6 * * 1"

kafka:
  enabled: false
  bootstrapServers: agentit-kafka-kafka-bootstrap.agentit.svc:9092

argoEvents:
  enabled: false

tektonCI:
  enabled: false

agents:
  vulnWatcher:
    enabled: false
    interval: 21600   # 6 hours
  sloTracker:
    enabled: false
    interval: 300     # 5 minutes
  driftDetector:
    enabled: false
    interval: 600     # 10 minutes

backup:
  enabled: false
  storageSize: 2Gi
  # storageClassName: gp3-csi

rbac:
  clusterWideApply: false

monitoring:
  enabled: false
