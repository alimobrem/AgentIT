replicaCount: 1

image:
  repository: quay.io/amobrem/agentit
  tag: latest
  pullPolicy: IfNotPresent

service:
  port: 8080

route:
  enabled: true

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

env:
  ANTHROPIC_VERTEX_PROJECT_ID: ""
  CLOUD_ML_REGION: ""

rollout:
  enabled: true

gcp:
  credentialsSecret: ""

cronJobs:
  cveScan:
    enabled: false
    schedule: "0 6 * * 1"

kafka:
  enabled: false
  bootstrapServers: agentit-kafka-kafka-bootstrap.agentit.svc:9092

argoEvents:
  enabled: false

tektonCI:
  enabled: false
