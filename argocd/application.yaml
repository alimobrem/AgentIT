apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: agentit
  namespace: openshift-gitops
spec:
  project: default
  source:
    repoURL: https://github.com/alimobrem/AgentIT.git
    targetRevision: main
    path: chart
    helm:
      parameters:
        - name: image.repository
          value: image-registry.openshift-image-registry.svc:5000/agentit/agentit
        - name: image.tag
          value: latest
        - name: image.pullPolicy
          value: Always
        - name: rollout.enabled
          value: "true"
        - name: kafka.enabled
          value: "true"
        - name: argoEvents.enabled
          value: "true"
        - name: env.ANTHROPIC_VERTEX_PROJECT_ID
          value: itpc-gcp-product-all-claude
        - name: env.CLOUD_ML_REGION
          value: global
  destination:
    server: https://kubernetes.default.svc
    namespace: agentit
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
