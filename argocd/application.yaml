apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: agentit
  namespace: openshift-gitops
spec:
  project: default
  source:
    repoURL: https://github.com/alimobrem/AgentIT.git
    targetRevision: main
    path: chart
    helm:
      parameters:
        - name: image.repository
          value: image-registry.openshift-image-registry.svc:5000/agentit/agentit
        # NOTE: the CI pipeline's notify-argocd step overwrites this value directly on the
        # live Application object after every successful build (oc patch ... image.tag).
        # This committed value is a bootstrap/disaster-recovery default only — it does NOT
        # reflect what's currently deployed. Check the live Application or Rollout for that.
        - name: image.tag
          value: latest
        - name: image.pullPolicy
          value: Always
        - name: rollout.enabled
          value: "true"
        - name: kafka.enabled
          value: "true"
        - name: argoEvents.enabled
          value: "true"
        - name: env.ANTHROPIC_VERTEX_PROJECT_ID
          value: itpc-gcp-product-all-claude
        - name: env.CLOUD_ML_REGION
          value: global
        - name: gcp.credentialsSecret
          value: gcp-credentials
        - name: tektonCI.enabled
          value: "true"
        - name: agents.vulnWatcher.enabled
          value: "true"
        - name: agents.sloTracker.enabled
          value: "true"
        - name: agents.driftDetector.enabled
          value: "true"
        - name: agents.skillLearner.enabled
          value: "true"
        - name: agents.skillLearner.interval
          value: "86400"
        - name: agents.skillLearner.limit
          value: "3"
        - name: monitoring.enabled
          value: "true"
        # Stands up AgentIT's own bundled, non-operator Postgres instance
        # (Deployment+PVC+Service+Secret) live in the agentit namespace.
        - name: postgres.bundled.enabled
          value: "true"
        # Coordinated cutover (docs/postgres-migration-plan.md section 7,
        # explicitly approved): flips AGENTIT_DB_BACKEND=postgres (plus the
        # AGENTIT_DB_DSN built from the bundled Secret) across all 5
        # Deployments in this single sync. Revert this one parameter to
        # "sqlite" to roll back every component at once -- the SQLite file
        # itself is never touched, so that revert is non-destructive.
        - name: postgres.backend
          value: "postgres"
      # Temporary, scoped to this one cutover sync only: bypasses the
      # portal's normal canary steps so old (SQLite) and new (Postgres)
      # portal pods are never live at the same time serving traffic against
      # different backends, per section 7's explicit warning against a
      # gradual rollout for a storage-backend change. Must be reverted
      # (this whole `values` block removed) once the cutover is confirmed
      # healthy, restoring normal canary behavior for the next ordinary
      # code change.
      values: |
        rollout:
          steps:
            - setWeight: 100
  ignoreDifferences:
    - group: ""
      kind: Service
      jsonPointers:
        - /spec/clusterIP
        - /spec/clusterIPs
        - /spec/ipFamilies
        - /spec/ipFamilyPolicy
        - /spec/selector
    # Only ignore the controller-populated status (address/conditions) so that
    # committed spec changes (e.g. trigger/interceptor config) still sync normally.
    - group: triggers.tekton.dev
      kind: EventListener
      jsonPointers:
        - /status
  destination:
    server: https://kubernetes.default.svc
    namespace: agentit
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
