{% extends "base.html" %}
{% block title %}New Assessment - AgentIT{% endblock %}
{% block content %}
<h1>New Assessment</h1>
{% if error %}
<div class="alert alert-error form-narrow">
  {{ error }}
</div>
{% endif %}
<form method="post" action="/assess" class="form-narrow">
  <div class="form-group">
    <label class="form-label" for="repo_url">Repository URL</label>
    <input type="url" id="repo_url" name="repo_url" required placeholder="https://github.com/org/repo">
  </div>
  <div class="form-group">
    <label class="form-label" for="criticality">Criticality</label>
    <select id="criticality" name="criticality">
      <option value="low">Low</option>
      <option value="medium" selected>Medium</option>
      <option value="high">High</option>
      <option value="critical">Critical</option>
    </select>
  </div>
  <div class="form-group">
    <label class="form-label" for="infra_repo_url">GitOps Infra Repo <span class="text-muted text-sm">(optional)</span></label>
    <input type="url" id="infra_repo_url" name="infra_repo_url" placeholder="https://github.com/org/gitops-infra">
    <span class="text-muted text-xs">Where manifests are committed. Argo CD syncs from this repo. Leave blank to use the app repo.</span>
  </div>
  <button type="submit" class="btn">
    <span class="btn-label">Run Assessment</span>
    <span class="htmx-indicator spinner-wrap"><span class="spinner"></span> Assessing&hellip;</span>
  </button>
</form>
{% endblock %}
