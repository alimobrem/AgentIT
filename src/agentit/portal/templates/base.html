<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}AgentIT{% endblock %}</title>
{% block head_extra %}{% endblock %}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/htmx.org@2.0.4" integrity="sha384-HGfztofotfshcF7+8n44JQL2oJmowVChPTg48S+jvZoztPfvwD79OC/LTtG6dMp+" crossorigin="anonymous"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js" integrity="sha384-X9kJyAubVxnP0hcA+AMMs21U445qsnqhnUF8EBlEpP3a42Kh/JwWjlv2ZcvGfphb" crossorigin="anonymous"></script>
<style>
  /* ── Design Tokens ─────────────────────────────────────────────── */
  :root {
    --color-bg:         #1a1a2e;
    --color-surface:    #16213e;
    --color-border:     #0f3460;
    --color-accent:     #e94560;
    --color-text:       #e0e0e0;
    --color-muted:      #888;
    --color-success:    #2ecc71;
    --color-warning:    #f0a500;
    --color-danger:     #e94560;
    --color-info:       #3498db;
    --color-high:       #e07b39;
    --color-btn-green:  #238636;
    --radius-sm:   4px;
    --radius-md:   6px;
    --radius-lg:   8px;
    --radius-pill: 12px;
    --space-1: 0.3rem;
    --space-2: 0.5rem;
    --space-3: 0.6rem;
    --space-4: 0.8rem;
    --space-5: 1rem;
    --space-6: 1.2rem;
    --space-7: 1.5rem;
    --space-8: 2rem;
    --font-xs:  0.75rem;
    --font-sm:  0.8rem;
    --font-base: 0.9rem;
    --font-md:  0.95rem;
    --font-lg:  1.05rem;
    --font-xl:  1.2rem;
    --font-2xl: 2rem;
    --font-3xl: 2.2rem;
    --font-hero: 3rem;
    --font-mono: 'IBM Plex Mono', 'SFMono-Regular', Consolas, monospace;
    --font-display: 'IBM Plex Mono', monospace;
  }

  /* ── Reset ─────────────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--color-bg);
    color: var(--color-text);
    line-height: 1.6;
    min-height: 100vh;
  }
  a { color: var(--color-accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* ── Nav ────────────────────────────────────────────────────────── */
  nav {
    background: var(--color-surface);
    padding: var(--space-4) var(--space-8);
    display: flex;
    align-items: center;
    gap: var(--space-8);
    border-bottom: 2px solid var(--color-accent);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  nav .logo {
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--color-accent);
    letter-spacing: 1px;
  }
  nav .links { display: flex; gap: var(--space-7); }
  nav .links a {
    color: var(--color-text);
    font-size: var(--font-md);
    padding: var(--space-1) 0;
    border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s;
  }
  nav .links a:hover {
    color: var(--color-accent);
    text-decoration: none;
    border-bottom-color: var(--color-accent);
  }

  /* ── Layout ────────────────────────────────────────────────────── */
  .container { max-width: 1100px; margin: 0 auto; padding: var(--space-8); }
  h1 { color: var(--color-accent); margin-bottom: var(--space-7); font-family: var(--font-display); font-weight: 700; }
  h2 { font-family: var(--font-display); }

  /* ── Stat Grid (portfolio summary) ─────────────────────────────── */
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: var(--space-5);
    margin-bottom: var(--space-8);
  }
  .stat-card {
    background: var(--color-surface);
    border-radius: var(--radius-lg);
    padding: var(--space-6);
    text-align: center;
    border: 1px solid var(--color-border);
    transition: border-color 0.15s;
  }
  .stat-card:hover { border-color: var(--color-accent); }
  .stat-label {
    font-size: var(--font-xs);
    text-transform: uppercase;
    color: var(--color-muted);
    letter-spacing: 0.5px;
    margin-bottom: var(--space-2);
  }
  .stat-value {
    font-size: var(--font-2xl);
    font-weight: 700;
    color: var(--color-text);
  }

  /* ── Card Grid ─────────────────────────────────────────────────── */
  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: var(--space-6);
  }
  .card {
    background: var(--color-surface);
    border-radius: var(--radius-lg);
    padding: var(--space-6);
    border: 1px solid var(--color-border);
    transition: border-color 0.15s, transform 0.15s;
  }
  .card:hover { border-color: var(--color-accent); transform: translateY(-2px); }
  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: start;
    margin-bottom: var(--space-4);
  }
  .card-title {
    font-weight: 600;
    color: var(--color-text);
    font-size: var(--font-lg);
  }
  .card-score {
    display: flex;
    align-items: baseline;
    gap: var(--space-3);
    margin-bottom: var(--space-1);
  }
  .card-meta {
    margin-top: var(--space-3);
    font-size: var(--font-sm);
    color: var(--color-muted);
  }
  .card-footer { margin-top: var(--space-3); }
  .card a { text-decoration: none; }
  .card a:hover { text-decoration: none; }

  /* ── Score Bar ──────────────────────────────────────────────────── */
  .score-bar-bg {
    background: var(--color-border);
    border-radius: var(--radius-sm);
    height: 10px;
    width: 100%;
    overflow: hidden;
  }
  .score-bar-fill {
    height: 100%;
    border-radius: var(--radius-sm);
    transition: width 0.4s ease;
  }
  .score-red    { background: var(--color-danger); }
  .score-yellow { background: var(--color-warning); }
  .score-green  { background: var(--color-success); }

  /* ── Score Display ─────────────────────────────────────────────── */
  .score-hero {
    font-family: var(--font-display);
    font-size: var(--font-hero);
    font-weight: 700;
    margin-bottom: var(--space-2);
  }
  .score-3xl {
    font-family: var(--font-display);
    font-size: var(--font-3xl);
    font-weight: 700;
  }
  .score-unit {
    font-size: var(--font-xl);
    color: var(--color-muted);
  }

  /* ── Dimension Row ─────────────────────────────────────────────── */
  .dimension-row {
    display: flex;
    align-items: center;
    gap: var(--space-4);
    margin-bottom: var(--space-3);
    padding: var(--space-2) 0;
  }
  .dimension-label {
    width: 180px;
    font-size: var(--font-base);
    color: var(--color-text);
  }
  .dimension-bar { flex: 1; }
  .dimension-value {
    width: 50px;
    text-align: right;
    font-weight: 600;
  }

  /* ── Trend Indicators ──────────────────────────────────────────── */
  .trend {
    font-size: var(--font-md);
    font-weight: 600;
  }
  .trend-up   { color: var(--color-success); }
  .trend-down { color: var(--color-danger); }
  .trend-flat { color: var(--color-muted); }

  /* ── Badge ─────────────────────────────────────────────────────── */
  .badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: var(--radius-pill);
    font-size: var(--font-xs);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .badge-critical { background: var(--color-danger); color: #fff; }
  .badge-high     { background: var(--color-high); color: #fff; }
  .badge-medium   { background: var(--color-warning); color: var(--color-bg); }
  .badge-low      { background: var(--color-success); color: var(--color-bg); }
  .badge-info     { background: var(--color-info); color: #fff; }

  /* ── Buttons ───────────────────────────────────────────────────── */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: var(--space-2);
    background: var(--color-accent);
    color: #fff;
    border: none;
    padding: var(--space-3) 1.4rem;
    border-radius: var(--radius-md);
    font-size: var(--font-base);
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    line-height: 1.4;
    vertical-align: middle;
    transition: opacity 0.15s, transform 0.1s;
    white-space: nowrap;
  }
  .btn:hover { opacity: 0.85; text-decoration: none; }
  .btn:active { transform: scale(0.97); }
  .btn-sm    { padding: var(--space-1) var(--space-4); font-size: var(--font-sm); }
  .btn-lg    { font-size: var(--font-lg); padding: var(--space-4) var(--space-8); }
  .btn-green { background: var(--color-btn-green); }
  .btn-outline {
    background: transparent;
    border: 1px solid #555;
    color: #aaa;
  }
  .btn-outline:hover { border-color: var(--color-accent); color: var(--color-text); }
  .btn-action {
    background: var(--color-border);
    border: 2px solid var(--color-accent);
  }
  .btn-approve { background: var(--color-success); }
  .btn-reject  { background: var(--color-danger); }
  .btn-danger-outline { border-color: var(--color-danger); color: var(--color-danger); background: transparent; }
  .btn-danger-outline:hover { background: var(--color-danger); color: #fff; }

  /* ── Action Bar ────────────────────────────────────────────────── */
  .action-bar {
    display: flex;
    gap: var(--space-3);
    flex-wrap: wrap;
    align-items: center;
    margin-bottom: var(--space-7);
  }
  .inline-form { display: inline; }

  /* ── Alerts ────────────────────────────────────────────────────── */
  .alert {
    padding: var(--space-5);
    border-radius: var(--radius-lg);
    margin-bottom: var(--space-5);
  }
  .alert-success { background: #1a4a2e; border: 1px solid var(--color-btn-green); }
  .alert-warn    { background: #4a3a1a; border: 1px solid var(--color-warning); }
  .alert-error   { background: #4a1a1a; border: 1px solid var(--color-danger); }

  /* ── Forms ─────────────────────────────────────────────────────── */
  .form-narrow {
    max-width: 500px;
    display: flex;
    flex-direction: column;
    gap: var(--space-5);
  }
  .form-group { display: flex; flex-direction: column; gap: var(--space-1); }
  .form-label {
    font-size: var(--font-base);
    color: var(--color-text);
  }
  input, select {
    background: var(--color-surface);
    color: var(--color-text);
    border: 1px solid var(--color-border);
    padding: var(--space-2) var(--space-4);
    border-radius: var(--radius-md);
    font-size: var(--font-md);
    width: 100%;
    transition: border-color 0.15s;
  }
  input:focus, select:focus { outline: none; border-color: var(--color-accent); }

  /* ── Tables ────────────────────────────────────────────────────── */
  table { width: 100%; border-collapse: collapse; margin-top: var(--space-5); }
  th, td { text-align: left; padding: var(--space-3) var(--space-4); border-bottom: 1px solid var(--color-border); }
  th { color: var(--color-accent); font-size: var(--font-sm); text-transform: uppercase; letter-spacing: 0.3px; }
  tbody tr { transition: background 0.1s; }
  tbody tr:hover { background: color-mix(in srgb, var(--color-surface) 80%, var(--color-border)); }
  .row-border-green  { border-left: 3px solid var(--color-success); }
  .row-border-yellow { border-left: 3px solid var(--color-warning); }
  .row-border-red    { border-left: 3px solid var(--color-danger); }

  /* ── Findings ──────────────────────────────────────────────────── */
  .finding-list { list-style: none; }
  .finding-item {
    background: var(--color-surface);
    padding: 0.7rem var(--space-5);
    border-radius: var(--radius-md);
    margin-bottom: var(--space-2);
  }
  .finding-critical { border-left: 3px solid var(--color-danger); }
  .finding-high     { border-left: 3px solid var(--color-high); }
  .finding-badge    { margin-right: var(--space-2); }
  .finding-file     { color: #666; margin-left: var(--space-2); }

  /* ── Manifest Cards ────────────────────────────────────────────── */
  .manifest-card {
    background: var(--color-surface);
    border-radius: var(--radius-lg);
    padding: var(--space-5) var(--space-6);
    margin-bottom: var(--space-5);
    border: 1px solid var(--color-border);
  }
  .manifest-title {
    font-weight: 600;
    margin-bottom: var(--space-1);
  }
  .manifest-desc {
    color: var(--color-muted);
    font-size: var(--font-base);
    margin-bottom: var(--space-3);
  }
  .code-block {
    background: var(--color-border);
    padding: var(--space-4);
    border-radius: var(--radius-md);
    overflow-x: auto;
    margin: 0;
  }
  .code-block code {
    font-family: var(--font-mono);
    font-size: var(--font-sm);
    color: var(--color-text);
  }

  /* ── Section Titles ────────────────────────────────────────────── */
  .section-title {
    color: var(--color-accent);
    margin: var(--space-7) 0 var(--space-4);
    text-transform: capitalize;
  }

  /* ── Gate Actions ──────────────────────────────────────────────── */
  .gate-actions {
    display: flex;
    gap: var(--space-2);
  }

  /* ── Color Utilities ───────────────────────────────────────────── */
  .text-success { color: var(--color-success); }
  .text-warning { color: var(--color-warning); }
  .text-danger  { color: var(--color-danger); }
  .text-muted   { color: var(--color-muted); }
  .text-bold    { font-weight: 700; }
  .text-sm      { font-size: var(--font-sm); }
  .text-xs      { font-size: var(--font-xs); }

  /* ── Spacing Utilities ─────────────────────────────────────────── */
  .mb-0 { margin-bottom: 0; }
  .mb-1 { margin-bottom: var(--space-5); }
  .mb-2 { margin-bottom: var(--space-7); }
  .mb-3 { margin-bottom: var(--space-8); }
  .mt-1 { margin-top: var(--space-5); }
  .mt-2 { margin-top: var(--space-8); }

  /* ── htmx + Spinner ────────────────────────────────────────────── */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }
  .spinner-wrap {
    display: inline-flex;
    align-items: center;
    gap: var(--space-2);
  }
  .htmx-indicator { display: none; }
  .htmx-request .htmx-indicator { display: inline-flex; }
  .htmx-request.htmx-indicator { display: inline-flex; }
  .htmx-request .btn-label { display: none; }
  .btn-loading { opacity: 0.7; pointer-events: none; }

  /* ── Collapsible Sections ────────────────────────────────────────── */
  .collapse-toggle {
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: var(--space-2);
    user-select: none;
  }
  .collapse-toggle::before {
    content: '▸';
    font-size: var(--font-sm);
    transition: transform 0.15s;
    display: inline-block;
    width: 1em;
  }
  .collapse-toggle[aria-expanded="true"]::before { transform: rotate(90deg); }
  .collapse-body { overflow: hidden; }

  /* ── Modal ─────────────────────────────────────────────────────── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 200;
    justify-content: center;
    align-items: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-lg);
    padding: var(--space-8);
    width: 100%;
    max-width: 500px;
    position: relative;
  }
  .modal h2 { margin-bottom: var(--space-6); }
  .modal-close {
    position: absolute;
    top: var(--space-4);
    right: var(--space-4);
    background: none;
    border: none;
    color: var(--color-muted);
    font-size: var(--font-xl);
    cursor: pointer;
  }
  .modal-close:hover { color: var(--color-text); }

  /* ── Nav Secondary ─────────────────────────────────────────────── */
  nav .links-secondary { display: flex; gap: var(--space-5); margin-left: auto; }
  nav .links-secondary a { color: var(--color-muted); font-size: var(--font-sm); }
  nav .links-secondary a:hover { color: var(--color-text); text-decoration: none; }

  /* ── Hero CTA ──────────────────────────────────────────────────── */
  .hero-cta {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: var(--space-8) 0;
  }
  .hero-cta h2 { color: var(--color-text); margin-bottom: var(--space-4); font-family: var(--font-display); }
  .hero-cta p { color: var(--color-muted); margin-bottom: var(--space-7); max-width: 500px; }

  /* ── Page Transition ───────────────────────────────────────────── */
  .htmx-settling { opacity: 0.8; }
  .htmx-swapping { opacity: 0; transition: opacity 0.1s ease-out; }

  /* ── Responsive ────────────────────────────────────────────────── */
  @media (max-width: 768px) {
    .stat-grid { grid-template-columns: 1fr; }
    .card-grid { grid-template-columns: 1fr; }
    nav { flex-direction: column; gap: var(--space-4); padding: var(--space-4); }
    .container { padding: var(--space-5); }
    .dimension-row { flex-direction: column; align-items: stretch; }
    .dimension-label { width: auto; }
    .dimension-value { width: auto; text-align: left; }
    .action-bar { flex-direction: column; align-items: stretch; }
    .action-bar .btn { text-align: center; justify-content: center; }
  }
</style>
</head>
<body hx-boost="true">
<nav>
  <span class="logo">AgentIT</span>
  <div class="links">
    <a href="/">Fleet</a>
  </div>
  <div class="links-secondary">
    <a href="/gates">Gates</a>
    <a href="/events">Events</a>
    <a href="/agents">Agents</a>
    <a href="/schedules">Schedules</a>
    <a href="/health">Health</a>
    <a href="/settings">Settings</a>
  </div>
</nav>
<div class="container">
{% block content %}{% endblock %}
</div>
<script>
htmx.config.timeout = 120000;
document.body.addEventListener('htmx:beforeRequest', function(e) {
  var btn = e.detail.elt.querySelector('button[type="submit"]');
  if (btn) btn.classList.add('btn-loading');
});
document.body.addEventListener('htmx:afterRequest', function(e) {
  var btn = e.detail.elt.querySelector('button[type="submit"]');
  if (btn) btn.classList.remove('btn-loading');
});
</script>
</body>
</html>
