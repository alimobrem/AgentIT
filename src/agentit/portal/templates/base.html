<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}AgentIT{% endblock %}</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    line-height: 1.6;
    min-height: 100vh;
  }
  a { color: #e94560; text-decoration: none; }
  a:hover { text-decoration: underline; }
  nav {
    background: #16213e;
    padding: 0.8rem 2rem;
    display: flex;
    align-items: center;
    gap: 2rem;
    border-bottom: 2px solid #e94560;
  }
  nav .logo {
    font-size: 1.4rem;
    font-weight: 700;
    color: #e94560;
    letter-spacing: 1px;
  }
  nav .links { display: flex; gap: 1.5rem; }
  nav .links a { color: #e0e0e0; font-size: 0.95rem; }
  nav .links a:hover { color: #e94560; }
  .container { max-width: 1100px; margin: 0 auto; padding: 2rem; }
  h1 { color: #e94560; margin-bottom: 1.5rem; }
  .score-bar-bg {
    background: #0f3460;
    border-radius: 4px;
    height: 12px;
    width: 100%;
    overflow: hidden;
  }
  .score-bar-fill { height: 100%; border-radius: 4px; transition: width 0.3s; }
  .score-red { background: #e94560; }
  .score-yellow { background: #f0a500; }
  .score-green { background: #2ecc71; }
  .badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 12px;
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
  }
  .badge-critical { background: #e94560; color: #fff; }
  .badge-high { background: #e07b39; color: #fff; }
  .badge-medium { background: #f0a500; color: #1a1a2e; }
  .badge-low { background: #2ecc71; color: #1a1a2e; }
  .btn {
    display: inline-block;
    background: #e94560;
    color: #fff;
    border: none;
    padding: 0.6rem 1.4rem;
    border-radius: 6px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
  }
  .btn:hover { opacity: 0.85; text-decoration: none; }
  input, select {
    background: #16213e;
    color: #e0e0e0;
    border: 1px solid #0f3460;
    padding: 0.5rem 0.8rem;
    border-radius: 6px;
    font-size: 0.95rem;
  }
  input:focus, select:focus { outline: none; border-color: #e94560; }
  table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
  th, td { text-align: left; padding: 0.6rem 0.8rem; border-bottom: 1px solid #0f3460; }
  th { color: #e94560; font-size: 0.85rem; text-transform: uppercase; }
</style>
</head>
<body>
<nav>
  <span class="logo">AgentIT</span>
  <div class="links">
    <a href="/">Dashboard</a>
    <a href="/assess">New Assessment</a>
  </div>
</nav>
<div class="container">
{% block content %}{% endblock %}
</div>
</body>
</html>
