apiVersion: v1
kind: ConfigMap
metadata:
  name: agentit-grafana-dashboard
  labels:
    app.kubernetes.io/name: agentit
    grafana_dashboard: '1'
data:
  agentit-dashboard.json: "{\n  \"annotations\": {\n    \"list\": []\n  },\n  \"editable\"\
    : true,\n  \"fiscalYearStartMonth\": 0,\n  \"graphTooltip\": 0,\n  \"id\": null,\n\
    \  \"links\": [],\n  \"panels\": [\n    {\n      \"title\": \"Requests / sec\"\
    ,\n      \"type\": \"timeseries\",\n      \"gridPos\": {\n        \"h\": 8,\n\
    \        \"w\": 12,\n        \"x\": 0,\n        \"y\": 0\n      },\n      \"targets\"\
    : [\n        {\n          \"expr\": \"sum(rate(http_requests_total{app=\\\"agentit\\\
    \"}[5m]))\",\n          \"legendFormat\": \"req/s\"\n        }\n      ]\n    },\n\
    \    {\n      \"title\": \"Error Rate %\",\n      \"type\": \"timeseries\",\n\
    \      \"gridPos\": {\n        \"h\": 8,\n        \"w\": 12,\n        \"x\": 12,\n\
    \        \"y\": 0\n      },\n      \"targets\": [\n        {\n          \"expr\"\
    : \"sum(rate(http_requests_total{app=\\\"agentit\\\",code=~\\\"5..\\\"}[5m]))\
    \ / sum(rate(http_requests_total{app=\\\"agentit\\\"}[5m])) * 100\",\n       \
    \   \"legendFormat\": \"error %\"\n        }\n      ]\n    },\n    {\n      \"\
    title\": \"P99 Latency\",\n      \"type\": \"timeseries\",\n      \"gridPos\"\
    : {\n        \"h\": 8,\n        \"w\": 12,\n        \"x\": 0,\n        \"y\":\
    \ 8\n      },\n      \"targets\": [\n        {\n          \"expr\": \"histogram_quantile(0.99,\
    \ sum(rate(http_request_duration_seconds_bucket{app=\\\"agentit\\\"}[5m])) by\
    \ (le))\",\n          \"legendFormat\": \"p99\"\n        }\n      ]\n    },\n\
    \    {\n      \"title\": \"Pod Restarts\",\n      \"type\": \"timeseries\",\n\
    \      \"gridPos\": {\n        \"h\": 8,\n        \"w\": 12,\n        \"x\": 12,\n\
    \        \"y\": 8\n      },\n      \"targets\": [\n        {\n          \"expr\"\
    : \"sum(kube_pod_container_status_restarts_total{pod=~\\\"agentit-.*\\\"}) by\
    \ (pod)\",\n          \"legendFormat\": \"{{{{pod}}}}\"\n        }\n      ]\n\
    \    }\n  ],\n  \"schemaVersion\": 39,\n  \"tags\": [\n    \"generated\",\n  \
    \  \"agentit\"\n  ],\n  \"templating\": {\n    \"list\": []\n  },\n  \"time\"\
    : {\n    \"from\": \"now-1h\",\n    \"to\": \"now\"\n  },\n  \"title\": \"agentit\"\
    ,\n  \"uid\": \"agentit-dashboard\"\n}"
