apiVersion: v1
kind: ServiceAccount
metadata:
  name: agentit-scanner
  labels:
    app.kubernetes.io/name: agentit
    app.kubernetes.io/component: dependency-scanning
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: agentit-scanner
  labels:
    app.kubernetes.io/name: agentit
    app.kubernetes.io/component: dependency-scanning
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: agentit-scanner
  labels:
    app.kubernetes.io/name: agentit
    app.kubernetes.io/component: dependency-scanning
subjects:
  - kind: ServiceAccount
    name: agentit-scanner
roleRef:
  kind: Role
  name: agentit-scanner
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: agentit-dependency-scan
  labels:
    app.kubernetes.io/name: agentit
    app.kubernetes.io/component: dependency-scanning
    app.kubernetes.io/part-of: agentit
    criticality: high
spec:
  schedule: "0 6 * * 1"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 4
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 3600
      template:
        metadata:
          labels:
            app.kubernetes.io/name: agentit
            app.kubernetes.io/component: dependency-scanning
        spec:
          restartPolicy: OnFailure
          serviceAccountName: agentit-scanner
          containers:
            - name: dependency-scan
              image: agentit:latest
              command: ["agentit", "assess"]
              args:
                - "--dimension"
                - "dependencies"
                - "--rescan"
                - "--output"
                - "/results/report.json"
              env:
                - name: NAMESPACE
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.namespace
                - name: SEVERITY_THRESHOLD
                  value: "HIGH"
              resources:
                requests:
                  cpu: 200m
                  memory: 512Mi
                limits:
                  cpu: "1"
                  memory: 1Gi
              volumeMounts:
                - name: results
                  mountPath: /results
          volumes:
            - name: results
              emptyDir: {}
