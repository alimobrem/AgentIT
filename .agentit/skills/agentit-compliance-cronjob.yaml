apiVersion: batch/v1
kind: CronJob
metadata:
  name: agentit-compliance-rescan
  labels:
    app.kubernetes.io/name: agentit
spec:
  schedule: "0 2 1 * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app.kubernetes.io/name: agentit
            app.kubernetes.io/component: compliance-rescan
        spec:
          serviceAccountName: agentit-compliance-sa
          restartPolicy: OnFailure
          containers:
            - name: assess
              image: agentit:latest
              command: ["agentit", "assess"]
              args:
                - "--namespace"
                - "{{namespace}}"
                - "--output"
                - "/results/report.json"
              volumeMounts:
                - name: results
                  mountPath: /results
          volumes:
            - name: results
              emptyDir: {}